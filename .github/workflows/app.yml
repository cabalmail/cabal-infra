---
name: Build and Deploy Application

# Phase 6 of docs/0.9.x/build-deploy-simplification-plan.md cuts this
# workflow over to be the canonical app-deploy pipeline. The legacy
# docker.yml / lambda_api_python.yml / lambda_counter.yml / react.yml
# files are deleted in the same change, so a push to any of
# docker/**, lambda/**, or react/admin/** drives this workflow
# directly and never re-enters Terraform. The setup job's
# resolve-areas step uses dorny/paths-filter to figure out which jobs
# need to run for a given push; workflow_dispatch keeps the manual
# `areas` input as an override.
#
# Within the docker area, pushes are filtered per TIER
# (docs/0.10.x/per-tier-docker-deploy-plan.md): the docker job's
# matrix fans out only over the tiers whose build inputs changed, so a
# change that does not touch imap no longer causes an imap service
# roll (and its client-facing gap). Each tier then deploys on its own
# image tag; Terraform tracks them per tier in SSM
# (/cabal/deployed_image_tag/<tier>). A workflow_dispatch run always
# builds every tier in scope - that is the escape hatch for first
# deploys, base-image refreshes, and operator catchups - and the
# optional force_tiers input narrows it to a named subset.

on:
  workflow_dispatch:
    inputs:
      areas:
        description: 'Area to build and deploy.'
        required: false
        default: all
        type: choice
        options:
          - all
          - docker
          - lambda_api
          - lambda_counter
          - lambda_certbot
          - react
          - front_door
      force_tiers:
        description: 'Comma-separated docker tiers to build and deploy (e.g. imap,smtp-out). Empty means every tier in scope. Only consulted when the docker area is selected.'
        required: false
        default: ''
        type: string
  push:
    # Only the three named branches deploy. Pushes from feature branches
    # or tags do not trigger this workflow. See CLAUDE.md "Branches and
    # environments".
    branches:
      - main
      - stage
      - development
    paths:
      - 'docker/**'
      - 'lambda/**'
      - 'react/admin/**'
      - 'front-door/**'
      - '.github/workflows/app.yml'
      - '.github/scripts/build-api.sh'
      - '.github/scripts/build-api-one.sh'
      - '.github/scripts/build-counter.sh'
      - '.github/scripts/deploy-ecs-service.sh'
      - '.github/scripts/prepull-image.sh'
      - '.github/scripts/ecr-scan-report.sh'
      - '.github/scripts/check-docker-tier-filters.sh'
      - '.github/scripts/deploy-lambda-image.sh'
      - '.github/scripts/deploy-lambda-zip.sh'
      - '.github/scripts/render-front-door.py'

permissions:
  contents: read
  # AWS auth is via GitHub OIDC (aws-actions/configure-aws-credentials
  # assumes vars.AWS_DEPLOY_ROLE_ARN); the runner needs to mint an OIDC
  # token. See docs/aws.md / docs/github.md.
  id-token: write

# Serialize per-ref so back-to-back app deploys roll services in order
# rather than racing each other. Phase 3 of
# docs/0.9.x/build-deploy-simplification-plan.md.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  setup:
    runs-on: ubuntu-latest
    # Bind to the per-branch environment so vars.TF_VAR_MONITORING (set
    # on the GitHub prod / stage / development environments, not at
    # the repo level) is visible to compute-matrix below. Without this
    # the matrix collapsed to the three core tiers on prod even though
    # monitoring was enabled, because the unbound job only saw
    # repo-scoped vars and the conditional fell through.
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
      changed_tiers: ${{ steps.tiers.outputs.changed_tiers }}
      docker: ${{ steps.areas.outputs.docker }}
      lambda_api: ${{ steps.areas.outputs.lambda_api }}
      lambda_counter: ${{ steps.areas.outputs.lambda_counter }}
      lambda_certbot: ${{ steps.areas.outputs.lambda_certbot }}
      react: ${{ steps.areas.outputs.react }}
      front_door: ${{ steps.areas.outputs.front_door }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    # Guard against per-tier filter drift: if a Dockerfile gains a
    # COPY/ADD of a file under docker/ that its tier's changed-paths
    # filter below does not cover, changes to that file would silently
    # skip rebuilds of a tier that depends on it. Fails the run until
    # the filter map is updated. Phase 1 of
    # docs/0.10.x/per-tier-docker-deploy-plan.md.
    - name: check-tier-filters
      run: ./.github/scripts/check-docker-tier-filters.sh

    - name: compute-tag
      id: tag
      run: echo "image_tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"

    # Build only the docker tiers actually consumed by the current
    # environment. Per phase 3 of the simplification plan, the
    # monitoring stack (9 tiers) is dropped from the matrix when
    # vars.TF_VAR_MONITORING != 'true' so we stop spending arm64 build
    # minutes on images nothing deploys. The sinkhole tier (SMTP test
    # fixture, see docs/0.9.x/sinkhole-test-harness-plan.md) is gated
    # the same way on vars.TF_VAR_SINKHOLE; prod's value is hard-coded
    # false and Terraform's precondition belt-and-suspenders the gate.
    # The output here is the IN-SCOPE matrix; resolve-tiers below
    # narrows it to the tiers whose inputs actually changed.
    - name: compute-matrix
      id: matrix
      env:
        MONITORING: ${{ vars.TF_VAR_MONITORING }}
        SINKHOLE: ${{ vars.TF_VAR_SINKHOLE }}
      run: |
        CORE='["imap","smtp-in","smtp-out"]'
        MON='["uptime-kuma","ntfy","healthchecks","prometheus","alertmanager","grafana","cloudwatch-exporter","blackbox-exporter","node-exporter"]'
        SINK='["sinkhole"]'
        tiers="$CORE"
        if [ "${MONITORING}" = "true" ]; then
          tiers="$(jq -cn --argjson a "$tiers" --argjson b "$MON" '$a + $b')"
        fi
        if [ "${SINKHOLE}" = "true" ]; then
          tiers="$(jq -cn --argjson a "$tiers" --argjson b "$SINK" '$a + $b')"
        fi
        echo "tiers=${tiers}" >> "$GITHUB_OUTPUT"
        echo "matrix tiers: ${tiers}"

    # Phase 6: per-area path filter for push events. workflow_dispatch
    # keeps the manual `areas` input as an override so an operator can
    # force a partial or full re-deploy without a fresh push.
    #
    # Note .github/workflows/app.yml is deliberately NOT in any filter:
    # a workflow-only change still triggers this run (via on.push.paths)
    # and setup will execute as a parse-check smoke test, but no area
    # job fires. If a workflow change needs to be tested against a real
    # area, use workflow_dispatch with the right `areas` input - cheaper
    # than auto-rebuilding all six areas on every push that happens to
    # touch the workflow file.
    #
    # The docker area is additionally filtered per TIER (the docker_*
    # keys; phase 1 of docs/0.10.x/per-tier-docker-deploy-plan.md).
    # The dependency graph the filters encode:
    #   - every tier owns docker/<tier>/**
    #   - the three core mail tiers (imap, smtp-in, smtp-out) also
    #     consume docker/shared/** and exactly one sendmail template
    #     from docker/templates/ (imap-/in-/out-sendmail.mc)
    #   - sinkhole and the monitoring tiers are self-contained
    #   - deploy-ecs-service.sh and ecr-scan-report.sh run for every
    #     tier; prepull-image.sh runs for imap only
    # A new COPY in a Dockerfile needs a matching filter entry here;
    # the check-tier-filters step above fails the run if they drift.
    # Keep comments out of the docker_* filter lists - the checker's
    # parser treats a non-list line as the end of a tier's block.
    - name: changed-paths
      id: filter
      if: github.event_name == 'push'
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
      with:
        # base MUST be the pushed branch. paths-filter's base defaults
        # to the repository default branch (main), which makes a push
        # to stage / development diff the branch's ENTIRE divergence
        # from main rather than the commits just pushed - so a stage
        # push re-deployed every area (and every docker tier) in which
        # stage differed from main. With base == the pushed branch,
        # paths-filter switches to incremental event.before..after
        # detection. Pushes to main behaved this way all along (base
        # defaulted to main), so this only changes stage/development.
        base: ${{ github.ref_name }}
        filters: |
          docker:
            - 'docker/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/prepull-image.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_imap:
            - 'docker/imap/**'
            - 'docker/shared/**'
            - 'docker/templates/imap-sendmail.mc'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
            - '.github/scripts/prepull-image.sh'
          docker_smtp_in:
            - 'docker/smtp-in/**'
            - 'docker/shared/**'
            - 'docker/templates/in-sendmail.mc'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_smtp_out:
            - 'docker/smtp-out/**'
            - 'docker/shared/**'
            - 'docker/templates/out-sendmail.mc'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_sinkhole:
            - 'docker/sinkhole/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_uptime_kuma:
            - 'docker/uptime-kuma/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_ntfy:
            - 'docker/ntfy/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_healthchecks:
            - 'docker/healthchecks/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_prometheus:
            - 'docker/prometheus/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_alertmanager:
            - 'docker/alertmanager/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_grafana:
            - 'docker/grafana/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_cloudwatch_exporter:
            - 'docker/cloudwatch-exporter/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_blackbox_exporter:
            - 'docker/blackbox-exporter/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          docker_node_exporter:
            - 'docker/node-exporter/**'
            - '.github/scripts/deploy-ecs-service.sh'
            - '.github/scripts/ecr-scan-report.sh'
          lambda_api:
            - 'lambda/api/**'
            - '.github/scripts/build-api.sh'
            - '.github/scripts/build-api-one.sh'
            - '.github/scripts/deploy-lambda-zip.sh'
          lambda_counter:
            - 'lambda/counter/**'
            - '.github/scripts/build-counter.sh'
            - '.github/scripts/deploy-lambda-zip.sh'
          lambda_certbot:
            - 'lambda/certbot-renewal/**'
            - '.github/scripts/deploy-lambda-image.sh'
          react:
            - 'react/admin/**'
          front_door:
            - 'front-door/**'
            - '.github/scripts/render-front-door.py'

    - name: resolve-areas
      id: areas
      env:
        EVENT_NAME: ${{ github.event_name }}
        AREAS: ${{ inputs.areas }}
        DOCKER: ${{ steps.filter.outputs.docker }}
        LAMBDA_API: ${{ steps.filter.outputs.lambda_api }}
        LAMBDA_COUNTER: ${{ steps.filter.outputs.lambda_counter }}
        LAMBDA_CERTBOT: ${{ steps.filter.outputs.lambda_certbot }}
        REACT: ${{ steps.filter.outputs.react }}
        FRONT_DOOR: ${{ steps.filter.outputs.front_door }}
      run: |
        set -euo pipefail
        if [ "${EVENT_NAME}" = "push" ]; then
          # Push: trust dorny/paths-filter results.
          for pair in "docker:${DOCKER}" "lambda_api:${LAMBDA_API}" "lambda_counter:${LAMBDA_COUNTER}" "lambda_certbot:${LAMBDA_CERTBOT}" "react:${REACT}" "front_door:${FRONT_DOOR}"; do
            name="${pair%%:*}"
            val="${pair#*:}"
            if [ "${val}" = "true" ]; then
              echo "${name}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${name}=false" >> "$GITHUB_OUTPUT"
            fi
          done
        else
          # workflow_dispatch: parse the comma-separated areas input.
          normalised="$(echo "${AREAS}" | tr -d '[:space:]')"
          wanted=",${normalised},"
          is_on() {
            [ "${normalised}" = "all" ] && return 0
            case "${wanted}" in *",$1,"*) return 0 ;; *) return 1 ;; esac
          }
          for a in docker lambda_api lambda_counter lambda_certbot react front_door; do
            if is_on "${a}"; then
              echo "${a}=true" >> "$GITHUB_OUTPUT"
            else
              echo "${a}=false" >> "$GITHUB_OUTPUT"
            fi
          done
        fi

    # Phase 1 of docs/0.10.x/per-tier-docker-deploy-plan.md: narrow the
    # docker matrix to the tiers whose build inputs changed.
    #   push:     intersect the in-scope matrix with the per-tier
    #             docker_* filter results.
    #   dispatch: every tier in scope (the filter step is push-only and
    #             a manual run means "the whole docker area" - the
    #             escape hatch for first deploys, base-image refreshes,
    #             and catchups), optionally narrowed by force_tiers.
    # Emits a JSON array; the docker job skips entirely when it is [].
    - name: resolve-tiers
      id: tiers
      env:
        EVENT_NAME: ${{ github.event_name }}
        DOCKER_AREA: ${{ steps.areas.outputs.docker }}
        IN_SCOPE: ${{ steps.matrix.outputs.tiers }}
        FORCE_TIERS: ${{ inputs.force_tiers }}
        CH_IMAP: ${{ steps.filter.outputs.docker_imap }}
        CH_SMTP_IN: ${{ steps.filter.outputs.docker_smtp_in }}
        CH_SMTP_OUT: ${{ steps.filter.outputs.docker_smtp_out }}
        CH_SINKHOLE: ${{ steps.filter.outputs.docker_sinkhole }}
        CH_UPTIME_KUMA: ${{ steps.filter.outputs.docker_uptime_kuma }}
        CH_NTFY: ${{ steps.filter.outputs.docker_ntfy }}
        CH_HEALTHCHECKS: ${{ steps.filter.outputs.docker_healthchecks }}
        CH_PROMETHEUS: ${{ steps.filter.outputs.docker_prometheus }}
        CH_ALERTMANAGER: ${{ steps.filter.outputs.docker_alertmanager }}
        CH_GRAFANA: ${{ steps.filter.outputs.docker_grafana }}
        CH_CLOUDWATCH_EXPORTER: ${{ steps.filter.outputs.docker_cloudwatch_exporter }}
        CH_BLACKBOX_EXPORTER: ${{ steps.filter.outputs.docker_blackbox_exporter }}
        CH_NODE_EXPORTER: ${{ steps.filter.outputs.docker_node_exporter }}
      run: |
        set -euo pipefail
        changed='[]'
        if [ "${DOCKER_AREA}" != "true" ]; then
          : # docker area not flagged; no tiers to build
        elif [ "${EVENT_NAME}" = "push" ]; then
          for t in $(jq -r '.[]' <<<"${IN_SCOPE}"); do
            key="CH_$(echo "${t}" | tr 'a-z-' 'A-Z_')"
            if [ "${!key:-false}" = "true" ]; then
              changed="$(jq -c --arg t "${t}" '. + [$t]' <<<"${changed}")"
            fi
          done
        elif [ -z "${FORCE_TIERS}" ]; then
          changed="${IN_SCOPE}"
        else
          requested="$(echo "${FORCE_TIERS}" | tr -d '[:space:]' | jq -cR 'split(",") | map(select(length > 0))')"
          changed="$(jq -cn --argjson a "${IN_SCOPE}" --argjson b "${requested}" '$a - ($a - $b)')"
          unknown="$(jq -cn --argjson a "${IN_SCOPE}" --argjson b "${requested}" '($b - $a) | join(", ")' -r)"
          if [ -n "${unknown}" ]; then
            echo "::warning::force_tiers entries not in the matrix for this environment (skipped): ${unknown}"
          fi
        fi
        echo "changed_tiers=${changed}" >> "$GITHUB_OUTPUT"
        echo "changed tiers: ${changed}"

    # Surface which area jobs are flagged for build/deploy so the gate
    # reviewer can see the blast radius BEFORE approving. This must live
    # in setup, not in the approval job: approval is gated on the
    # gate-${env} environment and does not run until after approval, so
    # a summary there could never be seen before the approve decision.
    # setup runs first (no gate), so this output is visible while the run
    # waits at the gate. Reads the per-area flags resolve-areas just
    # computed (push: dorny/paths-filter; workflow_dispatch: the `areas`
    # input). Written to both the log and the run's step summary.
    - name: flagged-summary
      env:
        DOCKER: ${{ steps.areas.outputs.docker }}
        LAMBDA_API: ${{ steps.areas.outputs.lambda_api }}
        LAMBDA_COUNTER: ${{ steps.areas.outputs.lambda_counter }}
        LAMBDA_CERTBOT: ${{ steps.areas.outputs.lambda_certbot }}
        REACT: ${{ steps.areas.outputs.react }}
        FRONT_DOOR: ${{ steps.areas.outputs.front_door }}
        CHANGED_TIERS: ${{ steps.tiers.outputs.changed_tiers }}
      run: |
        set -euo pipefail
        FLAGGED=()
        for pair in "docker:${DOCKER}" "lambda_api:${LAMBDA_API}" "lambda_counter:${LAMBDA_COUNTER}" "lambda_certbot:${LAMBDA_CERTBOT}" "react:${REACT}" "front_door:${FRONT_DOOR}"; do
          name="${pair%%:*}"
          val="${pair#*:}"
          if [ "${val}" = "true" ]; then
            if [ "${name}" = "docker" ]; then
              # Show the per-tier blast radius, not just the area: the
              # docker matrix only builds the tiers listed here.
              tier_list="$(jq -r 'join(", ")' <<<"${CHANGED_TIERS}")"
              FLAGGED+=("docker (tiers: ${tier_list:-none})")
            else
              FLAGGED+=("${name}")
            fi
          fi
        done
        echo "### Components flagged for build/deploy" >> "$GITHUB_STEP_SUMMARY"
        if [ "${#FLAGGED[@]}" -eq 0 ]; then
          echo "No components flagged for build/deploy."
          echo "_None._" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "Components flagged for build/deploy: ${FLAGGED[*]}"
          for c in "${FLAGGED[@]}"; do
            echo "- ${c}" >> "$GITHUB_STEP_SUMMARY"
          done
        fi

  approval:
    needs: setup
    environment: gate-${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    runs-on: ubuntu-latest
    steps:
    # Deployment gate only. The blast-radius summary that used to live
    # here moved to setup's flagged-summary step: this job is gated on
    # the gate-${env} environment and does not run until after approval,
    # so the summary could never be seen before the approve decision.
    # This step just records the approval in the log.
    - name: approve
      run: echo "Approved"

  docker:
    # The matrix below reads `fromJson(needs.setup.outputs.changed_tiers)`,
    # and a job's matrix can only resolve `needs.<job>.outputs` for jobs
    # named directly in its own `needs` - `approval` (which needs setup)
    # does not re-export setup's outputs. With only `approval` here the
    # matrix got empty input and errored at strategy evaluation. `approval`
    # provides the deployment gate; `setup` provides image_tag,
    # changed_tiers, and the per-area path-filter flags. (The other area
    # jobs read needs.setup only from `if`, which resolved fine via the
    # transitive dependency and was unaffected, but they list setup too
    # for correctness/consistency.)
    #
    # changed_tiers is the per-tier subset of the in-scope matrix whose
    # build inputs changed (resolve-tiers in setup); the != '[]' guard
    # skips the job before the matrix would error on an empty array, e.g.
    # a docker/** change that belongs to no tier filter.
    needs: [setup, approval]
    if: needs.setup.outputs.docker == 'true' && needs.setup.outputs.changed_tiers != '[]'
    runs-on: ubuntu-24.04-arm
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    strategy:
      fail-fast: false
      matrix:
        tier: ${{ fromJson(needs.setup.outputs.changed_tiers) }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    - name: configure-aws-credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
      with:
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: login-to-ecr
      id: ecr
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        REGION=${{ secrets.AWS_REGION }}
        REGISTRY="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"
        aws ecr get-login-password --region "${REGION}" \
          | docker login --username AWS --password-stdin "${REGISTRY}"
        echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

    - name: set-up-buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

    - name: build-and-push
      run: |
        IMAGE="${{ steps.ecr.outputs.registry }}/cabal-${{ matrix.tier }}"
        TAG="${{ needs.setup.outputs.image_tag }}"
        # Provenance attestations (buildx default, mode=min) are pushed to
        # ECR alongside the image as the SLSA build record. Do not re-add
        # --provenance=false: the manifest-list interop issue that once
        # required it is resolved. See docs/0.10.x/supply-chain-hardening-plan.md.
        docker buildx build \
          --platform linux/arm64 \
          -f docker/${{ matrix.tier }}/Dockerfile \
          -t "${IMAGE}:${TAG}" \
          --push \
          docker/

    # Pre-pull the freshly pushed image onto the cluster's container
    # instance(s) while the old IMAP task is still serving, so the roll
    # below does not pay the 30-60s cold layer pull inside its zero-task
    # window. Fail-soft: any failure (missing SSM grants, no instances,
    # pull error) logs a warning and the deploy proceeds on the slow
    # path. imap only - the smtp tiers roll with overlap, so pull time
    # there is not client-facing. Phase 4 of
    # docs/0.10.x/imap-deploy-downtime-plan.md.
    - name: prepull-image
      if: matrix.tier == 'imap'
      run: |
        ./.github/scripts/prepull-image.sh \
          "${{ matrix.tier }}" \
          "${{ needs.setup.outputs.image_tag }}"

    # Out-of-band ECS deploy: clones running task def, rewrites the
    # image tag for cabal-${tier}, registers a new revision, and rolls
    # the service. For imap the script also runs a PREFLIGHT one-shot
    # task against the new revision (aborting the deploy while the old
    # task is still serving if it fails) and raises the planned-
    # maintenance flag - which 503s the IMAP-backed Lambdas the moment
    # it is set - only after that preflight passes, immediately before
    # the roll. The new container clears the flag once Dovecot is
    # serving (docker/shared/clear-maintenance.sh).
    # See .github/scripts/deploy-ecs-service.sh.
    - name: deploy
      run: |
        ./.github/scripts/deploy-ecs-service.sh \
          "${{ matrix.tier }}" \
          "${{ needs.setup.outputs.image_tag }}"

    # The cloudwatch-exporter image is consumed by two ECS services:
    # the primary (cabal-cloudwatch-exporter) handles the home region,
    # and the us-east-1-pinned task (cabal-cloudwatch-exporter-us-east-1)
    # picks up CloudFront. Roll the second service with the same image
    # tag so they don't drift.
    - name: deploy-cloudwatch-exporter-us-east-1
      if: matrix.tier == 'cloudwatch-exporter'
      run: |
        ./.github/scripts/deploy-ecs-service.sh \
          "${{ matrix.tier }}" \
          "${{ needs.setup.outputs.image_tag }}" \
          cabal-mail \
          cabal-cloudwatch-exporter-us-east-1

    # Advisory: read the ECR scan-on-push result for the image we just
    # pushed and report severity counts into the job summary, warning on
    # HIGH/CRITICAL. Soft-fail by design (the script always exits 0) so a
    # CVE in the base image never blocks a mail deploy while we establish
    # a baseline. See .github/scripts/ecr-scan-report.sh.
    - name: report-ecr-scan
      run: |
        ./.github/scripts/ecr-scan-report.sh \
          "${{ matrix.tier }}" \
          "${{ needs.setup.outputs.image_tag }}"

  lambda-certbot:
    needs: [setup, approval]
    if: needs.setup.outputs.lambda_certbot == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    - name: configure-aws-credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
      with:
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: login-to-ecr
      id: ecr
      run: |
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        REGION=${{ secrets.AWS_REGION }}
        REGISTRY="${ACCOUNT_ID}.dkr.ecr.${REGION}.amazonaws.com"
        aws ecr get-login-password --region "${REGION}" \
          | docker login --username AWS --password-stdin "${REGISTRY}"
        echo "registry=${REGISTRY}" >> "$GITHUB_OUTPUT"

    - name: set-up-buildx
      uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

    - name: build-and-push
      id: image
      run: |
        IMAGE="${{ steps.ecr.outputs.registry }}/cabal/certbot-renewal"
        TAG="${{ needs.setup.outputs.image_tag }}"
        # Provenance stays OFF for this image, unlike the mail tiers above.
        # This is a Lambda container image (deploy-lambda-image.sh runs
        # `aws lambda update-function-code --image-uri`), and Lambda rejects
        # the multi-manifest OCI index that buildx produces when provenance
        # is attached -- it requires a single image manifest. Keeping the
        # SLSA attestation here would break the certbot deploy.
        docker buildx build \
          --platform linux/arm64 \
          --provenance=false \
          -t "${IMAGE}:${TAG}" \
          --push \
          lambda/certbot-renewal/
        echo "uri=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

    - name: deploy
      run: |
        ./.github/scripts/deploy-lambda-image.sh \
          cabal-certbot-renewal \
          "${{ steps.image.outputs.uri }}"

  lambda-api:
    needs: [setup, approval]
    if: needs.setup.outputs.lambda_api == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    - name: configure-aws-credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
      with:
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: pylint
      run: pip install pylint && cd ./lambda/api && pylint --rcfile .pylintrc _shared/*.py */function.py

    - name: build
      env:
        TF_VAR_CONTROL_DOMAIN: ${{ vars.TF_VAR_CONTROL_DOMAIN }}
      run: ./.github/scripts/build-api.sh

    # Out-of-band Lambda deploy. The api functions are registered with
    # function_name == directory name (see modules/app/modules/call), so
    # the dir name doubles as the AWS function name. healthchecks_iac is
    # excluded for now: phase 2 left it on the legacy in-Terraform
    # invocation flow because aws_lambda_invocation triggers on its
    # source_code_hash and freezing that trigger would block config.py
    # changes from propagating. Phase 3 leaves Terraform as the deploy
    # path for healthchecks_iac (build-api.sh still uploads its zip);
    # a follow-on swaps it to an explicit aws lambda invoke after a
    # code deploy. Directories starting with "_" (currently _shared/)
    # are build-time scaffolding, not Lambda functions. Functions
    # whose Terraform module is gated off in this environment (e.g.
    # alert_sink and backup_heartbeat when vars.TF_VAR_MONITORING !=
    # 'true') do not exist in AWS; we skip them with a warning rather
    # than fail the run, since build-api.sh uploads a zip for every
    # directory unconditionally.
    # Eligibility (skip healthchecks_iac and _* scaffolding, skip
    # functions whose module is gated off in this environment) is
    # decided serially against aws lambda get-function. The actual
    # update-function-code + wait function-updated calls are then
    # dispatched under xargs -P so the wall time is dominated by the
    # slowest single function rather than the sum of ~30 sequential
    # waits. AWS does not rate-limit update-function-code across
    # distinct functions at any level we'd hit here.
    - name: deploy
      env:
        TF_VAR_CONTROL_DOMAIN: ${{ vars.TF_VAR_CONTROL_DOMAIN }}
        DEPLOY_JOBS: '8'
      run: |
        set -euo pipefail
        BUCKET="admin.${TF_VAR_CONTROL_DOMAIN}"
        TARGETS=()
        SKIPPED=()
        for FUNC_DIR in lambda/api/*/ ; do
          FUNC=$(basename "${FUNC_DIR}")
          case "${FUNC}" in
            healthchecks_iac|_*) continue ;;
          esac
          if ! aws lambda get-function --function-name "${FUNC}" >/dev/null 2>&1; then
            echo "::warning::function ${FUNC} not deployed in this environment; skipping"
            SKIPPED+=("${FUNC}")
            continue
          fi
          TARGETS+=("${FUNC}")
        done
        if [ "${#SKIPPED[@]}" -gt 0 ]; then
          echo "skipped (not deployed in this environment): ${SKIPPED[*]}"
        fi
        if [ "${#TARGETS[@]}" -eq 0 ]; then
          echo "no api functions to deploy"
          exit 0
        fi
        printf '%s\n' "${TARGETS[@]}" | xargs -P "${DEPLOY_JOBS}" -I {} ./.github/scripts/deploy-lambda-zip.sh {} "${BUCKET}"

  lambda-counter:
    needs: [setup, approval]
    if: needs.setup.outputs.lambda_counter == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    - name: configure-aws-credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
      with:
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: pylint
      run: pip install pylint && pylint --rcfile ./lambda/api/.pylintrc ./lambda/counter/*/function.py

    - name: build
      env:
        TF_VAR_CONTROL_DOMAIN: ${{ vars.TF_VAR_CONTROL_DOMAIN }}
      run: ./.github/scripts/build-counter.sh

    - name: deploy
      env:
        TF_VAR_CONTROL_DOMAIN: ${{ vars.TF_VAR_CONTROL_DOMAIN }}
      run: |
        BUCKET="admin.${TF_VAR_CONTROL_DOMAIN}"
        ./.github/scripts/deploy-lambda-zip.sh assign_osid "${BUCKET}"
        ./.github/scripts/deploy-lambda-zip.sh check_invite "${BUCKET}"

  react:
    needs: [setup, approval]
    if: needs.setup.outputs.react == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    - name: configure-aws-credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
      with:
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: build
      env:
        NODE_ENV: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
      run: cd react/admin && npm ci && npm run build

    - name: upload
      env:
        TF_VAR_CONTROL_DOMAIN: ${{ vars.TF_VAR_CONTROL_DOMAIN }}
      run: |
        # Verify the bucket is owned by this account before syncing; the
        # high-level `aws s3 sync` cannot take --expected-bucket-owner, so
        # this head-bucket preflight is the fail-closed gate.
        ./.github/scripts/verify-bucket-owner.sh "admin.${TF_VAR_CONTROL_DOMAIN}"
        aws s3 sync react/admin/dist "s3://admin.${TF_VAR_CONTROL_DOMAIN}" --no-progress

    - name: invalidate-cache
      run: |
        DIST_ID=$(aws ssm get-parameter \
          --name "/cabal/react-config/cf-distribution" \
          --query 'Parameter.Value' --output text)
        aws cloudfront create-invalidation \
          --distribution-id "${DIST_ID}" \
          --paths '/*' >/dev/null

  front-door:
    needs: [setup, approval]
    if: needs.setup.outputs.front_door == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

    - name: configure-aws-credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4.3.1
      with:
        role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Substitute {{VAR}} placeholders in front-door/* with values from
    # environment variables of the same name. Anything left as a
    # literal {{...}} after this step is reported as a ::warning:: by
    # the render script (see .github/scripts/render-front-door.py).
    # Add new placeholders here as the front door copy grows; they
    # can come from `vars`, `secrets`, or computed values (like
    # BUILD_SHA).
    - name: render
      env:
        SITE_VERSION: ${{ github.ref_name }}
        BUILD_SHA: ${{ github.sha }}
        OPERATOR_NAME: ${{ vars.OPERATOR_NAME }}
        OPERATOR_EMAIL: ${{ vars.OPERATOR_EMAIL }}
        CONTROL_DOMAIN: ${{ vars.TF_VAR_CONTROL_DOMAIN }}
      run: ./.github/scripts/render-front-door.py

    - name: upload
      env:
        TF_VAR_CONTROL_DOMAIN: ${{ vars.TF_VAR_CONTROL_DOMAIN }}
      run: |
        # Verify the bucket is owned by this account before syncing; the
        # high-level `aws s3 sync` cannot take --expected-bucket-owner, so
        # this head-bucket preflight is the fail-closed gate.
        ./.github/scripts/verify-bucket-owner.sh "www.${TF_VAR_CONTROL_DOMAIN}"
        aws s3 sync front-door-rendered "s3://www.${TF_VAR_CONTROL_DOMAIN}" \
          --delete \
          --no-progress

    - name: invalidate-cache
      run: |
        DIST_ID=$(aws ssm get-parameter \
          --name "/cabal/front-door/cf-distribution" \
          --query 'Parameter.Value' --output text)
        aws cloudfront create-invalidation \
          --distribution-id "${DIST_ID}" \
          --paths '/*' >/dev/null
