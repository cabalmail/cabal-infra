---
name: Build and Deploy Terraform Infrastructure

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g. sha-abc12345). Updates SSM parameter /cabal/deployed_image_tag.'
        required: false
        type: string
  workflow_call:
    inputs:
      image_tag:
        description: 'Docker image tag to deploy (e.g. sha-abc12345). Updates SSM parameter /cabal/deployed_image_tag.'
        required: false
        type: string
  repository_dispatch:
    types: [trigger_build]
  push:
    paths:
      - 'terraform/infra'
      - 'terraform/infra/*'
      - 'terraform/infra/*/**'
      - '.github/workflows/terraform.yml'
      - '.github/scripts/make-terraform.sh'
      - '.github/scripts/plan-terraform.sh'
      - '.github/scripts/refresh-ssm-from-running.sh'
      - '.github/scripts/record-lambda-hashes.sh'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: generate-versions
      run: env TF_MODULE=infra TF_ENVIRONMENT="${{ vars.TF_VAR_ENVIRONMENT }}" ./.github/scripts/make-terraform.sh
    - name: debug-1
      run: cat ./terraform/infra/backend.tf
    - name: debug-2
      run: echo "${{ vars.TF_VAR_ENVIRONMENT }}"
    - name: store-artifact
      uses: actions/upload-artifact@v5
      with:
        name: backend.tf
        path: ./terraform/infra/backend.tf
  # docs:
  #   runs-on: ubuntu-latest
  #   steps:
  #   - uses: actions/checkout@v2
  #     with:
  #       ref: ${{ github.event.pull_request.head.ref }}
  #   - name: Render terraform docs for infra and push changes back to PR
  #     uses: terraform-docs/gh-actions@main
  #     with:
  #       working-dir: ./terraform/infra
  #       output-file: README.md
  #       output-method: replace
  #       recursive: "true"
  #       git-push: "true"
  #   - name: Render terraform docs for dns and push changes back to PR
  #     uses: terraform-docs/gh-actions@main
  #     with:
  #       working-dir: ./terraform/dns
  #       output-file: README.md
  #       output-method: inject
  #       git-push: "true"
  chekov:
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: retrieve-artifact
      uses: actions/download-artifact@v5
      with:
        name: backend.tf
    - name: move
      run: mv backend.tf ./terraform/infra/backend.tf
    - name: chekov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: terraform/infra/
        quiet: true
        soft_fail: true
        framework: terraform
        download_external_modules: false
  tflint:
    runs-on: ubuntu-latest
    needs:
    - build
    defaults:
      run:
        working-directory: ./terraform/infra
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: retrieve-artifact
      uses: actions/download-artifact@v5
      with:
        name: backend.tf
    - name: move
      run: mv ../../backend.tf backend.tf
    - name: install-linters
      run: curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
    - name: initialize-linter
      run: tflint --version && tflint --init
    - name: run-linter
      run: for i in ./ modules/* modules/*/modules/* ; do tflint ; done
  tfsec:
    runs-on: ubuntu-latest
    needs:
    - build
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: retrieve-artifact
      uses: actions/download-artifact@v5
      with:
        name: backend.tf
    - name: move
      run: mv backend.tf ./terraform/infra/backend.tf
    - name: tfsec
      uses: aquasecurity/tfsec-action@v1.0.0
      with:
        soft_fail: false
        working_directory: ./terraform/infra
  plan:
    runs-on: ubuntu-latest
    needs:
    - build
    outputs:
      exit_code: ${{ steps.plan-terraform.outputs.exit_code }}
    defaults:
      run:
        working-directory: ./terraform/infra
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      TF_API_TOKEN: ${{ secrets.TF_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: retrieve-artifact
      uses: actions/download-artifact@v5
      with:
        name: backend.tf
    - name: move
      run: mv ../../backend.tf backend.tf
    - name: install-terraform
      uses: hashicorp/setup-terraform@v2
      with:
        cli_config_credentials_token: ${{ secrets.TF_TOKEN }}
        terraform_wrapper: false
    - name: refresh-ssm-from-running
      # Reconciles /cabal/deployed_image_tag with the image tag actually
      # running on cabal-imap before plan, so a topology-only apply that
      # regenerates container_definitions does not roll back an
      # out-of-band app deploy. See phase 1 of
      # docs/0.9.0/build-deploy-simplification-plan.md. Steady-state
      # no-op until phase 3 introduces out-of-band deploys.
      run: ../../.github/scripts/refresh-ssm-from-running.sh
    - name: update-image-tag-in-ssm
      if: inputs.image_tag != ''
      run: |
        aws ssm put-parameter \
          --name "/cabal/deployed_image_tag" \
          --value "${{ inputs.image_tag }}" \
          --type String \
          --overwrite
    - name: tfvars-terraform
      run: |
        echo "availability_zones = ${{ vars.TF_VAR_AVAILABILITY_ZONES}}" > terraform.tfvars
        echo "aws_region = \"${{ vars.TF_VAR_AWS_REGION}}\"" >> terraform.tfvars
        echo "cidr_block = \"${{ vars.TF_VAR_CIDR_BLOCK}}\"" >> terraform.tfvars
        echo "control_domain = \"${{ vars.TF_VAR_CONTROL_DOMAIN}}\"" >> terraform.tfvars
        echo "email = \"${{ vars.TF_VAR_EMAIL }}\"" >> terraform.tfvars
        echo "environment = \"${{ vars.TF_VAR_ENVIRONMENT }}\"" >> terraform.tfvars
        echo "mail_domains = ${{ vars.TF_VAR_MAIL_DOMAINS }}" >> terraform.tfvars
        echo "repo = \"${{ vars.TF_VAR_REPO }}\"" >> terraform.tfvars
        echo "backup = ${{ vars.TF_VAR_BACKUP }}" >> terraform.tfvars
        echo "monitoring = ${{ vars.TF_VAR_MONITORING }}" >> terraform.tfvars
        echo "healthchecks_registration_open = ${{ vars.TF_VAR_HEALTHCHECKS_REGISTRATION_OPEN || 'false' }}" >> terraform.tfvars
        echo "prod = ${{ vars.TF_VAR_PROD }}" >> terraform.tfvars
        echo "quiesced = ${{ vars.TF_VAR_QUIESCED || 'false' }}" >> terraform.tfvars
    - name: init-terraform
      run: terraform init
    - name: record-lambda-hashes
      # Records currently-deployed Lambda CodeSha256 values into
      # .terraform/lambda-pinned.tfvars so terraform plan can pin
      # against running code identity after phase 3 introduces
      # out-of-band Lambda deploys. See phase 2 of
      # docs/0.9.0/build-deploy-simplification-plan.md. Steady-state
      # no-op until phase 3 lands. Runs after init so .terraform/
      # exists.
      run: ../../.github/scripts/record-lambda-hashes.sh
    - name: plan-terraform
      id: plan-terraform
      run: ../../.github/scripts/plan-terraform.sh

  apply:
    needs:
    - plan
    - chekov
    - tflint
    - tfsec
    if: needs.plan.outputs.exit_code == '2'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/infra
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      TF_API_TOKEN: ${{ secrets.TF_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: retrieve-artifact
      uses: actions/download-artifact@v5
      with:
        name: backend.tf
    - name: move
      run: mv ../../backend.tf backend.tf
    - name: install-terraform
      uses: hashicorp/setup-terraform@v2
      with:
        cli_config_credentials_token: ${{ secrets.TF_TOKEN }}
    - name: tfvars-terraform
      run: |
        echo "availability_zones = ${{ vars.TF_VAR_AVAILABILITY_ZONES}}" > terraform.tfvars
        echo "aws_region = \"${{ vars.TF_VAR_AWS_REGION}}\"" >> terraform.tfvars
        echo "cidr_block = \"${{ vars.TF_VAR_CIDR_BLOCK}}\"" >> terraform.tfvars
        echo "control_domain = \"${{ vars.TF_VAR_CONTROL_DOMAIN}}\"" >> terraform.tfvars
        echo "email = \"${{ vars.TF_VAR_EMAIL }}\"" >> terraform.tfvars
        echo "environment = \"${{ vars.TF_VAR_ENVIRONMENT }}\"" >> terraform.tfvars
        echo "mail_domains = ${{ vars.TF_VAR_MAIL_DOMAINS }}" >> terraform.tfvars
        echo "repo = \"${{ vars.TF_VAR_REPO }}\"" >> terraform.tfvars
        echo "backup = ${{ vars.TF_VAR_BACKUP }}" >> terraform.tfvars
        echo "monitoring = ${{ vars.TF_VAR_MONITORING }}" >> terraform.tfvars
        echo "healthchecks_registration_open = ${{ vars.TF_VAR_HEALTHCHECKS_REGISTRATION_OPEN || 'false' }}" >> terraform.tfvars
        echo "prod = ${{ vars.TF_VAR_PROD }}" >> terraform.tfvars
        echo "quiesced = ${{ vars.TF_VAR_QUIESCED || 'false' }}" >> terraform.tfvars
    - name: init-terraform
      run: terraform init
    - name: record-lambda-hashes
      # See plan job for rationale. Re-records the deployed Lambda
      # CodeSha256 values in this fresh apply-job workspace so the
      # -var-file value seen by plan is also seen by apply.
      run: ../../.github/scripts/record-lambda-hashes.sh
    - name: apply-terraform
      id: apply-terraform
      run: |
        set +e
        terraform apply -auto-approve -lock-timeout=30m -var-file="terraform.tfvars" -var-file=".terraform/lambda-pinned.tfvars" 2>&1 | tee /tmp/tf-apply.log
        TF_EXIT=${PIPESTATUS[0]}
        set -e
        if [ $TF_EXIT -ne 0 ]; then
          if grep -q 'aws_pinpointsmsvoicev2_phone_number.sms' /tmp/tf-apply.log && grep -q "timeout while waiting for state to become 'ACTIVE'" /tmp/tf-apply.log; then
            echo "::warning::Toll-free number provisioning timed out. Untainting resource for next run."
            terraform untaint 'module.pool.aws_pinpointsmsvoicev2_phone_number.sms'
            exit 0
          fi
          exit $TF_EXIT
        fi
