---
name: Build and Deploy Cookbook

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger_build]
  push:
    paths:
      - 'chef/**'
      - '.github/workflows/cookbook.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    steps:
    - name: checkout
      uses: actions/checkout@main
    - name: package
      run: cd chef && tar -czf ../cabal.tar.gz cabal/
    - name: store-artifact
      uses: actions/upload-artifact@v4
      with:
        name: cookbook
        path: cabal.tar.gz
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    needs: build
    steps:
    - name: configure-aws-cli
      run: |
        aws configure --profile deploy_cookbook <<-EOF > /dev/null 2>&1
        ${{ secrets.AWS_ACCESS_KEY_ID }}
        ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        ${{ secrets.AWS_REGION }}
        json
        EOF
    - name: retrieve-artifact
      uses: actions/download-artifact@v4
      with:
        name: cookbook
    - name: upload
      env:
        TF_VAR_CONTROL_DOMAIN: ${{ vars.TF_VAR_CONTROL_DOMAIN }}
      run: aws s3 cp cabal.tar.gz "s3://admin.${TF_VAR_CONTROL_DOMAIN}/cabal.tar.gz" --profile deploy_cookbook --no-progress --acl private
