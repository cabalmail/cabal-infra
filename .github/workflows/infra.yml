---
name: Build and Deploy Infrastructure

# Phase 5 of docs/0.9.x/build-deploy-simplification-plan.md replaced
# the legacy terraform.yml + bootstrap.yml workflows with this single
# infra.yml that owns both the bootstrap (terraform/dns) stage and the
# main (terraform/infra) stage. Bootstrap is gated on whether
# terraform/dns/** changed or on a workflow_dispatch input, so a
# steady-state push that only touches terraform/infra/** runs the
# bootstrap job in 0s and proceeds straight to plan/apply.
#
# Phase 5 also added a post-apply step that rolls every ECS service to
# the latest ACTIVE revision in its task-definition family. Phase 1
# (shipped in 0.9.3) added ignore_changes = [task_definition] to every
# aws_ecs_service so out-of-band app deploys are not rolled back, but
# that means a topology-only Terraform apply (cpu/memory/env/IAM)
# registers a new task-def revision and the service stays pinned to
# the old one. The post-apply step closes that gap.
#
# Phase 6 (shipped in 0.9.5) deleted the dual-pipeline escape hatch
# (terraform-legacy.yml) and the legacy app workflows that chained
# into it; infra.yml is now the only Terraform pipeline.
#
# 0.10.12 closed the app.yml/infra.yml stale-image race (CHANGELOG
# 0.10.9): the plan job's wait-for-app-deploy step orders this workflow
# behind any sibling app.yml run for the same push, so
# refresh-ssm-from-running reads the post-roll image tag instead of a
# pre-roll (stale) one before a marker-triggered task-def re-registration
# pins it.

on:
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Force run of the bootstrap (terraform/dns) stage even when the path filter would skip it.'
        required: false
        default: false
        type: boolean
      image_tag:
        description: 'Docker image tag to pin for the mail tiers (e.g. sha-abc12345). Written to /cabal/deployed_image_tag and the per-tier imap/smtp-in/smtp-out keys; the tag must exist in each tier ECR repo. Leave empty to defer to refresh-ssm-from-running.sh.'
        required: false
        type: string
  push:
    # Only the three named branches deploy. Pushes from feature branches
    # or tags do not trigger this workflow. See CLAUDE.md "Branches and
    # environments".
    branches:
      - main
      - stage
      - development
    paths:
      - 'terraform/dns/**'
      - 'terraform/infra/**'
      - '.github/workflows/infra.yml'
      - '.github/scripts/make-terraform.sh'
      - '.github/scripts/plan-terraform.sh'
      - '.github/scripts/refresh-ssm-from-running.sh'
      - '.github/scripts/wait-for-app-deploy.sh'
      - '.github/scripts/record-lambda-hashes.sh'
      - '.github/scripts/post-apply-update-services.sh'
      - '.github/scripts/annotate-terraform-outputs.sh'

permissions:
  contents: read
  # wait-for-app-deploy.sh (plan job) queries the GitHub Actions API for
  # the sibling app.yml run on this commit so the Terraform plan orders
  # itself behind any concurrent image roll. Read-only.
  actions: read
  # Phase 1 of docs/0.10.x/iac-quality-gates-plan.md: the scanner jobs
  # (checkov / tflint / trivy, both stacks) upload SARIF to GitHub code
  # scanning via github/codeql-action/upload-sarif. This repo is public,
  # so code scanning is available without GitHub Advanced Security.
  security-events: write

# Serialize Terraform applies per ref so back-to-back pushes do not
# race for the state lock. cancel-in-progress: false because we never
# want to cancel an in-flight apply: a half-applied state is worse
# than a queued plan.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      dns: ${{ steps.filter.outputs.dns }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: filter
      id: filter
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
      with:
        filters: |
          dns:
            - 'terraform/dns/**'
          infra:
            - 'terraform/infra/**'
            - '.github/workflows/infra.yml'
            - '.github/scripts/make-terraform.sh'
            - '.github/scripts/plan-terraform.sh'
            - '.github/scripts/refresh-ssm-from-running.sh'
            - '.github/scripts/wait-for-app-deploy.sh'
            - '.github/scripts/record-lambda-hashes.sh'
            - '.github/scripts/post-apply-update-services.sh'
            - '.github/scripts/annotate-terraform-outputs.sh'

  bootstrap_build:
    needs: changes
    if: |
      (github.event_name == 'push' && needs.changes.outputs.dns == 'true') ||
      (github.event_name == 'workflow_dispatch' && inputs.bootstrap == true)
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: generate-backend
      run: env TF_MODULE=dns TF_ENVIRONMENT="${{ vars.TF_VAR_ENVIRONMENT }}" ./.github/scripts/make-terraform.sh
    - name: store-artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: dns-backend.tf
        path: ./terraform/dns/backend.tf

  # Phase 1 of docs/0.10.x/iac-quality-gates-plan.md: scan the bootstrap
  # (terraform/dns) stack, which previously had no scanners at all. These
  # mirror the infra-stage chekov / tflint / trivy jobs and are wired into
  # bootstrap_apply's `needs` below so the bootstrap apply blocks on them
  # the way the infra apply blocks (via `approval`) on the infra scanners.
  # Gating as of Phase 3: a finding not in the stack's baseline/ignore fails
  # the scanner job, which blocks the bootstrap apply. They scan the committed
  # source directly (no generated backend.tf), so the local `make scan` runner
  # sees exactly the same input CI does and produces the same verdict.
  checkov_dns:
    needs: bootstrap_build
    if: ${{ !cancelled() && needs.bootstrap_build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: check-suppression-justifications
      run: ./.github/scripts/check-suppression-justifications.sh terraform/dns
    - name: check-iam-resource-scope
      run: ./.github/scripts/check-iam-resource-scope.py terraform/dns
    - name: setup-python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.12'
    - name: install-checkov
      run: pip install checkov==3.2.530
    - name: checkov
      run: >
        checkov -d terraform/dns
        --config-file terraform/dns/.checkov.yaml
        --baseline terraform/dns/.checkov.baseline
        --compact
        -o cli -o sarif --output-file-path console,results.sarif
    - name: upload-sarif
      # Best-effort: a transient code-scanning upload hiccup must not fail
      # the scanner job (which approval / bootstrap_apply gate on). The scan
      # step's own result is the gate; the upload only surfaces findings.
      if: success() || failure()
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      with:
        sarif_file: results.sarif
        category: checkov-dns
    - name: baseline-drift
      # See the infra chekov job. dns baseline is empty, so this passes
      # trivially; kept for symmetry and to catch a future stale entry.
      run: |
        checkov -d terraform/dns --config-file terraform/dns/.checkov.yaml \
          --soft-fail --compact --quiet -o json > "$RUNNER_TEMP/checkov-all.json"
        python3 .github/scripts/baseline-diff.py checkov "$RUNNER_TEMP/checkov-all.json" terraform/dns/.checkov.baseline

  tflint_dns:
    needs: bootstrap_build
    if: ${{ !cancelled() && needs.bootstrap_build.result == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/dns
    env:
      # tflint does not search parent dirs; point it at the shared config
      # explicitly. Absolute path because --recursive lints each subdir.
      TFLINT_CONFIG_FILE: ${{ github.workspace }}/terraform/.tflint.hcl
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: install-tflint
      uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93  # v6.2.2
      with:
        tflint_version: v0.63.1
    - name: init-tflint
      run: tflint --init
    - name: run-linter
      # GATING (Phase 3): tflint exits 2 on any finding, failing the job. dns
      # is clean, so this passes; a new finding blocks the bootstrap apply.
      run: tflint --recursive --format sarif > tflint.sarif
    - name: upload-sarif
      # Best-effort: a transient code-scanning upload hiccup must not fail
      # the scanner job (which approval / bootstrap_apply gate on). The scan
      # step's own result is the gate; the upload only surfaces findings.
      if: success() || failure()
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      with:
        sarif_file: terraform/dns/tflint.sarif
        category: tflint-dns

  trivy_dns:
    needs: bootstrap_build
    if: ${{ !cancelled() && needs.bootstrap_build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: trivy
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        scan-type: config
        scan-ref: terraform/dns
        format: sarif
        output: trivy-dns.sarif
        # Pin the trivy binary so gate strictness only changes by a deliberate
        # bump (the action SHA pins the wrapper, not the binary). Matches the
        # version the baseline was verified against.
        version: v0.71.0
        trivyignores: terraform/dns/.trivyignore
        # GATING (Phase 3): exit 1 on any finding not in the ignorefile.
        exit-code: '1'
    - name: upload-sarif
      # Best-effort: a transient code-scanning upload hiccup must not fail
      # the scanner job (which approval / bootstrap_apply gate on). The scan
      # step's own result is the gate; the upload only surfaces findings.
      if: success() || failure()
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      with:
        sarif_file: trivy-dns.sarif
        category: trivy-dns
    - name: ignore-drift
      # See the infra trivy job. dns .trivyignore has no active ids, so this
      # passes trivially; kept for symmetry.
      run: |
        trivy config terraform/dns --format json --quiet > "$RUNNER_TEMP/trivy-all.json"
        python3 .github/scripts/baseline-diff.py trivy "$RUNNER_TEMP/trivy-all.json" terraform/dns/.trivyignore

  bootstrap_plan:
    needs: bootstrap_build
    runs-on: ubuntu-latest
    outputs:
      exit_code: ${{ steps.plan-terraform.outputs.exit_code }}
    defaults:
      run:
        working-directory: ./terraform/dns
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: retrieve-artifact
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
      with:
        name: dns-backend.tf
    - name: move
      run: mv ../../backend.tf backend.tf
    - name: install-terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
      with:
        terraform_wrapper: false
    - name: tfvars-terraform
      run: |
        echo "aws_region = \"${{ vars.TF_VAR_AWS_REGION}}\"" >> terraform.tfvars
        echo "repo = \"${{ vars.TF_VAR_REPO }}\"" >> terraform.tfvars
        echo "control_domain = \"${{ vars.TF_VAR_CONTROL_DOMAIN}}\"" >> terraform.tfvars
        echo "prod = ${{ vars.TF_VAR_PROD }}" >> terraform.tfvars
        echo "dnssec_enabled = ${{ vars.TF_VAR_DNSSEC_ENABLED || 'false' }}" >> terraform.tfvars
    - name: init-terraform
      run: terraform init
    - name: plan-terraform
      id: plan-terraform
      run: ../../.github/scripts/plan-terraform.sh

  bootstrap_approval:
    needs:
    - bootstrap_plan
    - checkov_dns
    - tflint_dns
    - trivy_dns
    # Manual approval gate for the bootstrap (terraform/dns) stage, mirroring
    # the infra-stage `approval` job between `plan` and `apply`. No
    # `!cancelled()` guard on purpose (unlike the infra-stage jobs): when
    # terraform/dns is unchanged the whole bootstrap chain upstream of this
    # job is skipped, and this gate should skip too rather than prompt for a
    # no-op approval - the default transitive-skip gives exactly that. (The
    # infra-stage jobs need `!cancelled()` because they sit downstream of the
    # dns-side bootstrap_apply via `build`, which is skipped on the common
    # push path; the bootstrap jobs have no such cross-stage skip to break.)
    # Gate on exit_code == 2 so the approval only fires when bootstrap_plan
    # actually has changes to apply, and on the dns scanners so the apply
    # blocks on them the way the infra apply blocks on the infra scanners.
    if: ${{ needs.bootstrap_plan.outputs.exit_code == '2' && needs.checkov_dns.result == 'success' && needs.tflint_dns.result == 'success' && needs.trivy_dns.result == 'success' }}
    environment: gate-${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    runs-on: ubuntu-latest
    steps:
    - name: approve
      run: echo "Approved"

  bootstrap_apply:
    needs:
    - bootstrap_approval
    - bootstrap_plan
    # bootstrap_plan stays in needs so this job can read its exit_code output
    # (the needs context only exposes listed jobs - depending on
    # bootstrap_approval alone would make that expression resolve to empty
    # and skip every real apply). The dns scanners are now gated by
    # bootstrap_approval, so they are no longer listed here. No `!cancelled()`
    # guard: when terraform/dns is unchanged every predecessor is skipped and
    # this job should skip too.
    if: ${{ needs.bootstrap_approval.result == 'success' && needs.bootstrap_plan.outputs.exit_code == '2' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/dns
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: retrieve-artifact
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
      with:
        name: dns-backend.tf
    - name: move
      run: mv ../../backend.tf backend.tf
    - name: install-terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
      with:
        # The wrapper interleaves its own bookkeeping lines into
        # terraform's stdout, which would corrupt the command
        # substitution in annotate-terraform-outputs.sh. Nothing in
        # this job consumes the wrapper's step outputs.
        terraform_wrapper: false
    - name: tfvars-terraform
      run: |
        echo "aws_region = \"${{ vars.TF_VAR_AWS_REGION}}\"" >> terraform.tfvars
        echo "repo = \"${{ vars.TF_VAR_REPO }}\"" >> terraform.tfvars
        echo "control_domain = \"${{ vars.TF_VAR_CONTROL_DOMAIN}}\"" >> terraform.tfvars
        echo "prod = ${{ vars.TF_VAR_PROD }}" >> terraform.tfvars
        echo "dnssec_enabled = ${{ vars.TF_VAR_DNSSEC_ENABLED || 'false' }}" >> terraform.tfvars
    - name: init-terraform
      run: terraform init
    - name: apply-terraform
      run: terraform apply -auto-approve -lock-timeout=30m -var-file="terraform.tfvars"
    - name: annotate-outputs
      # Surface the stack's Terraform outputs as a notice annotation on
      # the run summary page. For dns this is the nameserver set that
      # must be copied to the domain registrar (docs/registrar.md).
      run: ../../.github/scripts/annotate-terraform-outputs.sh

  build:
    needs: [changes, bootstrap_apply]
    if: |
      always() &&
      (needs.bootstrap_apply.result == 'success' || needs.bootstrap_apply.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.changes.outputs.infra == 'true'
      )
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: generate-backend
      run: env TF_MODULE=infra TF_ENVIRONMENT="${{ vars.TF_VAR_ENVIRONMENT }}" ./.github/scripts/make-terraform.sh
    - name: store-artifact
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: infra-backend.tf
        path: ./terraform/infra/backend.tf

  # The chekov / tflint / trivy / plan / apply / post_apply jobs each
  # prefix their `if:` with `!cancelled() &&`. GitHub Actions auto-
  # skips a downstream job whenever ANY transitive predecessor was
  # skipped, REGARDLESS of an explicit `if:` clause - unless the
  # `if:` includes `!cancelled()` or `always()` to force evaluation.
  # On the common push path (terraform/dns/** unchanged),
  # bootstrap_apply is skipped, build runs via `always()`, and
  # without the `!cancelled()` guard everything past build is auto-
  # skipped even though build's actual result is 'success'. The
  # `!cancelled() && needs.<upstream>.result == 'success'` form pins
  # each job to its immediate upstream's result and ignores the
  # transitive chain.
  # Phase 1 of docs/0.10.x/iac-quality-gates-plan.md rewrote these three
  # scanners: checkov pinned via pip (checkov==X.Y.Z; the checkov-action is
  # a Docker image with positional args and no output_file_path that mangled
  # output_format), tflint and trivy actions pinned to commit SHA (were a
  # curl|bash installer and a deprecated tfsec wrapper); the broken tflint
  # loop (which never cd'd, so it scanned the root N times and never saw the
  # modules) replaced with --recursive; tfsec replaced by Trivy IaC (same
  # Aqua engine, maintained); and each scanner uploads SARIF to GitHub code
  # scanning. Gating as of Phase 3 - a finding not in the baseline/ignore
  # fails the job, which blocks approval -> apply. The scanners read the
  # committed source directly (no generated backend.tf), so the local
  # `make scan` runner sees the same input and produces the same verdict.
  chekov:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: check-suppression-justifications
      run: ./.github/scripts/check-suppression-justifications.sh terraform/infra
    - name: check-iam-resource-scope
      run: ./.github/scripts/check-iam-resource-scope.py terraform/infra
    - name: setup-python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: '3.12'
    - name: install-checkov
      # Pinned tool version via pip rather than the checkov-action: that
      # action is a Docker image with positional args, no output_file_path
      # input, and no comma-split on output_format (it passed `-o cli,sarif`
      # as one value, which checkov rejects). pip gives the exact CLI the
      # Makefile uses (true local/CI parity) and an explicit version pin.
      run: pip install checkov==3.2.530
    - name: chekov
      # GATING (Phase 3). --config-file applies the CMK skip-check; --baseline
      # grandfathers the residual findings, so checkov exits non-zero (failing
      # the job, which blocks approval -> apply) only on a NEW finding not in
      # the baseline. A real checkov error also fails the job. Matches the
      # local `make scan` invocation exactly.
      run: >
        checkov -d terraform/infra
        --config-file terraform/infra/.checkov.yaml
        --baseline terraform/infra/.checkov.baseline
        --compact
        -o cli -o sarif --output-file-path console,results.sarif
    - name: upload-sarif
      # Best-effort: a transient code-scanning upload hiccup must not fail
      # the scanner job (which approval / bootstrap_apply gate on). The scan
      # step's own result is the gate; the upload only surfaces findings.
      if: success() || failure()
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      with:
        sarif_file: results.sarif
        category: checkov-infra
    - name: baseline-drift
      # Fail if a .checkov.baseline entry no longer matches a finding (stale -
      # the code was fixed but the grandfather entry was left behind). The
      # --soft-fail here only suppresses the finding-exit so the JSON is
      # produced; the gate is the --baseline run above. baseline-diff.py fails
      # the step on a stale entry, blocking approval -> apply.
      run: |
        checkov -d terraform/infra --config-file terraform/infra/.checkov.yaml \
          --soft-fail --compact --quiet -o json > "$RUNNER_TEMP/checkov-all.json"
        python3 .github/scripts/baseline-diff.py checkov "$RUNNER_TEMP/checkov-all.json" terraform/infra/.checkov.baseline

  tflint:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/infra
    env:
      # tflint does not search parent dirs; point it at the shared config
      # explicitly. Absolute path because --recursive lints each subdir.
      TFLINT_CONFIG_FILE: ${{ github.workspace }}/terraform/.tflint.hcl
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: install-tflint
      uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93  # v6.2.2
      with:
        tflint_version: v0.63.1
    - name: init-tflint
      run: tflint --init
    - name: run-linter
      # GATING (Phase 3): tflint exits 2 on any finding, failing the job (which
      # blocks approval -> apply). The stack is at zero findings; a new one
      # fails CI. No baseline - tflint findings are fixed outright, not carried.
      run: tflint --recursive --format sarif > tflint.sarif
    - name: upload-sarif
      # Best-effort: a transient code-scanning upload hiccup must not fail
      # the scanner job (which approval / bootstrap_apply gate on). The scan
      # step's own result is the gate; the upload only surfaces findings.
      if: success() || failure()
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      with:
        sarif_file: terraform/infra/tflint.sarif
        category: tflint-infra

  trivy:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: trivy
      uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
      with:
        scan-type: config
        scan-ref: terraform/infra
        format: sarif
        output: trivy-infra.sarif
        # Pin the trivy binary so gate strictness only changes by a deliberate
        # bump (the action SHA pins the wrapper, not the binary). Matches the
        # version the baseline was verified against.
        version: v0.71.0
        trivyignores: terraform/infra/.trivyignore
        # GATING (Phase 3): exit 1 on any finding not in the ignorefile.
        exit-code: '1'
    - name: upload-sarif
      # Best-effort: a transient code-scanning upload hiccup must not fail
      # the scanner job (which approval / bootstrap_apply gate on). The scan
      # step's own result is the gate; the upload only surfaces findings.
      if: success() || failure()
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      with:
        sarif_file: trivy-infra.sarif
        category: trivy-infra
    - name: ignore-drift
      # Fail if a .trivyignore id no longer matches a finding (stale). The
      # trivy binary (pinned above) is on PATH from the action.
      run: |
        trivy config terraform/infra --format json --quiet > "$RUNNER_TEMP/trivy-all.json"
        python3 .github/scripts/baseline-diff.py trivy "$RUNNER_TEMP/trivy-all.json" terraform/infra/.trivyignore

  plan:
    needs: build
    if: ${{ !cancelled() && needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      exit_code: ${{ steps.plan-terraform.outputs.exit_code }}
    defaults:
      run:
        working-directory: ./terraform/infra
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      # Passed via env (not echoed into tfvars) because TF_VAR_INVITATION_CODE
      # may contain shell-special characters - `$` in particular gets
      # expanded by bash inside double-quoted echo, silently truncating
      # the value. env-block substitution writes the literal string
      # into the process environment, and Terraform auto-picks up
      # TF_VAR_* env vars without any shell re-interpretation.
      TF_VAR_invitation_code: ${{ vars.TF_VAR_INVITATION_CODE }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: retrieve-artifact
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
      with:
        name: infra-backend.tf
    - name: move
      run: mv ../../backend.tf backend.tf
    - name: install-terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
      with:
        terraform_wrapper: false
    - name: wait-for-app-deploy
      # Cross-workflow ordering. If this same push also triggered app.yml
      # (a docker/lambda/react change landed alongside the terraform
      # change), block here until that app deploy run finishes before
      # reading the deployed image tag below. Without it, refresh-ssm-
      # from-running could read imap's pre-roll (stale) tag and a
      # marker-triggered task-def re-registration would pin the new task
      # def to the old image (the wedged smtp-in rollout in CHANGELOG
      # 0.10.9). No-op when app.yml was not triggered by this push (the
      # common terraform-only case). See the script header.
      env:
        GH_TOKEN: ${{ github.token }}
      run: ../../.github/scripts/wait-for-app-deploy.sh
    - name: refresh-ssm-from-running
      # Reconcile the per-tier /cabal/deployed_image_tag/<tier> keys
      # (and the legacy global key, kept tracking imap) with the image
      # tags actually running on the cabal-* services before plan, so a
      # topology-only apply that regenerates a task definition re-pins
      # each tier to its own running image rather than rolling back an
      # out-of-band app deploy. Waits for the rollouts to settle first
      # (see script header) so it never pins a mid-roll tag. Phase 2 of
      # docs/0.10.x/per-tier-docker-deploy-plan.md.
      run: ../../.github/scripts/refresh-ssm-from-running.sh
    - name: update-image-tag-in-ssm
      if: inputs.image_tag != ''
      # Operator pin for mail-tier rollbacks (see the lambda-5xx-spike
      # runbook). Writes the legacy global key plus the per-tier keys
      # for the core mail tiers - but only keys that already exist:
      # creating one here would collide with the Terraform resource
      # that seeds it, and a tier whose key is missing follows the
      # legacy parameter anyway via the sentinel fallback in main.tf.
      # Sinkhole and monitoring tiers are left alone; pin those by hand
      # if an exotic rollback ever needs it.
      run: |
        aws ssm put-parameter \
          --name "/cabal/deployed_image_tag" \
          --value "${{ inputs.image_tag }}" \
          --type String \
          --overwrite
        for tier in imap smtp-in smtp-out; do
          if aws ssm get-parameter --name "/cabal/deployed_image_tag/${tier}" >/dev/null 2>&1; then
            aws ssm put-parameter \
              --name "/cabal/deployed_image_tag/${tier}" \
              --value "${{ inputs.image_tag }}" \
              --type String \
              --overwrite
          fi
        done
    - name: tfvars-terraform
      run: |
        echo "availability_zones = ${{ vars.TF_VAR_AVAILABILITY_ZONES}}" > terraform.tfvars
        echo "aws_region = \"${{ vars.TF_VAR_AWS_REGION}}\"" >> terraform.tfvars
        echo "cidr_block = \"${{ vars.TF_VAR_CIDR_BLOCK}}\"" >> terraform.tfvars
        echo "control_domain = \"${{ vars.TF_VAR_CONTROL_DOMAIN}}\"" >> terraform.tfvars
        echo "email = \"${{ vars.TF_VAR_EMAIL }}\"" >> terraform.tfvars
        echo "environment = \"${{ vars.TF_VAR_ENVIRONMENT }}\"" >> terraform.tfvars
        echo "mail_domains = ${{ vars.TF_VAR_MAIL_DOMAINS }}" >> terraform.tfvars
        echo "repo = \"${{ vars.TF_VAR_REPO }}\"" >> terraform.tfvars
        echo "backup = ${{ vars.TF_VAR_BACKUP }}" >> terraform.tfvars
        echo "monitoring = ${{ vars.TF_VAR_MONITORING }}" >> terraform.tfvars
        echo "sinkhole = ${{ vars.TF_VAR_SINKHOLE || 'false' }}" >> terraform.tfvars
        echo "healthchecks_registration_open = ${{ vars.TF_VAR_HEALTHCHECKS_REGISTRATION_OPEN || 'false' }}" >> terraform.tfvars
        echo "prod = ${{ vars.TF_VAR_PROD }}" >> terraform.tfvars
        echo "quiesced = ${{ vars.TF_VAR_QUIESCED || 'false' }}" >> terraform.tfvars
        echo "use_eum_sms = ${{ vars.TF_VAR_USE_EUM_SMS || 'false' }}" >> terraform.tfvars
        echo "use_nat_instance = ${{ vars.TF_VAR_USE_NAT_INSTANCE || 'true' }}" >> terraform.tfvars
        echo "build_nat_ami = ${{ vars.TF_VAR_BUILD_NAT_AMI || 'true' }}" >> terraform.tfvars
        echo "dr_region = \"${{ vars.TF_VAR_DR_REGION || 'us-west-2' }}\"" >> terraform.tfvars
        echo "dnssec_enabled = ${{ vars.TF_VAR_DNSSEC_ENABLED || 'false' }}" >> terraform.tfvars
        # invitation_code is supplied via the TF_VAR_invitation_code env
        # var on this job (see env: block above) rather than echoed into
        # tfvars, so shell-special characters like `$` survive unmangled.
    - name: init-terraform
      run: terraform init
    - name: record-lambda-hashes
      # Phase 2: pin currently-deployed Lambda CodeSha256 values into
      # .terraform/lambda-pinned.tfvars so plan reflects what is
      # actually running.
      run: ../../.github/scripts/record-lambda-hashes.sh
    - name: plan-terraform
      id: plan-terraform
      run: ../../.github/scripts/plan-terraform.sh

  approval:
    needs:
    - plan
    - chekov
    - tflint
    - trivy
    # No `if:` defaults to success(), which inherits the bootstrap_apply
    # skip transitively (see the chekov/tflint/plan comment block above):
    # on the common push path bootstrap_apply is skipped, that skip flows
    # down the whole chain, and an unguarded job auto-skips even though its
    # immediate predecessors succeeded. Guard like the other post-build
    # jobs. Gate on exit_code == 2 as well so the manual approval only
    # fires when plan actually has changes to apply - otherwise every
    # no-op push would block on a human approving an empty apply.
    if: ${{ !cancelled() && needs.plan.result == 'success' && needs.chekov.result == 'success' && needs.tflint.result == 'success' && needs.trivy.result == 'success' && needs.plan.outputs.exit_code == '2' }}
    environment: gate-${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    runs-on: ubuntu-latest
    steps:
    - name: approve
      run: echo "Approved"

  apply:
    needs:
    - approval
    - plan
    # `plan` stays in needs so this job can still read
    # needs.plan.outputs.exit_code - the needs context only exposes jobs
    # listed here, so depending on `approval` alone would make that
    # expression resolve to empty and skip apply on every real change.
    if: ${{ !cancelled() && needs.approval.result == 'success' && needs.plan.outputs.exit_code == '2' }}
    runs-on: ubuntu-latest
    outputs:
      applied: ${{ steps.apply-terraform.outcome }}
    defaults:
      run:
        working-directory: ./terraform/infra
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      # Passed via env (not echoed into tfvars) because TF_VAR_INVITATION_CODE
      # may contain shell-special characters - `$` in particular gets
      # expanded by bash inside double-quoted echo, silently truncating
      # the value. env-block substitution writes the literal string
      # into the process environment, and Terraform auto-picks up
      # TF_VAR_* env vars without any shell re-interpretation.
      TF_VAR_invitation_code: ${{ vars.TF_VAR_INVITATION_CODE }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: retrieve-artifact
      uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131  # v7.0.0
      with:
        name: infra-backend.tf
    - name: move
      run: mv ../../backend.tf backend.tf
    - name: install-terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
      with:
        # The wrapper interleaves its own bookkeeping lines into
        # terraform's stdout, which would corrupt the command
        # substitution in annotate-terraform-outputs.sh. Nothing in
        # this job consumes the wrapper's step outputs.
        terraform_wrapper: false
    - name: tfvars-terraform
      run: |
        echo "availability_zones = ${{ vars.TF_VAR_AVAILABILITY_ZONES}}" > terraform.tfvars
        echo "aws_region = \"${{ vars.TF_VAR_AWS_REGION}}\"" >> terraform.tfvars
        echo "cidr_block = \"${{ vars.TF_VAR_CIDR_BLOCK}}\"" >> terraform.tfvars
        echo "control_domain = \"${{ vars.TF_VAR_CONTROL_DOMAIN}}\"" >> terraform.tfvars
        echo "email = \"${{ vars.TF_VAR_EMAIL }}\"" >> terraform.tfvars
        echo "environment = \"${{ vars.TF_VAR_ENVIRONMENT }}\"" >> terraform.tfvars
        echo "mail_domains = ${{ vars.TF_VAR_MAIL_DOMAINS }}" >> terraform.tfvars
        echo "repo = \"${{ vars.TF_VAR_REPO }}\"" >> terraform.tfvars
        echo "backup = ${{ vars.TF_VAR_BACKUP }}" >> terraform.tfvars
        echo "monitoring = ${{ vars.TF_VAR_MONITORING }}" >> terraform.tfvars
        echo "sinkhole = ${{ vars.TF_VAR_SINKHOLE || 'false' }}" >> terraform.tfvars
        echo "healthchecks_registration_open = ${{ vars.TF_VAR_HEALTHCHECKS_REGISTRATION_OPEN || 'false' }}" >> terraform.tfvars
        echo "prod = ${{ vars.TF_VAR_PROD }}" >> terraform.tfvars
        echo "quiesced = ${{ vars.TF_VAR_QUIESCED || 'false' }}" >> terraform.tfvars
        echo "use_eum_sms = ${{ vars.TF_VAR_USE_EUM_SMS || 'false' }}" >> terraform.tfvars
        echo "use_nat_instance = ${{ vars.TF_VAR_USE_NAT_INSTANCE || 'true' }}" >> terraform.tfvars
        echo "build_nat_ami = ${{ vars.TF_VAR_BUILD_NAT_AMI || 'true' }}" >> terraform.tfvars
        echo "dr_region = \"${{ vars.TF_VAR_DR_REGION || 'us-west-2' }}\"" >> terraform.tfvars
        echo "dnssec_enabled = ${{ vars.TF_VAR_DNSSEC_ENABLED || 'false' }}" >> terraform.tfvars
        # invitation_code is supplied via the TF_VAR_invitation_code env
        # var on this job (see env: block above) rather than echoed into
        # tfvars, so shell-special characters like `$` survive unmangled.
    - name: init-terraform
      run: terraform init
    - name: record-lambda-hashes
      # Re-pin in the apply workspace so the -var-file value seen by
      # plan is also seen by apply.
      run: ../../.github/scripts/record-lambda-hashes.sh
    - name: apply-terraform
      id: apply-terraform
      run: |
        set +e
        terraform apply -auto-approve -lock-timeout=30m -var-file="terraform.tfvars" -var-file=".terraform/lambda-pinned.tfvars" 2>&1 | tee /tmp/tf-apply.log
        TF_EXIT=${PIPESTATUS[0]}
        set -e
        if [ $TF_EXIT -ne 0 ]; then
          if grep -q 'aws_pinpointsmsvoicev2_phone_number.sms' /tmp/tf-apply.log && grep -q "timeout while waiting for state to become 'ACTIVE'" /tmp/tf-apply.log; then
            echo "::warning::Toll-free number provisioning timed out. Untainting resource for next run."
            terraform untaint 'module.pool.aws_pinpointsmsvoicev2_phone_number.sms[0]'
            exit 0
          fi
          exit $TF_EXIT
        fi
    - name: annotate-outputs
      # Surface the stack's Terraform outputs as a notice annotation on
      # the run summary page so they are visible without digging
      # through the apply log.
      run: ../../.github/scripts/annotate-terraform-outputs.sh

  post_apply:
    needs: apply
    if: ${{ !cancelled() && needs.apply.result == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
    - name: roll-services-to-latest-task-def
      # Phase 5: services have ignore_changes = [task_definition], so a
      # topology-only apply that registered a new task-def revision
      # does not auto-roll the service. Walk every service on
      # cabal-mail and update-service to the family head when it has
      # advanced. Steady-state no-op.
      run: ./.github/scripts/post-apply-update-services.sh
