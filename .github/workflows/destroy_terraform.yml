---
name: Destroy Terraform Infrastructure

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    steps:
    # Only the three named branches map to an environment. Refuse to run
    # from anything else so a feature-branch invocation cannot fall
    # through to development. See CLAUDE.md "Branches and environments".
    - name: require-known-branch
      run: |
        REF="${{ github.ref_name }}"
        case "$REF" in
          main|stage|development) ;;
          *)
            echo "::error::destroy_terraform.yml must run from main, stage, or development (got '$REF')."
            exit 1
            ;;
        esac
    - name: checkout
      uses: actions/checkout@v5
    - name: generate-versions
      run: env TF_MODULE=infra TF_ENVIRONMENT="${{ vars.TF_VAR_ENVIRONMENT }}" ./.github/scripts/make-terraform.sh
    - name: debug-1
      run: cat ./terraform/infra/backend.tf
    - name: debug-2
      run: echo "${{ vars.TF_VAR_ENVIRONMENT }}"
    - name: store-artifact
      uses: actions/upload-artifact@v6
      with:
        name: backend.tf
        path: ./terraform/infra/backend.tf

  approval:
    needs:
    - build
    environment: gate-${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    runs-on: ubuntu-latest
    steps:
    - name: approve
      run: echo "Approved"
  
  destroy:
    needs:
    - approval
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/infra
    environment: ${{ github.ref_name == 'main' && 'prod' || ( github.ref_name == 'stage' && 'stage' || 'development' ) }}
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
    - name: checkout
      uses: actions/checkout@v5
    - name: retrieve-artifact
      uses: actions/download-artifact@v7
      with:
        name: backend.tf
    - name: move
      run: mv ../../backend.tf backend.tf
    - name: strip-prevent-destroy
      # lifecycle.prevent_destroy (the ECR repos) is a plan-time hard
      # error under `terraform destroy`, so a teardown cannot even start
      # while the guard is set. Strip it from this run's working copy
      # only - nothing is committed. The repositories are still protected
      # where it matters: with force_delete = false, the ECR API refuses
      # to delete a repository that contains images, so image history
      # survives the teardown (in AWS and in state) exactly as the guard
      # intends, without blocking the rest of the destroy. The same
      # API-level refusal preserves non-empty S3 buckets.
      run: |
        grep -rl "prevent_destroy = true" . | while read -r f; do
          echo "stripping prevent_destroy from $f"
          sed -i 's/prevent_destroy = true/prevent_destroy = false/' "$f"
        done
    - name: install-terraform
      uses: hashicorp/setup-terraform@v4
    - name: tfvars-terraform
      run: |
        echo "availability_zones = ${{ vars.TF_VAR_AVAILABILITY_ZONES}}" > terraform.tfvars
        echo "aws_region = \"${{ vars.TF_VAR_AWS_REGION}}\"" >> terraform.tfvars
        echo "cidr_block = \"${{ vars.TF_VAR_CIDR_BLOCK}}\"" >> terraform.tfvars
        echo "control_domain = \"${{ vars.TF_VAR_CONTROL_DOMAIN}}\"" >> terraform.tfvars
        echo "email = \"${{ vars.TF_VAR_EMAIL }}\"" >> terraform.tfvars
        echo "environment = \"${{ vars.TF_VAR_ENVIRONMENT }}\"" >> terraform.tfvars
        echo "mail_domains = ${{ vars.TF_VAR_MAIL_DOMAINS }}" >> terraform.tfvars
        echo "repo = \"${{ vars.TF_VAR_REPO }}\"" >> terraform.tfvars
        echo "backup = ${{ vars.TF_VAR_BACKUP }}" >> terraform.tfvars
        echo "prod = ${{ vars.TF_VAR_PROD }}" >> terraform.tfvars
        echo "use_nat_instance = ${{ vars.TF_VAR_USE_NAT_INSTANCE || 'true' }}" >> terraform.tfvars
        echo "build_nat_ami = ${{ vars.TF_VAR_BUILD_NAT_AMI || 'true' }}" >> terraform.tfvars
    - name: init-terraform
      run: terraform init
    - name: destroy-terraform
      run: terraform destroy -auto-approve -lock-timeout=30m -var-file="terraform.tfvars"
