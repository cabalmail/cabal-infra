# cloudwatch_exporter config — translates CloudWatch metrics into the
# Prometheus exposition format. Region is templated by the entrypoint
# (the upstream image already supports `--region` flag and AWS_REGION
# env var).
#
# Coverage tuned to the §"Golden Signals per Tier" table in
# docs/0.7.0/monitoring-plan.md, focusing on metrics the Phase 3 alert
# rules depend on. Keeping the metric set small holds the
# GetMetricStatistics call rate down (each metric * statistic *
# dimension is one API call per scrape).

# `region` is intentionally absent — set via the `--region` flag /
# AWS_REGION env var by the entrypoint so the same image works in any
# region.

period_seconds: 60
range_seconds: 600
delay_seconds: 120

metrics:
  # ── API Gateway ───────────────────────────────────────────────
  - aws_namespace: AWS/ApiGateway
    aws_metric_name: 5XXError
    aws_dimensions: [ApiName, Stage]
    aws_statistics: [Sum]

  - aws_namespace: AWS/ApiGateway
    aws_metric_name: 4XXError
    aws_dimensions: [ApiName, Stage]
    aws_statistics: [Sum]

  - aws_namespace: AWS/ApiGateway
    aws_metric_name: Count
    aws_dimensions: [ApiName, Stage]
    aws_statistics: [Sum]

  - aws_namespace: AWS/ApiGateway
    aws_metric_name: IntegrationLatency
    aws_dimensions: [ApiName, Stage]
    aws_statistics: [Average, p95, p99]

  # ── Lambda ────────────────────────────────────────────────────
  - aws_namespace: AWS/Lambda
    aws_metric_name: Duration
    aws_dimensions: [FunctionName]
    aws_statistics: [Average, p95, p99]

  - aws_namespace: AWS/Lambda
    aws_metric_name: Errors
    aws_dimensions: [FunctionName]
    aws_statistics: [Sum]

  - aws_namespace: AWS/Lambda
    aws_metric_name: Throttles
    aws_dimensions: [FunctionName]
    aws_statistics: [Sum]

  - aws_namespace: AWS/Lambda
    aws_metric_name: Invocations
    aws_dimensions: [FunctionName]
    aws_statistics: [Sum]

  - aws_namespace: AWS/Lambda
    aws_metric_name: ConcurrentExecutions
    aws_statistics: [Maximum]

  # ── DynamoDB ──────────────────────────────────────────────────
  - aws_namespace: AWS/DynamoDB
    aws_metric_name: ThrottledRequests
    aws_dimensions: [TableName, Operation]
    aws_statistics: [Sum]

  - aws_namespace: AWS/DynamoDB
    aws_metric_name: SystemErrors
    aws_dimensions: [TableName]
    aws_statistics: [Sum]

  - aws_namespace: AWS/DynamoDB
    aws_metric_name: SuccessfulRequestLatency
    aws_dimensions: [TableName, Operation]
    aws_statistics: [Average, p95]

  - aws_namespace: AWS/DynamoDB
    aws_metric_name: ConsumedReadCapacityUnits
    aws_dimensions: [TableName]
    aws_statistics: [Sum]

  - aws_namespace: AWS/DynamoDB
    aws_metric_name: ConsumedWriteCapacityUnits
    aws_dimensions: [TableName]
    aws_statistics: [Sum]

  # ── EFS ───────────────────────────────────────────────────────
  # BurstCreditBalance and PercentIOLimit only emit when the filesystem
  # is in the corresponding mode: BurstCreditBalance requires bursting
  # throughput mode (AWS recently flipped the default to elastic, so
  # this is empty for newer file systems); PercentIOLimit requires
  # generalPurpose performance mode (the default; non-empty here).
  # Verify the current mode with:
  #   aws efs describe-file-systems \
  #     --query 'FileSystems[*].{id:FileSystemId,throughput:ThroughputMode,perf:PerformanceMode}'
  # StorageBytes and the I/O byte counters work in both throughput
  # modes, so they are the reliable saturation/traffic signal regardless
  # of how the FS was provisioned.
  - aws_namespace: AWS/EFS
    aws_metric_name: BurstCreditBalance
    aws_dimensions: [FileSystemId]
    aws_statistics: [Average]

  - aws_namespace: AWS/EFS
    aws_metric_name: PercentIOLimit
    aws_dimensions: [FileSystemId]
    aws_statistics: [Average]

  - aws_namespace: AWS/EFS
    aws_metric_name: ClientConnections
    aws_dimensions: [FileSystemId]
    aws_statistics: [Sum]

  - aws_namespace: AWS/EFS
    aws_metric_name: StorageBytes
    aws_dimensions: [FileSystemId, StorageClass]
    aws_statistics: [Average]

  - aws_namespace: AWS/EFS
    aws_metric_name: TotalIOBytes
    aws_dimensions: [FileSystemId]
    aws_statistics: [Sum]

  - aws_namespace: AWS/EFS
    aws_metric_name: DataReadIOBytes
    aws_dimensions: [FileSystemId]
    aws_statistics: [Sum]

  - aws_namespace: AWS/EFS
    aws_metric_name: DataWriteIOBytes
    aws_dimensions: [FileSystemId]
    aws_statistics: [Sum]

  # ── ECS ───────────────────────────────────────────────────────
  # CPU/Memory utilization come from the AWS/ECS namespace. Task-count
  # metrics (Running/Desired/Pending) live in ECS/ContainerInsights, not
  # AWS/ECS - a common gotcha. Container Insights is enabled on the
  # cluster (modules/ecs/main.tf), so these emit per-service.
  - aws_namespace: AWS/ECS
    aws_metric_name: CPUUtilization
    aws_dimensions: [ClusterName, ServiceName]
    aws_statistics: [Average, Maximum]

  - aws_namespace: AWS/ECS
    aws_metric_name: MemoryUtilization
    aws_dimensions: [ClusterName, ServiceName]
    aws_statistics: [Average, Maximum]

  - aws_namespace: ECS/ContainerInsights
    aws_metric_name: RunningTaskCount
    aws_dimensions: [ClusterName, ServiceName]
    aws_statistics: [Average]

  - aws_namespace: ECS/ContainerInsights
    aws_metric_name: DesiredTaskCount
    aws_dimensions: [ClusterName, ServiceName]
    aws_statistics: [Average]

  - aws_namespace: ECS/ContainerInsights
    aws_metric_name: PendingTaskCount
    aws_dimensions: [ClusterName, ServiceName]
    aws_statistics: [Average]

  # ── ALB / NLB ─────────────────────────────────────────────────
  - aws_namespace: AWS/ApplicationELB
    aws_metric_name: HTTPCode_Target_5XX_Count
    aws_dimensions: [LoadBalancer]
    aws_statistics: [Sum]

  - aws_namespace: AWS/ApplicationELB
    aws_metric_name: HTTPCode_ELB_5XX_Count
    aws_dimensions: [LoadBalancer]
    aws_statistics: [Sum]

  - aws_namespace: AWS/ApplicationELB
    aws_metric_name: TargetResponseTime
    aws_dimensions: [LoadBalancer]
    aws_statistics: [Average, p95]

  # ── ACM ───────────────────────────────────────────────────────
  - aws_namespace: AWS/CertificateManager
    aws_metric_name: DaysToExpiry
    aws_dimensions: [CertificateArn]
    aws_statistics: [Minimum]

  # ── CloudFront (us-east-1 only) ───────────────────────────────
  # CloudFront metrics live exclusively in us-east-1. cloudwatch_exporter
  # v0.16.0 has no per-metric region override (the region is set via the
  # top-level --region flag / AWS_REGION env var), so a second exporter
  # task pinned to us-east-1 scrapes these. See
  # docker/cloudwatch-exporter/config-us-east-1.yml and the
  # cloudwatch_exporter_us_east_1 ECS service in
  # terraform/infra/modules/monitoring/exporters.tf.

  # ── Cognito ───────────────────────────────────────────────────
  - aws_namespace: AWS/Cognito
    aws_metric_name: SignInSuccesses
    aws_dimensions: [UserPool, UserPoolClient]
    aws_statistics: [Sum]

  - aws_namespace: AWS/Cognito
    aws_metric_name: SignInThrottles
    aws_dimensions: [UserPool, UserPoolClient]
    aws_statistics: [Sum]

  # ── Cabalmail log-derived metrics (Phase 4 §2) ────────────────
  # Source: CloudWatch metric filters defined in
  # terraform/infra/modules/monitoring/log_metrics.tf. Each filter
  # emits to one of these metrics with value=1 per matching log line;
  # CloudWatch aggregates per-minute. Sum is the only useful statistic.
  - aws_namespace: Cabalmail/Logs
    aws_metric_name: SendmailDeferred
    aws_statistics: [Sum]

  - aws_namespace: Cabalmail/Logs
    aws_metric_name: SendmailBounced
    aws_statistics: [Sum]

  - aws_namespace: Cabalmail/Logs
    aws_metric_name: IMAPAuthFailures
    aws_statistics: [Sum]
