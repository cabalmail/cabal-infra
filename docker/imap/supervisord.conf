[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:rsyslog]
command=/usr/sbin/rsyslogd -n
autorestart=true
priority=1

[program:log-tailer]
command=tail -F /var/log/maillog
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
priority=2
startsecs=0

# Sendmail-side startup prep (sendmail.mc render, DynamoDB scan,
# sendmail.cf compile, aliases) runs here instead of the entrypoint so
# Dovecot (priority=20) starts without waiting the 20-40s it takes.
# Writes /run/sendmail-ready on success; sendmail-wrapper.sh blocks on
# that sentinel and reconfigure.sh waits for it before entering its
# loop. On success it idles RUNNING (same HEALTHCHECK convention as
# clear-maintenance); on failure it exits non-zero and autorestart
# re-runs it - every step is idempotent. Phase 3 of
# docs/0.10.x/imap-deploy-downtime-plan.md.
[program:prepare-sendmail]
command=/usr/local/bin/prepare-sendmail.sh daemon
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=0
priority=5

[program:sendmail]
command=/usr/local/bin/sendmail-wrapper.sh
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=5
stopwaitsecs=15
priority=10

[program:dovecot]
command=/usr/sbin/dovecot -F
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
priority=20

[program:reconfigure]
command=/usr/local/bin/reconfigure.sh
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
priority=40
stopwaitsecs=30

# Clears the /cabal/maintenance/imap SSM flag set by the deploy pipeline once
# Dovecot is accepting connections, then idles RUNNING (the HEALTHCHECK flags
# any non-RUNNING program). Fail-soft: never crash-loops on a failed clear.
[program:clear-maintenance]
command=/usr/local/bin/clear-maintenance.sh daemon
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=0
priority=25
