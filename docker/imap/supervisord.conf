[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:rsyslog]
command=/usr/sbin/rsyslogd -n
autorestart=true
priority=1

[program:log-tailer]
command=tail -F /var/log/maillog
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
priority=2
startsecs=0

[program:sendmail]
command=/usr/local/bin/sendmail-wrapper.sh
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=5
stopwaitsecs=15
priority=10

[program:dovecot]
command=/usr/sbin/dovecot -F
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
priority=20

[program:reconfigure]
command=/usr/local/bin/reconfigure.sh
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
priority=40
stopwaitsecs=30

# Clears the /cabal/maintenance/imap SSM flag set by the deploy pipeline once
# Dovecot is accepting connections, then idles RUNNING (a one-shot exit would
# just be restarted by autorestart=true). Fail-soft: never crash-loops on a
# failed clear.
[program:clear-maintenance]
command=/usr/local/bin/clear-maintenance.sh daemon
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=0
priority=25
