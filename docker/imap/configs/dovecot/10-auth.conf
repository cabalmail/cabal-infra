# Phase 4 (docs/0.10.x/container-runtime-hardening-plan.md): reject plaintext
# auth unless the session is secured. The NLB terminates TLS for imap
# (993->143) and forwards plain TCP, so the entrypoint marks the NLB
# public-subnet CIDRs as login_trusted_networks (05-login.conf); sessions
# reaching 143 from anywhere else in the VPC (ECS Exec, a sidecar, a
# private-subnet container) are untrusted and must use real TLS.
# auth_failure_delay slows credential stuffing.
disable_plaintext_auth = yes
auth_failure_delay = 2 secs
auth_realms = smtpauth
auth_master_user_separator = *
auth_mechanisms = plain
userdb {
    driver = passwd
	args = blocking=no
}
!include auth-system.conf.ext
!include auth-master.conf.ext
