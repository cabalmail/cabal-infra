# Full-text search via fts_flatcurve (Xapian-backed, NFS/EFS-safe).
# Compiled into the image by the fts-builder stage in Dockerfile.
# Plan: docs/0.9.x/imap-search-plan.md, Layer 2.

mail_plugins = $mail_plugins fts fts_flatcurve

plugin {
  fts = flatcurve

  # Index lazily as messages arrive; historical mail is backfilled
  # by a one-shot `doveadm fts rescan -u <user>` (see
  # docs/operations.md). The autoindex exclude list lines up with
  # the /search_envelopes noise-folder defaults so we don't waste
  # CPU and EFS throughput indexing folders we never search.
  fts_autoindex = yes
  fts_autoindex_exclude  = \Trash
  fts_autoindex_exclude2 = \Junk

  # Refuse to fall back to a sequential body scan when the index is
  # unavailable. Plan calls this preferable to a silent slow path:
  # the operator must run the rescan before search becomes useful
  # for historical mail.
  fts_enforced = yes

  fts_flatcurve_min_term_size = 2
  fts_flatcurve_substring_search = no
}
