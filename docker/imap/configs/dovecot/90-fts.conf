# Full-text search via fts_flatcurve (Xapian-backed, NFS/EFS-safe).
# Compiled into the image by the fts-builder stage in Dockerfile.
# Plan: docs/0.9.x/imap-search-plan.md, Layer 2.

mail_plugins = $mail_plugins fts fts_flatcurve

plugin {
  fts = flatcurve

  # Required by fts_flatcurve: the plugin refuses to initialize
  # without `fts_languages` and emits "fts_languages setting is
  # missing" at first `doveadm fts rescan`. English-only matches
  # the user base; revisit if we ever ship i18n. The email-address
  # tokenizer keeps `user@example.com` as one indexed term instead
  # of three so address searches behave the way users expect, and
  # `maxlen=100` caps pathological addresses.
  fts_languages = en
  fts_tokenizers = generic email-address
  fts_tokenizer_email_address = maxlen=100

  # Index lazily as messages arrive; historical mail is backfilled
  # by a one-shot `doveadm fts rescan -u <user>` (see
  # docs/operations.md). The autoindex exclude list lines up with
  # `/search_envelopes`'s cross-folder default — Trash is the only
  # folder we never search, so it's the only one we never index.
  # Spam / Junk are searchable so users can find misclassified mail.
  fts_autoindex = yes
  fts_autoindex_exclude = \Trash

  # Refuse to fall back to a sequential body scan when the index is
  # unavailable. Plan calls this preferable to a silent slow path:
  # the operator must run the rescan before search becomes useful
  # for historical mail.
  fts_enforced = yes

  fts_flatcurve_min_term_size = 2
  fts_flatcurve_substring_search = no
}
