protocol imap {
    mail_max_userip_connections = 100
}

# Raise the per-process virtual-memory cap from Dovecot's 256M default.
# FETCH ENVELOPE + BODYSTRUCTURE across a page of envelopes, plus the
# maildir uidlist refresh and (since Phase 4) the FTS index reads,
# pushes the imap worker past 256M VSZ on multi-folder mailboxes and
# the master service kills the child with "error 83 (Out of memory)"
# mid-FETCH. The TCP session drops, the Lambda sees EOF, the client
# sees 502. 1G is generous headroom for current workloads -- raise
# further only if log spam shows the new ceiling biting too. Container
# memory is aligned in terraform/infra/modules/ecs/task-definitions.tf
# so the cgroup limit does not become the new failure point.
service imap {
    vsz_limit = 1G
}

# Phase 4 login throttling. client_limit = 1 puts the login processes in
# high-security mode (one connection each), so a login-process compromise
# cannot see other sessions; process_limit caps concurrent in-flight logins
# so a connection flood cannot fork Dovecot unboundedly. The auth service's
# client_limit must cover all the login processes that connect to it
# (>= imap-login process_limit).
service imap-login {
    process_limit = 1024
    client_limit = 1
}
service auth {
    client_limit = 4096
}
