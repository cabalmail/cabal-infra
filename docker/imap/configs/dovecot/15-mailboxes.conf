namespace inbox {
  inbox = yes
  mailbox Drafts {
    special_use = \Drafts
  }
  mailbox Junk {
    special_use = \Junk
  }
  mailbox Trash {
    special_use = \Trash
    # Auto-create (not subscribe, matching the historical Lambda behavior) so
    # a fresh mailbox has Trash before its first delete. /move_messages used
    # to force-create it on every delete to cover the gap; this moves that
    # responsibility to Dovecot so the Lambda can stop paying the round trip.
    auto = create
  }
  mailbox Sent {
    special_use = \Sent
  }
}
