[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log

[program:rsyslog]
command=/usr/sbin/rsyslogd -n
autorestart=true
priority=1

[program:log-tailer]
command=tail -F /var/log/maillog
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
priority=2
startsecs=0

[program:hosts-pin]
command=/usr/local/bin/hosts-pin.sh daemon
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=0
priority=5

[program:sendmail]
command=/usr/local/bin/sendmail-wrapper.sh
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
startsecs=5
stopwaitsecs=15
priority=10

# [program:fail2ban]
# command=/usr/bin/fail2ban-server -xf
# autorestart=true
# priority=20

[program:reconfigure]
command=/usr/local/bin/reconfigure.sh
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
redirect_stderr=true
autorestart=true
priority=30
stopwaitsecs=30
