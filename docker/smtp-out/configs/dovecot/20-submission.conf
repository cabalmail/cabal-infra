submission_relay_host = 127.0.0.1
submission_relay_port = 25

service submission-login {
  # Phase 4 login throttling: one connection per login process
  # (high-security mode), with a cap on concurrent in-flight logins.
  process_limit = 512
  client_limit = 1
  inet_listener submission {
    port = 587
  }
  inet_listener submissions {
    port = 465
    ssl = yes
  }
}
