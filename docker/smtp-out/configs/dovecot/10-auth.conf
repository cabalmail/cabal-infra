# Phase 4 (docs/0.10.x/container-runtime-hardening-plan.md): reject plaintext
# auth on non-TLS sessions. The NLB passes submission (587/465) straight
# through and Dovecot terminates TLS itself, so this enforces
# STARTTLS-before-AUTH on 587 and TLS on 465. auth_failure_delay slows
# credential stuffing.
disable_plaintext_auth = yes
auth_failure_delay = 2 secs
auth_realms = smtpauth
auth_mechanisms = plain
userdb {
    driver = passwd
	args = blocking=no
}
!include auth-system.conf.ext
