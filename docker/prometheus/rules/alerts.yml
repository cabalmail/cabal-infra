# Alert rules for Cabalmail Phase 3.
#
# All severities map to alert_sink Lambda routing:
#   - critical -> Pushover priority 1 + ntfy priority 5
#   - warning  -> ntfy priority 3
#
# Thresholds match docs/0.7.0/monitoring-plan.md §"Golden Signals per
# Tier" but are starting points only — every threshold is expected to
# move once real traffic data lands. See the §"Tuning discipline"
# guidance for the review cadence.
#
# Each alert has a runbook_url annotation pointing into
# docs/operations/runbooks/. The Phase 4 alert_sink Lambda picks this up
# from the Alertmanager payload and surfaces it on Pushover (as a tap
# action) and ntfy (as a Click header) so the on-call phone can jump
# straight to the runbook.
#
# Mail-tier-specific rules (MailQueueGrowing, MailDeliveryFailureRate)
# are intentionally omitted from this file: they require log-derived
# metrics or sidecar exporters that are deferred from Phase 3. See
# CHANGELOG and docs/monitoring.md §"Phase 3 — deferred items".

groups:

  - name: aws-services
    rules:

      - alert: Lambda5xxSpike
        # API Gateway 5XX for any of the cabal-* Lambdas, > 5% over 5 min
        # (rate over a 10 min window for stability).
        expr: |
          sum by (api_name, stage) (
            rate(aws_apigateway_5_xx_error_sum{api_name=~"cabal-.+"}[10m])
          )
          /
          clamp_min(
            sum by (api_name, stage) (
              rate(aws_apigateway_count_sum{api_name=~"cabal-.+"}[10m])
            ),
            1
          )
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "API 5xx > 5% on {{ $labels.api_name }} for 5 min"
          description: "API Gateway 5XX rate exceeded 5% over 10 minutes on {{ $labels.api_name }}/{{ $labels.stage }}."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/lambda-5xx-spike.md"

      - alert: LambdaThrottles
        expr: sum by (function_name) (rate(aws_lambda_throttles_sum{function_name=~"cabal-.+"}[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Lambda throttling on {{ $labels.function_name }}"
          description: "Lambda throttles observed in the last 5 minutes — concurrency limit may need raising."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/lambda-throttles.md"

      - alert: LambdaErrors
        # `cabal-.+` covers cabal-list, cabal-fetch-message, cabal-certbot-renewal,
        # cabal-process-dmarc, cabal-backup-heartbeat, cabal-alert-sink, etc.
        # `assign_osid` is the Cognito post-confirmation Lambda — included
        # explicitly because it pre-dates the cabal- naming convention.
        # Phase 4 §2 prefers extending this regex over a separate
        # log-derived metric for Cognito errors; AWS/Lambda Errors covers
        # the unhandled-exception path, which is most of what we'd catch.
        expr: sum by (function_name) (increase(aws_lambda_errors_sum{function_name=~"cabal-.+|assign_osid"}[15m])) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Lambda errors on {{ $labels.function_name }}"
          description: "{{ $labels.function_name }} produced one or more invocation errors in the last 15 minutes."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/lambda-errors.md"

      - alert: DynamoDBThrottling
        expr: sum by (table_name) (increase(aws_dynamodb_throttled_requests_sum[5m])) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "DynamoDB throttling on {{ $labels.table_name }}"
          description: "Throttled requests on table {{ $labels.table_name }} in the last 5 minutes."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/dynamodb-throttling.md"

      - alert: DynamoDBSystemErrors
        expr: sum by (table_name) (increase(aws_dynamodb_system_errors_sum[5m])) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "DynamoDB SystemErrors on {{ $labels.table_name }}"
          description: "AWS-side DynamoDB errors are not retriable from the application; investigate AWS service health."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/dynamodb-system-errors.md"

      - alert: EFSBurstCreditsLow
        expr: aws_efs_burst_credit_balance_average < 20e9
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "EFS burst credits low on {{ $labels.file_system_id }}"
          description: "EFS burst credit balance below 20% of baseline for 1 hour. Sustained read/write will start throttling."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/efs-burst-credits-low.md"

      - alert: ContainerRestartLoop
        # ECS/ContainerInsights exposes RunningTaskCount/DesiredTaskCount
        # per service (these are NOT in the AWS/ECS namespace - common
        # gotcha). A sustained drop below DesiredTaskCount for one
        # service over an hour signals a crash loop. Exact thresholds
        # will need tuning once we see what normal task-replacement
        # noise looks like.
        expr: |
          (
            avg_over_time(aws_ecs_containerinsights_running_task_count_average[1h])
            <
            avg_over_time(aws_ecs_containerinsights_desired_task_count_average[1h])
          )
          and
          (
            avg_over_time(aws_ecs_containerinsights_desired_task_count_average[1h]) > 0
          )
        for: 30m
        labels:
          severity: critical
        annotations:
          summary: "ECS service {{ $labels.service_name }} below desired task count"
          description: "{{ $labels.service_name }} on cluster {{ $labels.cluster_name }} has been below its desired task count for 30 minutes — likely a crash loop."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/container-restart-loop.md"

      - alert: CertExpiringSoonWarning
        expr: aws_certificatemanager_days_to_expiry_minimum < 21
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "ACM cert {{ $labels.domain_name }} expires in <21 days"
          description: "ACM auto-renewal usually happens around 30 days out. <21 days suggests the renewal is stuck."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/cert-expiring.md"

      - alert: CertExpiringSoonCritical
        expr: aws_certificatemanager_days_to_expiry_minimum < 7
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "ACM cert {{ $labels.domain_name }} expires in <7 days"
          description: "Manual intervention required — the certbot Lambda or ACM auto-renew has not refreshed this cert."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/cert-expiring.md"

  - name: blackbox
    rules:

      - alert: BlackboxProbeFailure
        # Duplicates Kuma's TCP/HTTP probes. Kuma is the primary uptime
        # signal; this rule lets Prometheus group multiple probes and
        # correlate with cluster-internal metrics.
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Blackbox probe to {{ $labels.instance }} failing"
          description: "Probe via {{ $labels.job }} for {{ $labels.instance }} has failed for 2 minutes."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/probe-failure.md"

      - alert: BlackboxTLSCertExpiringSoon
        # blackbox_exporter exposes seconds-to-cert-expiry on https probes.
        # Independent confirmation against the AWS-side ACM metric.
        expr: probe_ssl_earliest_cert_expiry - time() < 21 * 24 * 3600
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "TLS cert at {{ $labels.instance }} expires in <21 days"
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/cert-expiring.md"

  - name: platform
    rules:

      - alert: NodeHighCPU
        # node_exporter daemon reports per-host CPU. mode!=idle gives the
        # combined utilization. Scope the alert to monitoring DaemonSet
        # tasks (host-level view), not to per-tier sidecars.
        expr: |
          100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} CPU > 85% for 15 min"
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/node-high-cpu.md"

      - alert: NodeHighMemory
        expr: |
          100 * (
            1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
          ) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} memory > 85% for 15 min"
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/node-high-memory.md"

      - alert: NodeDiskSpaceLow
        expr: |
          100 * (
            1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"}
                 / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"})
          ) > 85
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Host {{ $labels.instance }} disk {{ $labels.mountpoint }} > 85% used"
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/node-disk-space-low.md"

  - name: log-derived
    # Phase 4 §2 — alerts driven by CloudWatch metric filters defined in
    # terraform/infra/modules/monitoring/log_metrics.tf. Thresholds are
    # starting points; expect tuning once we see real traffic. fail2ban
    # metrics are intentionally not here — fail2ban is currently disabled
    # in supervisord.conf across all mail tiers.
    rules:

      - alert: SendmailDeferredSpike
        # Aggregate "stat=Deferred" rate across all three mail tiers.
        # On smtp-out a sustained deferred rate means we're being
        # graylisted or rate-limited by remote MXs. On smtp-in or imap
        # tier it's typically an internal delivery problem.
        expr: sum(increase(aws_cabalmail_logs_sendmail_deferred_sum[10m])) > 10
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Sendmail deferred-message rate > 1/min for 15 min"
          description: "More than 10 \"stat=Deferred\" log lines aggregated across imap/smtp-in/smtp-out in the last 10 min, sustained 15 min. Investigate `mailq` on each tier."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/sendmail-deferred-spike.md"

      - alert: SendmailBouncedSpike
        # "dsn=5" matches all 5.x.y permanent-failure DSN codes. On
        # smtp-out this is a deliverability signal (remote rejection);
        # on imap/smtp-in it's a local config issue (LDA / relay-to-IMAP).
        expr: sum(increase(aws_cabalmail_logs_sendmail_bounced_sum[30m])) > 15
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Sendmail bounce rate > 0.5/min for 15 min"
          description: "More than 15 \"dsn=5.x.y\" log lines aggregated across all mail tiers in the last 30 min, sustained 15 min. Identify the tier and inspect maillog."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/sendmail-bounced-spike.md"

      - alert: IMAPAuthFailureSpike
        # Dovecot login failures on the imap tier. Most common cause is a
        # brute-force attempt; expect fail2ban to dampen this when
        # re-enabled. Until then, sustained spikes warrant manual SG block.
        expr: sum(increase(aws_cabalmail_logs_imap_auth_failures_sum[5m])) > 25
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Dovecot auth-failed rate > 5/min for 5 min"
          description: "More than 25 \"auth failed\" log lines on the imap tier in the last 5 min, sustained 5 min. Likely a brute-force attempt."
          runbook_url: "https://github.com/cabalmail/cabal-infra/blob/main/docs/operations/runbooks/imap-auth-failure-spike.md"
