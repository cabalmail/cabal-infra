# Prometheus scrape and alerting configuration for Cabalmail.
#
# Scrape targets are discovered via Cloud Map private DNS A records under
# the `cabal-monitoring.cabal.internal` namespace. Each ECS service in
# the monitoring module registers itself there, so Prometheus picks up
# new task IPs automatically as services scale or replace.
#
# DNS-SD `type: A` is required (not SRV); Cloud Map registers a single
# A record per task with no service-side port info, so the port has to
# be set explicitly per scrape config.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: cabalmail
    # Replaced at runtime by the entrypoint with the actual environment
    # name (prod/stage/dev) so multi-env Grafana dashboards can filter.
    environment: __ENVIRONMENT__

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - dns_sd_configs:
        - names:
            - alertmanager.cabal-monitoring.cabal.internal
          type: A
          port: 9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: alertmanager
    dns_sd_configs:
      - names:
          - alertmanager.cabal-monitoring.cabal.internal
        type: A
        port: 9093

  - job_name: cloudwatch
    # CloudWatch API calls are slow; scrape less often to stay under the
    # GetMetricStatistics rate limit.
    scrape_interval: 60s
    scrape_timeout: 30s
    dns_sd_configs:
      - names:
          - cloudwatch-exporter.cabal-monitoring.cabal.internal
        type: A
        port: 9106

  - job_name: cloudwatch-us-east-1
    # Second cloudwatch_exporter task pinned to us-east-1 for CloudFront
    # (whose metrics are emitted only in that region). Same scrape
    # cadence; small metric set so it stays well under the GMS limit.
    scrape_interval: 60s
    scrape_timeout: 30s
    dns_sd_configs:
      - names:
          - cloudwatch-exporter-us-east-1.cabal-monitoring.cabal.internal
        type: A
        port: 9106

  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          # Front-end React app (CloudFront-fronted)
          - https://__CONTROL_DOMAIN__/
          # Self-hosted ntfy health endpoint (publicly reachable; token-auth not enforced for /v1/health)
          - https://ntfy.__CONTROL_DOMAIN__/v1/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter.cabal-monitoring.cabal.internal:9115

  - job_name: blackbox-tcp
    # Plaintext / STARTTLS ports - we only verify the TCP handshake.
    # Port 25 (SMTP) is plaintext on the wire from the relay perspective.
    # Port 587 (Submission) advertises STARTTLS but blackbox tcp_connect
    # does not initiate it; for that we'd need a custom probe. The TLS
    # cert at the edge is observed via Kuma's port-587 monitor.
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - smtp-in.__CONTROL_DOMAIN__:25
          - smtp-out.__CONTROL_DOMAIN__:587
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter.cabal-monitoring.cabal.internal:9115

  - job_name: blackbox-tls
    # Implicit-TLS ports - blackbox does the full TLS handshake, which
    # is what populates probe_ssl_earliest_cert_expiry for the Mail
    # Tiers dashboard's "TLS days to expiry" panels and the
    # BlackboxTLSCertExpiringSoon alert.
    metrics_path: /probe
    params:
      module: [tcp_tls]
    static_configs:
      - targets:
          - imap.__CONTROL_DOMAIN__:993
          - smtp-out.__CONTROL_DOMAIN__:465
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter.cabal-monitoring.cabal.internal:9115

  - job_name: node
    # SRV query — node_exporter's Cloud Map service registers SRV
    # records (the only type ECS accepts for host network-mode
    # services). The SRV response carries both target host and port
    # (9100), so no static `port:` is set here.
    dns_sd_configs:
      - names:
          - node-exporter.cabal-monitoring.cabal.internal
        type: SRV
