function formatDate(iso) {
  const d = new Date(iso);
  const now = new Date('2026-04-17T14:22:00');
  const ms = now - d;
  const mins = Math.floor(ms / 60000);
  if (mins < 60) return `${mins}m`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 12) return `${hrs}h`;
  const days = Math.floor(hrs / 24);
  const sameYear = d.getFullYear() === now.getFullYear();
  if (days < 7) return d.toLocaleDateString('en-US', { weekday: 'short' });
  return d.toLocaleDateString('en-US', sameYear
    ? { month: 'short', day: 'numeric' }
    : { month: 'short', day: 'numeric', year: '2-digit' });
}
function formatLongDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })
    + ' · ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
}
function extractName(fromStr) {
  const m = /^(.*?)\s*<.*?>\s*$/.exec(fromStr);
  if (m) return m[1].replace(/^"|"$/g, '') || fromStr;
  return fromStr;
}
function extractEmail(fromStr) {
  const m = /<(.*?)>/.exec(fromStr);
  if (m) return m[1];
  return fromStr;
}
function initials(name) {
  const parts = name.split(/[\s<]+/).filter(Boolean).slice(0, 2);
  return parts.map(p => p[0]?.toUpperCase() || '').join('') || '·';
}

// ---------------------------------------------------------------- Folders pane
// Merged folders (system + user as a single list). System folders use their
// native icon and can be favorited but not renamed/removed. User folders get
// a folder icon and the full add/rename/remove/favorite set.

function loadFolders() {
  try {
    const saved = JSON.parse(localStorage.getItem('cabal-folders') || 'null');
    if (saved && Array.isArray(saved)) return saved;
  } catch (e) {}
  return [
    ...FOLDERS_TREE.map(f => ({ ...f, favorite: false })),
    // drop FOLDERS_USER hierarchy -- flatten Work as its own plain folder
    { id: 'Receipts',     name: 'Receipts',     count: 132, kind: 'folder', favorite: false },
    { id: 'Travel',       name: 'Travel',       count: 28,  kind: 'folder', favorite: false },
    { id: 'Newsletters',  name: 'Newsletters',  count: 412, kind: 'folder', favorite: true  },
    { id: 'Work',         name: 'Work',         count: 80,  kind: 'folder', favorite: true  },
  ];
}
function saveFolders(folders) {
  try { localStorage.setItem('cabal-folders', JSON.stringify(folders)); } catch (e) {}
}

function loadAddrFavs() {
  try { return new Set(JSON.parse(localStorage.getItem('cabal-addr-favs') || '[]')); }
  catch (e) { return new Set(); }
}
function saveAddrFavs(favs) {
  try { localStorage.setItem('cabal-addr-favs', JSON.stringify([...favs])); } catch (e) {}
}

function loadRevoked() {
  try { return new Set(JSON.parse(localStorage.getItem('cabal-revoked') || '[]')); }
  catch (e) { return new Set(); }
}
function saveRevoked(set) {
  try { localStorage.setItem('cabal-revoked', JSON.stringify([...set])); } catch (e) {}
}

function loadSectionState() {
  try { return JSON.parse(localStorage.getItem('cabal-sections') || '{"folders":true,"addresses":true}'); }
  catch (e) { return { folders: true, addresses: true }; }
}
function saveSectionState(s) {
  try { localStorage.setItem('cabal-sections', JSON.stringify(s)); } catch (e) {}
}

function FoldersPane({
  activeFolder, onFolderClick, activeAccount, onAccountClick,
  onCompose, onNewAddress,
  revokedAddrs, onRevokeAddress,
}) {
  const [folders, setFolders] = useState(loadFolders);
  const [editingId, setEditingId] = useState(null);
  const [editingName, setEditingName] = useState('');
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState('');
  const [sections, setSections] = useState(loadSectionState);
  const [addrQuery, setAddrQuery] = useState('');
  const [addrFavs, setAddrFavs] = useState(loadAddrFavs);

  useEffect(() => saveFolders(folders), [folders]);
  useEffect(() => saveSectionState(sections), [sections]);
  useEffect(() => saveAddrFavs(addrFavs), [addrFavs]);

  const toggleSection = (key) => setSections(s => ({ ...s, [key]: !s[key] }));

  const updateFolder = (id, patch) =>
    setFolders(fs => fs.map(f => f.id === id ? { ...f, ...patch } : f));
  const removeFolder = (id) => {
    if (!confirm('Remove this folder? Messages inside will not be deleted (this is a mock).')) return;
    setFolders(fs => fs.filter(f => f.id !== id));
    if (activeFolder === id) onFolderClick('INBOX');
  };
  const beginRename = (f) => { setEditingId(f.id); setEditingName(f.name); };
  const commitRename = () => {
    if (editingId && editingName.trim()) {
      updateFolder(editingId, { name: editingName.trim() });
    }
    setEditingId(null);
    setEditingName('');
  };
  const cancelRename = () => { setEditingId(null); setEditingName(''); };
  const toggleFavorite = (id) =>
    setFolders(fs => fs.map(f => f.id === id ? { ...f, favorite: !f.favorite } : f));

  const commitAdd = () => {
    const name = newName.trim();
    if (!name) { setAdding(false); setNewName(''); return; }
    const id = name + '-' + Math.random().toString(36).slice(2, 6);
    setFolders(fs => [...fs, { id, name, count: 0, kind: 'folder', favorite: false }]);
    setAdding(false); setNewName('');
  };

  // Sort: favorites first (system favorites, user favorites), then system order, then user order
  const favoriteFolders = folders.filter(f => f.favorite);
  const normalFolders = folders.filter(f => !f.favorite);
  const orderedFolders = [...favoriteFolders, ...normalFolders];

  const toggleAddrFav = (addr) => {
    setAddrFavs(s => {
      const n = new Set(s);
      if (n.has(addr)) n.delete(addr); else n.add(addr);
      return n;
    });
  };

  // Filter + sort addresses: revoked filtered out, favorites first, then alphabetical within
  const addrQ = addrQuery.trim().toLowerCase();
  const allAddrsRaw = [...ADDRESSES.map(a => ({ ...a, isPrimary: true })), ...RECEIVE_ONLY.map(a => ({ ...a, isPrimary: false }))];
  const visibleAddrs = allAddrsRaw
    .filter(a => !revokedAddrs.has(a.address))
    .filter(a => {
      if (!addrQ) return true;
      return a.address.toLowerCase().includes(addrQ)
          || (a.note || '').toLowerCase().includes(addrQ)
          || (a.sub || '').toLowerCase().includes(addrQ);
    });

  const favAddrs = visibleAddrs.filter(a => addrFavs.has(a.address));
  const otherAddrs = visibleAddrs.filter(a => !addrFavs.has(a.address));
  // Without a query, limit non-fav non-primary addresses (there are 100+)
  const listedAddrs = addrQ
    ? [...favAddrs, ...otherAddrs]
    : [...favAddrs, ...otherAddrs.filter(a => a.isPrimary)];

  const revokeAddr = (addr) => {
    if (!confirm(`Revoke ${addr}?\n\nIncoming mail to this address will start bouncing. This can't be undone in the prototype.`)) return;
    onRevokeAddress(addr);
  };

  return (
    <aside className="pane pane-folders">
      <button className="compose-btn" onClick={onCompose}>
        <Icon name="compose" size={14} />
        New message
      </button>

      {/* ─── Folders ───────────────────────────────────────────────────── */}
      <div className={`folders-section ${sections.folders ? 'expanded' : 'collapsed'}`}>
        <div
          className="folders-section-header"
          onClick={() => toggleSection('folders')}
          role="button"
          tabIndex={0}
        >
          <span className="chev"><Icon name="chevronDown" size={12} /></span>
          <span className="label">Folders</span>
          <span className="section-actions">
            <button
              className="section-action"
              title="New folder"
              onClick={(e) => { e.stopPropagation(); if (!sections.folders) toggleSection('folders'); setAdding(true); }}
            >
              <Icon name="plus" size={14} />
            </button>
          </span>
        </div>

        <div className="folders-section-body">
          <ul className="folder-list">
            {orderedFolders.map(f => {
              const isEditing = editingId === f.id;
              const isActive = activeFolder === f.id;
              const canEdit = !f.system;
              return (
                <li
                  key={f.id}
                  className={`folder-item ${isActive ? 'active' : ''} ${f.favorite ? 'has-fav' : ''}`}
                  onClick={() => !isEditing && onFolderClick(f.id)}
                >
                  <Icon name={f.kind} size={16} />
                  {isEditing ? (
                    <input
                      autoFocus
                      className="folder-rename-input"
                      value={editingName}
                      onChange={(e) => setEditingName(e.target.value)}
                      onBlur={commitRename}
                      onKeyDown={(e) => {
                        if (e.key === 'Enter') commitRename();
                        else if (e.key === 'Escape') cancelRename();
                      }}
                      onClick={(e) => e.stopPropagation()}
                    />
                  ) : (
                    <>
                      <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{f.name}</span>
                      <span className="folder-row-actions" onClick={(e) => e.stopPropagation()}>
                        <button
                          className="folder-row-action folder-star"
                          title={f.favorite ? 'Unfavorite' : 'Favorite'}
                          onClick={() => toggleFavorite(f.id)}
                        >
                          <Icon name={f.favorite ? 'starFilled' : 'star'} size={13} />
                        </button>
                        {canEdit && (
                          <>
                            <button
                              className="folder-row-action"
                              title="Rename"
                              onClick={() => beginRename(f)}
                            >
                              <Icon name="pencil" size={13} />
                            </button>
                            <button
                              className="folder-row-action"
                              title="Remove folder"
                              onClick={() => removeFolder(f.id)}
                            >
                              <Icon name="close" size={13} />
                            </button>
                          </>
                        )}
                      </span>
                      {f.count > 0 && <span className="folder-count">{f.count}</span>}
                    </>
                  )}
                </li>
              );
            })}
          </ul>
          {adding ? (
            <div className="folder-add-row" style={{ cursor: 'default' }}>
              <Icon name="folder" size={16} />
              <input
                autoFocus
                className="folder-add-input"
                placeholder="New folder name"
                value={newName}
                onChange={(e) => setNewName(e.target.value)}
                onBlur={commitAdd}
                onKeyDown={(e) => {
                  if (e.key === 'Enter') commitAdd();
                  else if (e.key === 'Escape') { setAdding(false); setNewName(''); }
                }}
              />
            </div>
          ) : (
            <div className="folder-add-row" onClick={() => setAdding(true)}>
              <Icon name="plus" size={14} />
              <span>New folder</span>
            </div>
          )}
        </div>
      </div>

      {/* ─── Addresses ─────────────────────────────────────────────────── */}
      <div className={`folders-section ${sections.addresses ? 'expanded' : 'collapsed'}`}>
        <div
          className="folders-section-header"
          onClick={() => toggleSection('addresses')}
          role="button"
          tabIndex={0}
        >
          <span className="chev"><Icon name="chevronDown" size={12} /></span>
          <span className="label">Addresses</span>
          <span className="section-actions">
            <button
              className="section-action"
              title="New address"
              onClick={(e) => { e.stopPropagation(); if (!sections.addresses) toggleSection('addresses'); onNewAddress(); }}
            >
              <Icon name="plus" size={14} />
            </button>
          </span>
        </div>

        <div className="folders-section-body">
          <div className="address-search-wrap">
            <span className="address-search-icon"><Icon name="search" size={13} /></span>
            <input
              className="address-search"
              placeholder="Filter addresses…"
              value={addrQuery}
              onChange={(e) => setAddrQuery(e.target.value)}
            />
            {addrQuery && (
              <button
                className="address-search-clear"
                title="Clear"
                onClick={() => setAddrQuery('')}
              >
                <Icon name="close" size={11} />
              </button>
            )}
          </div>

          <ul className="accounts-list">
            {listedAddrs.length === 0 && (
              <li className="address-empty">No matches</li>
            )}
            {listedAddrs.map(a => {
              const count = ENVELOPES.filter(e => e.account === a.address && e.unread).length;
              const isActive = activeAccount === a.address;
              const isFav = addrFavs.has(a.address);
              return (
                <li
                  key={a.address}
                  className={`account-item ${isActive ? 'active' : ''}`}
                  data-swatch={a.color}
                  onClick={() => onAccountClick(a.address)}
                  title={a.note ? `${a.note}` : a.address}
                >
                  <span className="account-swatch" style={a.color ? { background: `var(${a.color})` } : undefined} />
                  <span style={{
                    overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap',
                    minWidth: 0,
                    color: isActive ? 'var(--ink)' : 'inherit',
                    fontWeight: isActive ? 600 : 500,
                    fontSize: 12,
                  }}>{a.address}</span>
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, justifySelf: 'end' }}>
                    <span className="account-row-actions" onClick={(e) => e.stopPropagation()}>
                      <button
                        className="account-row-action"
                        title={isFav ? 'Unfavorite' : 'Favorite'}
                        onClick={() => toggleAddrFav(a.address)}
                        style={isFav ? { color: 'var(--accent)' } : undefined}
                      >
                        <Icon name={isFav ? 'starFilled' : 'star'} size={12} />
                      </button>
                      <button
                        className="account-row-action"
                        title="Revoke address"
                        onClick={() => revokeAddr(a.address)}
                      >
                        <Icon name="close" size={12} />
                      </button>
                    </span>
                    {count > 0 && <span className="folder-count">{count}</span>}
                  </span>
                </li>
              );
            })}
            {!addrQuery && (
              <li
                className="account-item"
                style={{ cursor: 'pointer' }}
                onClick={onNewAddress}
              >
                <span className="account-swatch" style={{ background: 'transparent', border: '1px dashed var(--ink-quiet)' }} />
                <span style={{ fontSize: 12, color: 'var(--ink-quiet)' }}>+ New address…</span>
              </li>
            )}
            {!addrQuery && otherAddrs.filter(a => !a.isPrimary).length > 0 && (
              <li className="address-empty" style={{ fontSize: 11, padding: '6px 14px' }}>
                Type to search {otherAddrs.filter(a => !a.isPrimary).length} more addresses
              </li>
            )}
          </ul>
        </div>
      </div>
    </aside>
  );
}

// ---------------------------------------------------------------- List pane
function ListPane({
  envelopes, selectedId, onSelect, activeAccount,
  selectMode, setSelectMode, selectedIds, setSelectedIds,
  lastSelectedId, setLastSelectedId, clearSelection, exitSelectMode,
}) {
  const filtered = activeAccount
    ? envelopes.filter(e => e.account === activeAccount)
    : envelopes;

  const tabs = [
    { id: 'all', label: 'All', count: filtered.length },
    { id: 'unread', label: 'Unread', count: filtered.filter(e => e.unread).length },
    { id: 'flagged', label: 'Flagged', count: filtered.filter(e => e.flags.includes('\\Flagged')).length },
  ];
  const [activeTab, setActiveTab] = useState('all');

  const shown = activeTab === 'unread' ? filtered.filter(e => e.unread)
              : activeTab === 'flagged' ? filtered.filter(e => e.flags.includes('\\Flagged'))
              : filtered;

  // --- selection interactions -------------------------------------------
  const shownIds = shown.map(e => e.id);
  const selectedInShown = shownIds.filter(id => selectedIds.has(id));
  const allSelected = shownIds.length > 0 && selectedInShown.length === shownIds.length;
  const someSelected = selectedInShown.length > 0 && !allSelected;

  const toggleSelectMode = () => {
    if (selectMode) exitSelectMode();
    else setSelectMode(true);
  };

  const toggleId = (id, { shift, meta } = {}) => {
    // Entering select mode implicitly when user shift/meta clicks a checkbox.
    const next = new Set(selectedIds);
    if (shift && lastSelectedId != null) {
      const a = shownIds.indexOf(lastSelectedId);
      const b = shownIds.indexOf(id);
      if (a !== -1 && b !== -1) {
        const [lo, hi] = a < b ? [a, b] : [b, a];
        for (let i = lo; i <= hi; i++) next.add(shownIds[i]);
      } else {
        next.add(id);
      }
    } else if (meta) {
      if (next.has(id)) next.delete(id); else next.add(id);
    } else {
      if (next.has(id)) next.delete(id); else next.add(id);
    }
    setSelectedIds(next);
    setLastSelectedId(id);
  };

  const toggleAll = () => {
    if (allSelected) {
      clearSelection();
    } else {
      setSelectedIds(new Set(shownIds));
      setLastSelectedId(shownIds[shownIds.length - 1] ?? null);
    }
  };

  return (
    <section className={`pane pane-list ${selectMode ? 'select-mode' : ''}`}>
      <div className="list-header">
        <div className="list-title-row">
          <h1 className="list-title">
            {activeAccount ? activeAccount : 'Inbox'}
          </h1>
          <span className="list-meta">
            {selectMode && selectedInShown.length > 0
              ? `${selectedInShown.length} selected`
              : `${shown.length} of ${filtered.length}`}
          </span>
        </div>
        <div className="list-tabs">
          {tabs.map(t => (
            <button
              key={t.id}
              className={`list-tab ${activeTab === t.id ? 'active' : ''}`}
              onClick={() => setActiveTab(t.id)}
            >
              {t.label}<span className="count">{t.count}</span>
            </button>
          ))}
        </div>
        <div className="list-sort">
          {selectMode ? (
            <label className="select-all" title={allSelected ? 'Deselect all' : 'Select all'}>
              <span
                className={`list-checkbox ${allSelected ? 'checked' : someSelected ? 'indeterminate' : ''}`}
                onClick={toggleAll}
                role="checkbox"
                aria-checked={allSelected ? 'true' : someSelected ? 'mixed' : 'false'}
              >
                {allSelected && <Icon name="check" size={10} />}
                {someSelected && <span className="dash" />}
              </span>
              <span className="select-all-label" onClick={toggleAll}>
                {allSelected ? 'All' : someSelected ? `${selectedInShown.length}` : 'None'}
              </span>
            </label>
          ) : (
            <>
              <span>Sort</span>
              <select defaultValue="date">
                <option value="date">Date sent</option>
                <option value="arrival">Date received</option>
                <option value="from">Sender</option>
                <option value="subject">Subject</option>
              </select>
            </>
          )}
          <button
            className={`select-toggle ${selectMode ? 'on' : ''}`}
            onClick={toggleSelectMode}
            title={selectMode ? 'Exit select mode' : 'Select multiple'}
          >
            <Icon name="check" size={13} />
            <span>{selectMode ? 'Done' : 'Select'}</span>
          </button>
        </div>
      </div>

      <ul className="rows">
        {shown.map(e => {
          const account = ADDRESSES.find(a => a.address === e.account);
          const isChecked = selectedIds.has(e.id);
          const onRowClick = (evt) => {
            if (selectMode) {
              toggleId(e.id, { shift: evt.shiftKey, meta: evt.metaKey || evt.ctrlKey });
            } else if (evt.shiftKey || evt.metaKey || evt.ctrlKey) {
              // Enter select mode implicitly
              setSelectMode(true);
              const next = new Set();
              if (selectedId != null && selectedId !== e.id && (evt.shiftKey)) {
                next.add(selectedId);
              }
              next.add(e.id);
              setSelectedIds(next);
              setLastSelectedId(e.id);
            } else {
              onSelect(e.id);
            }
          };
          const onCheckboxClick = (evt) => {
            evt.stopPropagation();
            if (!selectMode) setSelectMode(true);
            toggleId(e.id, { shift: evt.shiftKey, meta: evt.metaKey || evt.ctrlKey });
          };
          return (
            <li
              key={e.id}
              className={[
                'row',
                e.unread ? 'unread' : '',
                e.flags.includes('\\Flagged') ? 'flagged' : '',
                e.priority === 'important' ? 'important' : '',
                e.id === selectedId && !selectMode ? 'selected' : '',
                isChecked ? 'checked' : '',
              ].filter(Boolean).join(' ')}
              onClick={onRowClick}
            >
              <span
                className={`row-leading ${selectMode ? 'as-checkbox' : ''}`}
                onClick={onCheckboxClick}
                title={selectMode ? 'Select message' : `Received at ${e.account}`}
              >
                <span
                  className="unread-dot"
                  style={account ? {
                    background: `var(${account.color}, var(--accent))`,
                    '--account-color': `var(${account.color})`,
                  } : undefined}
                />
                <span className={`list-checkbox row-checkbox ${isChecked ? 'checked' : ''}`}>
                  {isChecked && <Icon name="check" size={10} />}
                </span>
              </span>
              <div className="row-main">
                <div className="row-head">
                  <span className="row-from">{extractName(e.from[0])}</span>
                  <span className="row-date">{formatDate(e.date)}</span>
                </div>
                <div className="row-subject">{e.subject}</div>
                {e.preview && <div className="row-preview">{e.preview}</div>}
              </div>
              <div className="row-indicators">
                {e.attachment && <Icon name="paperclip" size={13} />}
                {e.flags.includes('\\Answered') && <Icon name="reply" size={13} />}
                {e.flags.includes('\\Flagged') && <Icon name="starFilled" size={13} />}
              </div>
            </li>
          );
        })}
      </ul>
    </section>
  );
}

// ---------------------------------------------------------------- Bulk-selection pane
function BulkSelectionPane({ count, ids, onClear, onDone }) {
  // Summarize the selection: senders, unread count, attachments, folders
  const selected = ENVELOPES.filter(e => ids.has(e.id));
  const senders = [...new Set(selected.map(e => extractName(e.from[0])))];
  const accounts = [...new Set(selected.map(e => e.account))];
  const unread = selected.filter(e => e.unread).length;
  const flagged = selected.filter(e => e.flags.includes('\\Flagged')).length;
  const withAttach = selected.filter(e => e.attachment).length;

  return (
    <section className="pane pane-reader bulk-pane">
      <div className="reader-toolbar bulk-toolbar">
        <div className="bulk-count">
          <span className="bulk-count-num">{count}</span>
          <span className="bulk-count-label">selected</span>
        </div>
        <span className="tool-divider" />
        <button className="tool-btn"><Icon name="archiveAction" size={14} /> Archive</button>
        <button className="tool-btn"><Icon name="moveTo" size={14} /> Move</button>
        <button className="tool-btn"><Icon name="trash" size={14} /> Delete</button>
        <span className="tool-divider" />
        <button className="tool-btn"><Icon name="flag" size={14} /> Flag</button>
        <button className="tool-btn"><Icon name="markRead" size={14} /> Mark read</button>
        <span className="spacer" />
        <button className="tool-btn" onClick={onClear}>Clear</button>
        <button className="tool-btn primary" onClick={onDone}><Icon name="close" size={12} /> Done</button>
      </div>

      <div className="bulk-body">
        <div className="bulk-hero">
          <div className="bulk-hero-num">{count}</div>
          <div className="bulk-hero-label">{count === 1 ? 'message selected' : 'messages selected'}</div>
        </div>

        <div className="bulk-stats">
          <div className="bulk-stat">
            <div className="bulk-stat-num">{unread}</div>
            <div className="bulk-stat-label">unread</div>
          </div>
          <div className="bulk-stat">
            <div className="bulk-stat-num">{flagged}</div>
            <div className="bulk-stat-label">flagged</div>
          </div>
          <div className="bulk-stat">
            <div className="bulk-stat-num">{withAttach}</div>

        <div className="bulk-section">
          <div className="bulk-section-label">Received at</div>

              return (
                <span className="bulk-chip" key={a}>
                  <span className="bulk-chip-dot" style={{ background: acct ? `var(${acct.color})` : 'var(--ink-quiet)' }} />
                  {a}

        <div className="bulk-section">

// ---------------------------------------------------------------- Reader pane
function ReaderPane({ envelope, onCompose, sample, selectMode, selectedIds, clearSelection, exitSelectMode }) {
  // Bulk-selection state: take over the reader pane with a multi-message summary + action bar.
  const selectionCount = selectMode ? (selectedIds?.size ?? 0) : 0;
  if (selectMode && selectionCount > 0) {
    return <BulkSelectionPane count={selectionCount} ids={selectedIds} onClear={clearSelection} onDone={exitSelectMode} />;
  }
  if (!envelope) return <section className="pane pane-reader" />;
  const fromName = extractName(envelope.from[0]);
  const fromEmail = extractEmail(envelope.from[0]);
  const toAccount = ADDRESSES.find(a => a.address === envelope.account);

  // Per-message override. Defaults:
  //   text/plain -> inherit theme (null = auto)
  //   text/html  -> light island (null = auto)
  // User can click the shield in the header to force the other mode.
  const [override, setOverride] = React.useState(null);
  // Rich/plain toggle — only meaningful when the message is multipart/alternative.
  // 'rich' is default; flipping to 'plain' shows the text alternative.
  const [format, setFormat] = React.useState('rich');
  // Overflow menu open state.
  const [moreOpen, setMoreOpen] = React.useState(false);
  // Source-view modal open state.
  const [sourceOpen, setSourceOpen] = React.useState(false);

  React.useEffect(() => {
    setOverride(null);
    setFormat('rich');
    setMoreOpen(false);
  }, [sample]);

  // Close overflow menu on outside click / Esc
  const moreRef = React.useRef(null);
  React.useEffect(() => {
    if (!moreOpen) return;
    const onDown = (e) => {
      if (moreRef.current && !moreRef.current.contains(e.target)) setMoreOpen(false);
    };
    const onKey = (e) => { if (e.key === 'Escape') setMoreOpen(false); };
    document.addEventListener('mousedown', onDown);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('keydown', onKey);
    };
  }, [moreOpen]);

  const isHtml = sample.mimeType === 'text/html';
  const hasAlternative = isHtml && typeof sample.plainText === 'string';
  const showingPlain = hasAlternative && format === 'plain';
  // effective rendering mode: 'island' means white card; 'inherit' means theme-matched
  const autoMode = isHtml ? 'island' : 'inherit';
  const mode = override || autoMode;
  const attachments = sample.attachments || [];

  return (
    <section className="pane pane-reader">
      <div className="reader">
        <div className="reader-toolbar">
          <button className="tool-btn" onClick={() => onCompose('reply', envelope)}>
            <Icon name="reply" size={14} /> Reply
          </button>
          <button className="tool-btn" onClick={() => onCompose('replyAll', envelope)}>
            <Icon name="replyAll" size={14} /> Reply all
          </button>
          <button className="tool-btn" onClick={() => onCompose('forward', envelope)}>
            <Icon name="forward" size={14} /> Forward
          </button>
          <span className="tool-divider" />
          <button className="tool-btn"><Icon name="archiveAction" size={14} /> Archive</button>
          <button className="tool-btn"><Icon name="moveTo" size={14} /> Move</button>
          <button className="tool-btn"><Icon name="trash" size={14} /></button>
          <span className="tool-divider" />
          <button className="tool-btn"><Icon name="flag" size={14} /></button>
          <button className="tool-btn"><Icon name="markUnread" size={14} /></button>
          <span className="spacer" />
          <div className="reader-more-wrap" ref={moreRef}>
            <button
              className="tool-btn"
              onClick={() => setMoreOpen(v => !v)}
              aria-expanded={moreOpen}
              aria-haspopup="menu"
            >
              <Icon name="more" size={14} />
            </button>
            {moreOpen && (
              <div className="reader-more-menu" role="menu">
                {hasAlternative && (
                  <>
                    <div className="reader-more-group-label">Format</div>
                    <button
                      onClick={() => { setFormat('rich'); setMoreOpen(false); }}
                      className={format === 'rich' ? 'checked' : ''}
                    >
                      {format === 'rich'
                        ? <Icon name="check" size={13} />
                        : <span className="check-slot" />}
                      <span>Rich (HTML)</span>
                    </button>
                    <button
                      onClick={() => { setFormat('plain'); setMoreOpen(false); }}
                      className={format === 'plain' ? 'checked' : ''}
                    >
                      {format === 'plain'
                        ? <Icon name="check" size={13} />
                        : <span className="check-slot" />}
                      <span>Plain text alternative</span>
                    </button>
                    <div className="sep" />
                  </>
                )}
                {isHtml && !showingPlain && (
                  <>
                    <button
                      onClick={() => { setOverride(override === 'inherit' ? null : 'inherit'); setMoreOpen(false); }}
                      className={override === 'inherit' ? 'checked' : ''}
                    >
                      {override === 'inherit'
                        ? <Icon name="check" size={13} />
                        : <span className="check-slot" />}
                      <span>Match app theme</span>
                    </button>
                    <div className="sep" />
                  </>
                )}
                <button onClick={() => { setSourceOpen(true); setMoreOpen(false); }}>
                  <Icon name="settings" size={13} /><span>View source</span><span className="hint">⌥⌘U</span>
                </button>
                <button>
                  <Icon name="info" size={13} /><span>Show original headers</span>
                </button>
                <button>
                  <Icon name="forward" size={13} /><span>Forward as attachment</span>
                </button>
                <button>
                  <Icon name="sent" size={13} /><span>Print…</span><span className="hint">⌘P</span>
                </button>
                <div className="sep" />
                <button>
                  <Icon name="archive" size={13} /><span>Save to archive folder…</span>
                </button>
                <button>
                  <Icon name="junk" size={13} /><span>Mark as spam</span>
                </button>
                <div className="sep" />
                <button className="danger">
                  <Icon name="trash" size={13} /><span>Block sender</span>
                </button>
              </div>
            )}
          </div>
        </div>

        <div className="reader-body">
          <h1 className="msg-subject">{sample === SAMPLE_NEWSLETTER ? 'The quiet return of the subdomain address' : envelope.subject}</h1>

          <div className="msg-header">
            <div className="msg-avatar">{sample === SAMPLE_NEWSLETTER ? 'CD' : initials(fromName)}</div>
            <div className="msg-meta">
              <div className="msg-from">
                {sample === SAMPLE_NEWSLETTER ? 'Cabalmail Dispatch' : fromName}
                {' '}<span className="email">&lt;{sample === SAMPLE_NEWSLETTER ? 'dispatch@cabalmail.com' : fromEmail}&gt;</span>
              </div>
              <div className="msg-to">
                <span>to </span>
                {toAccount && <RecipientPill address={envelope.account} owned />}
                {isHtml && (
                  <span className="msg-mime-tag" title="This message is HTML-formatted">HTML</span>
                )}
              </div>
            </div>
            <div className="msg-header-tools">
              <div className="msg-date">{formatLongDate(envelope.date)}</div>
            </div>
          </div>

          <div className={`msg-body ${showingPlain ? 'inherit' : (mode === 'island' ? 'island' : 'inherit')}`}>
            {showingPlain ? (
              <pre className="msg-plain">{sample.plainText}</pre>
            ) : isHtml ? (
              mode === 'island'
                ? <div className="html-island" dangerouslySetInnerHTML={{ __html: sample.html }} />
                : <div className="html-stripped" dangerouslySetInnerHTML={{ __html: sample.html }} />
            ) : (
              sample.paragraphs.map((p, i) => {
                if (p.includes('Thanks,')) return <div className="sig" key={i}>{p}</div>;
                return <p key={i}>{p}</p>;
              })
            )}
          </div>

          {attachments.length > 0 && (
            <AttachmentsList attachments={attachments} />
          )}

          <div className="quick-reply">
            <span>Reply as <RecipientPill address={envelope.account} owned inline /></span>
            <div className="quick-reply-actions">
              <button className="qr-btn">Change address</button>
              <button className="qr-btn primary" onClick={() => onCompose('reply', envelope)}>Reply</button>
            </div>
          </div>
        </div>
      </div>

      {sourceOpen && (
        <SourceView
          envelope={envelope}
          sample={sample}
          onClose={() => setSourceOpen(false)}
        />
      )}
    </section>
  );
}

// Recipient pill — shows an address, with revoke affordance if owned, claim affordance if not
function RecipientPill({ address, owned, inline }) {
  const [hover, setHover] = useState(false);
  const acct = ADDRESSES.find(a => a.address === address);
  return (
    <span
      className="recipient-pill"
      data-owned={owned ? 'true' : 'false'}
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        display: 'inline-flex',
        alignItems: 'center',
        gap: 6,
        padding: '2px 8px 2px 6px',
        borderRadius: 999,
        border: '1px solid var(--border)',
        background: 'var(--surface)',
        fontSize: 11,
        color: 'var(--ink-soft)',
        fontFamily: inline ? 'inherit' : 'var(--font-mono)',
        marginLeft: inline ? 6 : 0,
        verticalAlign: 'baseline',
      }}
    >
      <span
        style={{
          width: 6, height: 6, borderRadius: '50%',

// ---- Attachments list (reader pane, bottom of msg) -------------------------
function AttachmentsList({ attachments }) {
  const total = attachments.reduce((sum, a) => sum + (a.size || 0), 0);
  return (
    <div className="attachments">
      <div className="attachments-head">
        <div className="attachments-title">
          {attachments.length} {attachments.length === 1 ? 'attachment' : 'attachments'}
        </div>
        <div className="attachments-meta">{formatBytes(total)} total · <a href="#" onClick={e => e.preventDefault()} style={{ color: 'inherit', textDecoration: 'underline', textUnderlineOffset: 2 }}>Download all</a></div>
      </div>
      <div className="attachments-list" role="list">
        {attachments.map((a, i) => (
          <div className="att-row" key={i} role="listitem">
            <div className="att-name" title={a.name}>
              <span className="att-icon">{extForIcon(a.name)}</span>
              <span className="att-filename">{a.name}</span>

function formatBytes(n) {
  if (n == null) return '—';
  if (n < 1024) return `${n} B`;
  if (n < 1024 * 1024) return `${(n / 1024).toFixed(n < 10240 ? 1 : 0)} KB`;
  return `${(n / (1024 * 1024)).toFixed(n < 10 * 1024 * 1024 ? 1 : 0)} MB`;
}
function extForIcon(name) {
  const m = /\.([a-z0-9]+)$/i.exec(name);
  return m ? m[1].toUpperCase().slice(0, 4) : '—';
}

// ---- Source view modal ----------------------------------------------------
// Lightweight RFC 5322 / MIME reconstruction — not a real encoder, just a
// realistic-looking rendering so the reader can glance at the raw message.
function SourceView({ envelope, sample, onClose }) {
  const [tab, setTab] = React.useState('all'); // 'all' | 'headers' | 'body'
  const [copied, setCopied] = React.useState(false);

  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [onClose]);

  // Synthesize a plausible RFC 822-ish source.
  const isNewsletter = sample === SAMPLE_NEWSLETTER;
  const hasAlt = sample.mimeType === 'text/html' && typeof sample.plainText === 'string';
  const fromName = isNewsletter ? 'Cabalmail Dispatch' : extractName(envelope.from[0]);
  const fromEmail = isNewsletter ? 'dispatch@cabalmail.com' : extractEmail(envelope.from[0]);
  const subject = isNewsletter ? 'The quiet return of the subdomain address' : envelope.subject;
  const date = envelope.date;
  const msgId = `<${Math.random().toString(36).slice(2, 10)}.${Date.now().toString(36)}@${fromEmail.split('@')[1] || 'cabalmail.com'}>`;
  const boundary = `----=_CabalPart_${Math.random().toString(36).slice(2, 12)}`;
  const altBoundary = `----=_CabalAlt_${Math.random().toString(36).slice(2, 12)}`;

  const headers = [
    ['Return-Path', `<${fromEmail}>`],
    ['Received', `from mx3.cabalmail.com (mx3.cabalmail.com [10.0.12.23])\n\tby imap-04.cabalmail.com with ESMTPS id ${Math.random().toString(36).slice(2,14).toUpperCase()}\n\tfor <${envelope.account}>; ${formatRFC822(date)}`],
    ['Received-SPF', `pass (cabalmail.com: domain of ${fromEmail} designates ${fromEmail.split('@')[1]} as permitted sender)`],
    ['Authentication-Results', `mx3.cabalmail.com;\n\tdkim=pass header.d=${fromEmail.split('@')[1]} header.s=default;\n\tspf=pass smtp.mailfrom=${fromEmail};\n\tdmarc=pass (p=REJECT) header.from=${fromEmail.split('@')[1]}`],
    ['DKIM-Signature', `v=1; a=rsa-sha256; c=relaxed/relaxed; d=${fromEmail.split('@')[1]};\n\ts=default; t=${Math.floor(new Date(date).getTime()/1000)}; bh=${Math.random().toString(36).slice(2,15)}=;\n\th=From:To:Subject:Date:MIME-Version:Content-Type;\n\tb=${Math.random().toString(36).slice(2,20)}${Math.random().toString(36).slice(2,20)}…`],
    ['From', `"${fromName}" <${fromEmail}>`],
    ['To', envelope.account],
    ['Subject', subject],
    ['Date', formatRFC822(date)],
    ['Message-ID', msgId],
    ['MIME-Version', '1.0'],
  ];
  if (hasAlt) {
    headers.push(['Content-Type', `multipart/alternative;\n\tboundary="${altBoundary}"`]);
  } else if (sample.mimeType === 'text/html') {
    headers.push(['Content-Type', 'text/html; charset=UTF-8']);
    headers.push(['Content-Transfer-Encoding', 'quoted-printable']);
  } else {
    headers.push(['Content-Type', 'text/plain; charset=UTF-8; format=flowed']);
    headers.push(['Content-Transfer-Encoding', '7bit']);
  }
  if ((sample.attachments || []).length > 0) {
    // If there are attachments, promote to multipart/mixed wrapping the body.
    headers[headers.length - 3] = ['Content-Type', `multipart/mixed;\n\tboundary="${boundary}"`];
  }

  const sampleHtmlShort = sample.html
    ? sample.html.replace(/data:image\/svg\+xml;utf8,<svg[^>]+>[\s\S]*?<\/svg>/g, 'data:image/svg+xml;utf8,<svg>…[5kb logo SVG elided]…</svg>')
        .replace(/\n{3,}/g, '\n\n')
    : '';

  const bodyText = sample.mimeType === 'text/plain'
    ? sample.paragraphs.join('\n\n')
    : (hasAlt ? sample.plainText : sampleHtmlShort);

  const full = React.useMemo(() => {
    const out = [];
    out.push(...headers.map(([k, v]) => `${k}: ${v}`));
    out.push('');
    if ((sample.attachments || []).length > 0) {
      out.push(`--${boundary}`);
      if (hasAlt) {
        out.push(`Content-Type: multipart/alternative; boundary="${altBoundary}"`);
        out.push('');
        out.push(`--${altBoundary}`);
        out.push('Content-Type: text/plain; charset=UTF-8');
        out.push('Content-Transfer-Encoding: 7bit');
        out.push('');
        out.push(sample.plainText);
        out.push('');
        out.push(`--${altBoundary}`);
        out.push('Content-Type: text/html; charset=UTF-8');
        out.push('Content-Transfer-Encoding: quoted-printable');
        out.push('');
        out.push(sampleHtmlShort);
        out.push(`--${altBoundary}--`);
      } else {
        out.push(`Content-Type: ${sample.mimeType}; charset=UTF-8`);
        out.push('');
        out.push(bodyText);
      }
      for (const a of sample.attachments) {
        out.push('');
        out.push(`--${boundary}`);
        out.push(`Content-Type: ${a.mime}; name="${a.name}"`);
        out.push('Content-Transfer-Encoding: base64');
        out.push(`Content-Disposition: attachment; filename="${a.name}"`);
        out.push('');
        out.push(`[${formatBytes(a.size)} base64-encoded payload elided]`);
      }
      out.push(`--${boundary}--`);
    } else if (hasAlt) {
      out.push(`--${altBoundary}`);
      out.push('Content-Type: text/plain; charset=UTF-8');
      out.push('Content-Transfer-Encoding: 7bit');
      out.push('');
      out.push(sample.plainText);
      out.push('');
      out.push(`--${altBoundary}`);
      out.push('Content-Type: text/html; charset=UTF-8');
      out.push('Content-Transfer-Encoding: quoted-printable');
      out.push('');
      out.push(sampleHtmlShort);
      out.push(`--${altBoundary}--`);
    } else {
      out.push(bodyText);
    }
    return out.join('\n');
  }, [envelope.id, sample]);

  const copy = async () => {
    try { await navigator.clipboard.writeText(full); setCopied(true); setTimeout(() => setCopied(false), 1400); } catch {}
  };

  return (
    <div className="source-scrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="source-window" role="dialog" aria-label="Message source">
        <div className="source-header">
          <div className="source-header-title">
            Message source
            <span className="tag">{subject.length > 44 ? subject.slice(0, 42) + '…' : subject}</span>
          </div>
          <div className="source-header-tools">
            <div className="reader-format-toggle">
              <button className={tab === 'all' ? 'active' : ''} onClick={() => setTab('all')}>Full</button>
              <button className={tab === 'headers' ? 'active' : ''} onClick={() => setTab('headers')}>Headers</button>
              <button className={tab === 'body' ? 'active' : ''} onClick={() => setTab('body')}>Body</button>
            </div>
            <button className="source-tool" onClick={copy}>{copied ? '✓ Copied' : 'Copy'}</button>
            <button className="source-tool">Save .eml</button>
            <button className="source-close" onClick={onClose} aria-label="Close"><Icon name="close" size={14} /></button>
          </div>
        </div>
        <div className="source-body">
          {tab === 'headers' ? (
            headers.map(([k, v], i) => (
              <div key={i}><span className="hdr-name">{k}:</span> {v}</div>
            ))
          ) : tab === 'body' ? (
            bodyText
          ) : (() => {
            // Full view: render headers with color, then show raw body after a separator.
            // Compute the body portion by counting actual lines produced by the headers.
            const headerLineCount = headers.reduce((n, [, v]) => n + String(v).split('\n').length, 0);
            const rest = full.split('\n').slice(headerLineCount + 1).join('\n'); // +1 for blank-line separator
            return (
              <>
                {headers.map(([k, v], i) => (
                  <div key={i}><span className="hdr-name">{k}:</span> {v}</div>
                ))}
                <div className="hdr-sep" />
                {rest}
              </>
            );
          })()}
        </div>
      </div>
    </div>
  );
}

function formatRFC822(iso) {
  try {
    const d = new Date(iso);
    return d.toUTCString().replace('GMT', '+0000');
  } catch { return String(iso); }
}

        <div className="segment">
          {DENSITIES.map(d => (
            <button key={d.id}
              className={state.density === d.id ? 'active' : ''}
              onClick={() => setState({ density: d.id })}>{d.label}</button>
          ))}
        </div>
      </div>

      <div className="tweak-group">
        <label className="tweak-label">Sample message</label>
        <div className="segment">
          <button className={state.sample !== 'newsletter' ? 'active' : ''} onClick={() => setState({ sample: 'reply' })}>Plain reply</button>
          <button className={state.sample === 'newsletter' ? 'active' : ''} onClick={() => setState({ sample: 'newsletter' })}>HTML newsletter</button>
        </div>
      </div>

      <div className="tweak-group" style={{ marginBottom: 0 }}>
        <label className="tweak-label">Show</label>
        <div className="segment">
          <button className={!state.composeOpen ? 'active' : ''} onClick={() => setState({ composeOpen: false })}>Reader</button>
          <button className={state.composeOpen ? 'active' : ''} onClick={() => setState({ composeOpen: true })}>Compose</button>
        </div>
      </div>
    </div>
  );
}

// Compose overlay
// ---------------------------------------------------------------------------
function ComposeOverlay({ onClose, prefill }) {
  const [from, setFrom] = useS2(() => prefill?.from || ADDRESSES[0].address);
  const [fromQuery, setFromQuery] = useS2('');
  const [fromOpen, setFromOpen] = useS2(false);
  const [mode, setMode] = useS2('pick'); // 'pick' | 'create'
  const [to, setTo] = useS2(prefill?.to || '');
  const [subject, setSubject] = useS2(prefill?.subject || '');
  const fromRef = useR2();

  // New-address form state (mirrors Request.jsx)
  const [newUser, setNewUser] = useS2('');
  const [newSub, setNewSub] = useS2('');
  const [newDomain, setNewDomain] = useS2(DOMAINS[0]);
  const [newNote, setNewNote] = useS2('');

  // Favorites (starred addresses) — persisted in localStorage
  const [favs, setFavs] = useS2(() => {
    try { return new Set(JSON.parse(localStorage.getItem('cabal-favs') || '[]')); }
    catch { return new Set(); }
  });
  const toggleFav = (addr, e) => {
    e.stopPropagation();
    setFavs(prev => {
      const next = new Set(prev);
      if (next.has(addr)) next.delete(addr); else next.add(addr);
      try { localStorage.setItem('cabal-favs', JSON.stringify([...next])); } catch {}
      return next;
    });
  };

  const randomString = (len, pool1, pool2, pool3) => {
    const pick = (pool) => pool[Math.floor(Math.random() * pool.length)];
    let out = pick(pool1);
    for (let i = 1; i < len - 1; i++) out += pick(pool2);
    out += pick(pool3);
    return out;
  };
  const generateRandom = () => {
    const alphanum = 'abcdefghijklmnopqrstuvwxyz0123456789';
    setNewUser(randomString(8, alphanum, alphanum + '._-', alphanum));
    setNewSub(randomString(8, alphanum, alphanum + '-', alphanum));
    setNewDomain(DOMAINS[Math.floor(Math.random() * DOMAINS.length)]);
  };

  useE2(() => {
    const onDoc = (e) => {
      if (fromRef.current && !fromRef.current.contains(e.target)) {
        setFromOpen(false); setMode('pick');
      }
    };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);

  const q = fromQuery.trim().toLowerCase();

  const allAddresses = useM2(() => {
    return [
      ...ADDRESSES.map(a => ({ ...a, group: 'primary' })),
      ...RECEIVE_ONLY.map(a => ({ ...a, group: 'other' })),
    ];
  }, []);

  const filtered = useM2(() => {
    const match = (a) => !q
      || a.address.toLowerCase().includes(q)
      || (a.note || '').toLowerCase().includes(q)
      || (a.sub || '').toLowerCase().includes(q);
    const allFav = allAddresses.filter(a => favs.has(a.address) && match(a));
    // Without a query: show just starred/labeled primary addresses.
    // With a query: search the whole pool (cap to 40 extras for perf).
    const primary = ADDRESSES.filter(a => !favs.has(a.address) && match(a));
    const other = RECEIVE_ONLY.filter(a => !favs.has(a.address) && match(a))
      .slice(0, q ? 40 : 0);
    return { fav: allFav, primary, other };
  }, [q, favs, allAddresses]);

  const selectedAccount = allAddresses.find(a => a.address === from);
  const nothingMatches = q && filtered.primary.length === 0 && filtered.other.length === 0 && filtered.fav.length === 0;

  const pickAddress = (addr) => {
    setFrom(addr);
    setFromOpen(false);
    setFromQuery('');
    setMode('pick');
  };

  const validUsername = /^[a-z0-9][a-z0-9._-]*$/i.test(newUser);
  const validSubdomain = /^[a-z0-9][a-z0-9-]*$/i.test(newSub);
  const canCreate = validUsername && validSubdomain && newDomain;
  const newAddressPreview = canCreate ? `${newUser}@${newSub}.${newDomain}` : '';

  const submitCreate = () => {
    if (!canCreate) return;
    // In real app: api.newAddress(newUser, newSub, newDomain, '', newAddressPreview)
    // Here we just "create" locally and select it.
    pickAddress(newAddressPreview);
  };

  return (
    <div className="compose-scrim" onClick={onClose}>
      <div className="compose-window" onClick={e => e.stopPropagation()}>
        {/* Title bar */}
        <div className="compose-title">
          <span>New message</span>
          <button onClick={onClose} aria-label="Close">
            <Icon name="close" size={14} />
          </button>
        </div>

        {/* Headers */}
        <div className="compose-headers">
          {/* FROM */}
          <div className="compose-row">
            <span className="compose-label">From</span>
            <div ref={fromRef} className="from-field">
              <div
                className={`from-trigger ${fromOpen ? 'open' : ''}`}
                onClick={() => { if (!fromOpen) { setFromOpen(true); setMode('pick'); } }}
              >
                {!fromOpen && selectedAccount && (
                  <span className="from-swatch" style={{
                    background: selectedAccount.color ? `var(${selectedAccount.color})` : 'var(--ink-quiet)'
                  }} />
                )}
                {fromOpen ? (
                  <input
                    autoFocus
                    placeholder={mode === 'create' ? "Filling in new address below…" : "Search your addresses…"}
                    value={fromQuery}
                    onChange={(e) => { setFromQuery(e.target.value); setMode('pick'); }}
                    className="from-search"
                    disabled={mode === 'create'}
                  />
                ) : (
                  <>
                    <span className="from-address">{from}</span>
                    <Icon name="chevronDown" size={14} className="icon" />
                  </>
                )}
              </div>

              {fromOpen && (
                <div className="from-menu" role="listbox">
                  {mode === 'create' ? (
                    <CreateAddressForm
                      newUser={newUser} setNewUser={setNewUser}
                      newSub={newSub} setNewSub={setNewSub}
                      newDomain={newDomain} setNewDomain={setNewDomain}
                      newNote={newNote} setNewNote={setNewNote}
                      validUsername={validUsername}
                      validSubdomain={validSubdomain}
                      canCreate={canCreate}
                      preview={newAddressPreview}
                      onCancel={() => setMode('pick')}
                      onSubmit={submitCreate}
                      onRandom={generateRandom}
                    />
                  ) : (
                    <>
                      {filtered.fav.length > 0 && (
                        <div className="from-section">
                          <div className="from-section-label">
                            Favorites
                            <span className="from-section-count">{filtered.fav.length}</span>
                          </div>
                          {filtered.fav.map(a => (
                            <FromRow key={a.address} a={a} q={q}
                              starred={true}
                              onStar={(e) => toggleFav(a.address, e)}
                              onPick={() => pickAddress(a.address)} />
                          ))}
                        </div>
                      )}

                      {filtered.primary.length > 0 && (
                        <div className="from-section">
                          <div className="from-section-label">
                            {filtered.fav.length > 0 ? 'More addresses' : 'Your addresses'}
                            <span className="from-section-count">{filtered.primary.length}</span>
                          </div>
                          {filtered.primary.map(a => (
                            <FromRow key={a.address} a={a} q={q}
                              starred={favs.has(a.address)}
                              onStar={(e) => toggleFav(a.address, e)}
                              onPick={() => pickAddress(a.address)} />
                          ))}
                        </div>
                      )}

                      {filtered.other.length > 0 && (
                        <div className="from-section">
                          <div className="from-section-label">
                            Search results
                            <span className="from-section-count">{q ? `${filtered.other.length} of ${RECEIVE_ONLY.length}` : RECEIVE_ONLY.length}</span>
                          </div>
                          {filtered.other.map(a => (
                            <FromRow key={a.address} a={a} q={q}
                              starred={favs.has(a.address)}
                              onStar={(e) => toggleFav(a.address, e)}
                              onPick={() => pickAddress(a.address)} />
                          ))}
                        </div>
                      )}
                      {!q && filtered.other.length === 0 && RECEIVE_ONLY.filter(a => !favs.has(a.address)).length > 0 && (
                        <div className="from-hint">Type to search {RECEIVE_ONLY.length} more addresses</div>
                      )}

                      {nothingMatches && (
                        <div className="from-empty">No address matches “{q}”.</div>
                      )}

                      <button className="from-create-cta" onClick={() => {
                        setMode('create');
                        // prefill create form from the current query if it looks like a username
                        if (q && /^[a-z0-9][a-z0-9._-]*$/i.test(q) && !q.includes('@')) {
                          setNewUser(q);
                        }
                      }}>
                        <span className="plus">+</span>
                        <span className="create-label">
                          <strong>Create a new address</strong>
                          <span className="create-hint">username @ subdomain . domain</span>
                        </span>
                        <Icon name="chevronRight" size={14} className="icon" />
                      </button>
                    </>
                  )}
                </div>
              )}
            </div>
          </div>

          {/* TO */}
          <div className="compose-row">
            <span className="compose-label">To</span>
            <input className="compose-input mono"
              value={to} onChange={e => setTo(e.target.value)}
              placeholder="Recipient…" />
          </div>

          {/* SUBJECT */}
          <div className="compose-row">
            <span className="compose-label">Subject</span>
            <input className="compose-input"
              value={subject} onChange={e => setSubject(e.target.value)}
              placeholder="Subject…" />
          </div>
        </div>

        {/* Body */}
        <div className="compose-body">
          <p className="compose-body-placeholder">Write your message…</p>
        </div>

        {/* Footer */}
        <div className="compose-footer">
          <button className="qr-btn primary">Send</button>
          <button className="qr-btn">Save draft</button>
          <span style={{ flex: 1 }} />
          <button className="tool-btn"><Icon name="paperclip" size={14} /></button>
          <button className="tool-btn"><Icon name="link" size={14} /></button>
          <button className="tool-btn"><Icon name="more" size={14} /></button>
        </div>
      </div>
    </div>
  );
}

function FromRow({ a, q, starred, onStar, onPick }) {
  return (
    <button className="from-option" onClick={onPick}>
      <span className="from-option-swatch"
        style={a.color ? { background: `var(${a.color})` } : undefined} />
      <div className="from-option-main">
        <span className="from-option-addr">{highlight(a.address, q)}</span>
        {a.note && <span className="from-option-note">{highlight(a.note, q)}</span>}
      </div>
      <span
        className={`from-option-star ${starred ? 'on' : ''}`}
        onClick={onStar}
        role="button"
        aria-label={starred ? 'Unfavorite' : 'Favorite'}
        title={starred ? 'Remove from favorites' : 'Add to favorites'}
      >
        <Icon name={starred ? 'starFilled' : 'star'} size={13} />
      </span>
    </button>
  );
}

// Highlight query matches inside a string (returns array of JSX nodes)
function highlight(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return [
    text.slice(0, idx),
    React.createElement('mark', { key: 'm', className: 'from-hl' }, text.slice(idx, idx + q.length)),
    text.slice(idx + q.length),
  ];
}

function CreateAddressForm({
  newUser, setNewUser, newSub, setNewSub, newDomain, setNewDomain,
  newNote, setNewNote,
  validUsername, validSubdomain, canCreate, preview, onCancel, onSubmit, onRandom
}) {
  return (
    <div className="create-form">
      <div className="create-header">
        <button className="create-back" onClick={onCancel} aria-label="Back">
          <Icon name="chevronLeft" size={13} />
        </button>
        <div className="create-titles">
          <div className="create-title">New address</div>
          <div className="create-sub">Cabalmail requires a subdomain for every address.</div>
        </div>
        <button className="create-random" onClick={onRandom} title="Generate random address">
          <Icon name="shuffle" size={13} />
          <span>Random</span>
        </button>
      </div>

      <div className="address-composer">
        <input
          autoFocus
          value={newUser}
          onChange={e => setNewUser(e.target.value.toLowerCase())}
          placeholder="username"
          className={`ac-input ${newUser && !validUsername ? 'invalid' : ''}`}
          autoCapitalize="none" autoCorrect="off" spellCheck={false}
        />
        <span className="ac-sep">@</span>
        <input
          value={newSub}
          onChange={e => setNewSub(e.target.value.toLowerCase())}
          placeholder="subdomain"
          className={`ac-input ${newSub && !validSubdomain ? 'invalid' : ''}`}
          autoCapitalize="none" autoCorrect="off" spellCheck={false}
        />
        <span className="ac-sep">.</span>
        <select
          value={newDomain}
          onChange={e => setNewDomain(e.target.value)}
          className="ac-select"
        >
          {DOMAINS.map(d => <option key={d} value={d}>{d}</option>)}
        </select>
      </div>

      <div className="ac-preview-row">
        {preview ? (
          <>
            <span className="ac-preview-label">Preview</span>
            <code className="ac-preview">{preview}</code>
          </>
        ) : (
          <span className="ac-preview-empty">Fill all three fields to see a preview</span>
        )}
      </div>

      <div className="create-note-row">
        <label className="create-note-label" htmlFor="addr-note">Note</label>
        <input
          id="addr-note"
          value={newNote}
          onChange={e => setNewNote(e.target.value)}
          placeholder="e.g. florist down the street, gym sign-up, …"
          className="create-note-input"
          maxLength={80}
        />
      </div>

      <div className="create-hint-row">
        <Icon name="info" size={12} />
        <span>
          Notes are searchable — helpful when you have a lot of addresses
          and can&rsquo;t remember which one went where.
        </span>
      </div>

      <div className="create-actions">
        <button className="qr-btn" onClick={onCancel}>Cancel</button>
        <button className="qr-btn primary" onClick={onSubmit} disabled={!canCreate}>
          Create &amp; use
        </button>
      </div>
    </div>
  );
}

const LS_KEY = 'cabalmail-inbox-tweaks';

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "direction": "stately",
  "theme": "light",
  "accent": "forest",
  "density": "compact",
  "sample": "newsletter",
  "composeOpen": false
}/*EDITMODE-END*/;

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(LS_KEY));
    return { ...TWEAK_DEFAULTS, ...(s || {}) };
  } catch {
    return { ...TWEAK_DEFAULTS };
  }
}

const USER_ACCENTS = ['ink', 'oxblood', 'forest', 'azure', 'amber', 'plum'];

function UserMenu({ state, setState }) {
  const [open, setOpen] = useAS(false);
  const ref = React.useRef(null);
  useAE(() => {
    if (!open) return;
    const onDoc = (e) => { if (!ref.current?.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, [open]);
  return (
    <div className="user-menu-wrap" ref={ref}>
      <button className="avatar" title="chris@cabalmail.com" onClick={() => setOpen(o => !o)}>CC</button>
      {open && (
        <div className="user-menu" role="menu">
          <div className="user-menu-head">
            <div className="user-menu-avatar">CC</div>
            <div className="user-menu-who">
              <div className="user-menu-name">Chris Carr</div>
              <div className="user-menu-mail">chris@main.cabalmail.com</div>
            </div>
          </div>

          <div className="user-menu-section-label">Accent color</div>
          <div className="user-menu-accents">
            {USER_ACCENTS.map(c => (
              <button key={c}
                className={`accent-swatch ${state.accent === c ? 'active' : ''}`}
                data-c={c}
                onClick={() => setState({ accent: c })}
                title={c[0].toUpperCase() + c.slice(1)} />
            ))}
          </div>

          <div className="user-menu-sep" />
          <button className="user-menu-item"><Icon name="settings" size={13} /><span>Preferences…</span></button>
          <button className="user-menu-item"><Icon name="info" size={13} /><span>Keyboard shortcuts</span></button>
          <div className="user-menu-sep" />
          <button className="user-menu-item"><span>Sign out</span></button>
        </div>
      )}
    </div>
  );
}

function App() {
  const [state, setStateRaw] = useAS(loadState);
  const setState = (patch) => setStateRaw(s => {
    const next = { ...s, ...patch };
    try { localStorage.setItem(LS_KEY, JSON.stringify(next)); } catch {}
    return next;
  });

  // Track system color scheme
  const [systemTheme, setSystemTheme] = useAS(() =>
    window.matchMedia?.('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
  );
  useAE(() => {
    const mq = window.matchMedia?.('(prefers-color-scheme: dark)');
    if (!mq) return;
    const onChange = (e) => setSystemTheme(e.matches ? 'dark' : 'light');
    mq.addEventListener?.('change', onChange) ?? mq.addListener?.(onChange);
    return () => mq.removeEventListener?.('change', onChange) ?? mq.removeListener?.(onChange);
  }, []);
  const effectiveTheme = state.theme === 'system' ? systemTheme : state.theme;

  const [showTweaks, setShowTweaks] = useAS(true);
  const [selectedId, setSelectedId] = useAS(SELECTED_MESSAGE_ID);
  const [activeFolder, setActiveFolder] = useAS('INBOX');
  const [activeAccount, setActiveAccount] = useAS(null);
  const [composePrefill, setComposePrefill] = useAS(null);

  // Bulk selection (multi-select mode)
  const [selectMode, setSelectMode] = useAS(false);
  const [selectedIds, setSelectedIds] = useAS(() => new Set());
  const [lastSelectedId, setLastSelectedId] = useAS(null);
  const clearSelection = () => { setSelectedIds(new Set()); setLastSelectedId(null); };
  const exitSelectMode = () => { setSelectMode(false); clearSelection(); };

  // Revoked addresses — persisted in localStorage
  const [revokedAddrs, setRevokedAddrs] = useAS(loadRevoked);
  useAE(() => saveRevoked(revokedAddrs), [revokedAddrs]);
  const revokeAddress = (addr) => {
    setRevokedAddrs(s => {
      const n = new Set(s); n.add(addr); return n;
    });
    if (activeAccount === addr) setActiveAccount(null);
  };
  // Expose to RecipientPill (which is rendered inside ReaderPane / ComposeOverlay and
  // doesn't otherwise receive app-level props).
  useAE(() => {
    window.__cabalRevoke = (addr) => {
      if (!confirm(`Revoke ${addr}?\n\nIncoming mail to this address will start bouncing. This can't be undone in the prototype.`)) return;
      revokeAddress(addr);
    };
  }, [revokedAddrs, activeAccount]);

  // Listen for host activate/deactivate (Tweaks toolbar toggle)
  useAE(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', onMsg);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  // Persist edits to host
  useAE(() => {
    const { composeOpen, ...persisted } = state;
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: persisted }, '*');
  }, [state.direction, state.theme, state.accent, state.density, state.sample]);  const selectedEnvelope = ENVELOPES.find(e => e.id === selectedId);

  const openCompose = (type, envelope) => {
    if (!envelope) { setComposePrefill({}); setState({ composeOpen: true }); return; }
    const prefix = type === 'forward' ? 'Fwd: ' : 'Re: ';
    setComposePrefill({
      from: envelope.account,
      to: type === 'forward' ? '' : extractEmail(envelope.from[0]),
      subject: prefix + envelope.subject.replace(/^(re:?\s|fwd?:?\s)?/i, ''),
    });
    setState({ composeOpen: true });
  };

  return (
    <div
      className="app"
      data-direction={state.direction}
      data-theme={effectiveTheme}
      data-theme-pref={state.theme}
      data-accent={state.accent}
      data-compact={state.density}
    >
      {/* Top bar */}
      <header className="topbar">
        <div className="brand">
          <span className="brand-logo-tile" aria-label="Cabalmail">
            <svg className="brand-logo" viewBox="0 0 200 100" fill="currentColor" shapeRendering="crispEdges" aria-hidden="true"><path d={LOGO_PATH_D} /></svg>
          </span>
          <span className="brand-word">Cabalmail</span>
        </div>
        <div className="search">
          <Icon name="search" size={14} />
          <input placeholder="Search mail, senders, attachments…" />
          <kbd>⌘K</kbd>
        </div>
        <div className="topbar-right">
          <button className="icon-btn" title="Settings"><Icon name="settings" size={15} /></button>
          <UserMenu state={state} setState={setState} />
        </div>
      </header>

      <div className="panes">
        <FoldersPane
          activeFolder={activeFolder}
          onFolderClick={(f) => { setActiveFolder(f); setActiveAccount(null); }}
          activeAccount={activeAccount}
          onAccountClick={(a) => setActiveAccount(activeAccount === a ? null : a)}
          onCompose={() => openCompose('new', null)}
          onNewAddress={() => { setComposePrefill({ openCreate: true }); setState({ composeOpen: true }); }}
          revokedAddrs={revokedAddrs}
          onRevokeAddress={revokeAddress}
        />
        <ListPane
          envelopes={ENVELOPES}
          selectedId={selectedId}
          onSelect={setSelectedId}
          activeAccount={activeAccount}
          selectMode={selectMode}
          setSelectMode={setSelectMode}
          selectedIds={selectedIds}
          setSelectedIds={setSelectedIds}
          lastSelectedId={lastSelectedId}
          setLastSelectedId={setLastSelectedId}
          clearSelection={clearSelection}
          exitSelectMode={exitSelectMode}
        />
        <ReaderPane
          envelope={selectedEnvelope}
          onCompose={openCompose}
          sample={state.sample === 'newsletter' ? SAMPLE_NEWSLETTER : SAMPLE_REPLY}
          selectMode={selectMode}
          selectedIds={selectedIds}
          clearSelection={clearSelection}
          exitSelectMode={exitSelectMode}
        />
      </div>

      {/* Compose overlay */}
      {state.composeOpen && (
        <ComposeOverlay
          prefill={composePrefill}
          onClose={() => setState({ composeOpen: false })}
        />
      )}

      {/* Tweaks */}
      {showTweaks ? (
        <TweaksPanel state={state} setState={setState} onClose={() => setShowTweaks(false)} />
      ) : (
        <button className="toggle-pill" onClick={() => setShowTweaks(true)}>
          <Icon name="settings" size={13} /> Tweaks
        </button>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);


</script>
</body>
</html>
