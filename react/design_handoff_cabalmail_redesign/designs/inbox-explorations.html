<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cabalmail — Inbox explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=JetBrains+Mono:wght@400;500;600&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* =========================================================================
   Cabalmail — Inbox Explorations
   Three directions (Stately · Workbench · Quiet Mono) share these base styles.
   Each direction has its own block below. Density + theme are data-attributes.
   ========================================================================= */

:root {
  --pane-gap: 1px;
  --radius: 6px;

  /* density (overridden) */
  --row-py: 10px;
  --row-line-h: 1.45;
  --list-sub-size: 14px;
  --list-from-size: 13px;

  /* focus ring */
  --focus: 0 0 0 2px color-mix(in oklch, var(--accent) 40%, transparent);
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--app-bg);
  color: var(--ink);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
button:focus-visible, input:focus-visible, select:focus-visible { outline: none; box-shadow: var(--focus); }

/* =========================================================================
   Layout shell
   ========================================================================= */
.app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
  background: var(--chrome-bg);
}

.topbar {
  display: grid;
  grid-template-columns: 220px 1fr auto;
  align-items: center;
  height: 52px;
  padding: 0 16px 0 14px;
  border-bottom: 1px solid var(--border);
  background: var(--chrome-bg);
  gap: 16px;
}
.brand {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 17px;
  letter-spacing: -0.01em;
  color: var(--ink);
}
.brand-logo-tile {
  display: inline-block;
  font-size: 0;
  line-height: 0;
  border-radius: 0;
  background: var(--accent);
  color: var(--surface);
  overflow: hidden;
  flex-shrink: 0;
}
.brand-logo {
  height: 37px;
  width: 72px;
  display: block;
  vertical-align: top;
  color: inherit;
  margin-top: -1px;
}
[data-theme="dark"] .brand-logo-tile {
  background: var(--accent);
  color: #0b0b0b;
}
.brand-word {
  font-family: var(--font-display);
  font-weight: 600;
  letter-spacing: -0.01em;
}

/* User menu (avatar dropdown) */
.user-menu-wrap { position: relative; }
.avatar { cursor: pointer; }
.avatar:hover { background: color-mix(in oklch, var(--accent) 28%, var(--surface)); }
.user-menu {
  position: absolute;
  top: calc(100% + 6px);
  right: 0;
  width: 260px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 12px 40px -8px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.08);
  padding: 8px;
  z-index: 50;
  font-size: 12.5px;
}
.user-menu-head {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 8px 10px;
}
.user-menu-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: color-mix(in oklch, var(--accent) 22%, var(--surface));
  color: var(--accent);
  display: grid; place-items: center;
  font-weight: 600; font-size: 13px;
  border: 1px solid var(--border);
}
.user-menu-who { min-width: 0; }
.user-menu-name { font-weight: 600; color: var(--ink); font-size: 13px; }
.user-menu-mail {
  color: var(--ink-quiet); font-size: 11.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.user-menu-section-label {
  padding: 8px 8px 6px;
  color: var(--ink-quiet);
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
}
.user-menu-accents {
  display: flex; gap: 8px;
  padding: 0 8px 8px;
}
.user-menu-accents .accent-swatch {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1.5px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: transform 0.08s ease;
  aspect-ratio: auto;
}
.user-menu-accents .accent-swatch:hover { transform: scale(1.1); }
.user-menu-accents .accent-swatch.active {
  border-color: var(--ink);
  box-shadow: 0 0 0 2px var(--surface), 0 0 0 3.5px var(--ink);
  outline: none;
}
.user-menu-accents .accent-swatch[data-c="ink"]     { background: oklch(0.28 0.02 260); }
.user-menu-accents .accent-swatch[data-c="oxblood"] { background: oklch(0.48 0.16 22); }
.user-menu-accents .accent-swatch[data-c="forest"]  { background: oklch(0.45 0.11 155); }
.user-menu-accents .accent-swatch[data-c="azure"]   { background: oklch(0.52 0.16 240); }
.user-menu-accents .accent-swatch[data-c="amber"]   { background: oklch(0.68 0.14 70); }
.user-menu-accents .accent-swatch[data-c="plum"]    { background: oklch(0.42 0.13 320); }

.user-menu-sep {
  height: 1px; background: var(--border);
  margin: 4px 0;
}
.user-menu-item {
  display: flex; align-items: center; gap: 9px;
  width: 100%;
  padding: 7px 8px;
  border-radius: 5px;
  color: var(--ink);
  font-size: 12.5px;
  text-align: left;
  cursor: pointer;
}
.user-menu-item:hover { background: var(--surface-hover); }
.user-menu-item > svg { color: var(--ink-quiet); flex-shrink: 0; }
.search {
  position: relative;
  max-width: 560px;
  width: 100%;
  justify-self: center;
}
.search input {
  width: 100%;
  height: 34px;
  padding: 0 12px 0 34px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink);
  font: inherit;
  font-size: 13px;
}
.search .icon-search {
  position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%);
  color: var(--ink-quiet);
}
.search kbd {
  position: absolute; right: 8px; top: 50%;
  transform: translateY(-50%);
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-quiet);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 5px;
  background: var(--chrome-bg);
}
.topbar-right { display: flex; align-items: center; gap: 6px; }
.icon-btn {
  height: 32px; min-width: 32px; padding: 0 8px;
  border-radius: var(--radius);
  color: var(--ink-soft);
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
}
.icon-btn:hover { background: var(--surface-hover); color: var(--ink); }
.avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: color-mix(in oklch, var(--accent) 20%, var(--surface));
  color: var(--accent);
  display: grid; place-items: center;
  font-weight: 600; font-size: 11px;
  border: 1px solid var(--border);
}

/* Three-pane grid */
.panes {
  display: grid;
  grid-template-columns: 240px minmax(340px, 460px) 1fr;
  gap: var(--pane-gap);
  background: var(--border);
  overflow: hidden;
}
[data-compact="compact"] .panes { grid-template-columns: 220px minmax(320px, 400px) 1fr; }
[data-compact="roomy"] .panes { grid-template-columns: 280px minmax(380px, 520px) 1fr; }

.pane { background: var(--pane-bg); overflow: auto; position: relative; }
.pane-folders {
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}
.pane-list { background: var(--list-bg); }
.pane-reader { background: var(--reader-bg); }

/* =========================================================================
   Folders pane
   ========================================================================= */
.folders-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 14px 6px;
}
.compose-btn {
  display: inline-flex; align-items: center; gap: 8px;
  width: calc(100% - 24px);
  margin: 4px 12px 12px;
  height: 36px;
  padding: 0 14px;
  border-radius: var(--radius);
  background: var(--accent);
  color: var(--accent-fg);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: -0.005em;
  justify-content: center;
}
.compose-btn:hover { filter: brightness(1.05); }
.compose-btn .icon { color: var(--accent-fg); }

.folder-section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-quiet);
  padding: 10px 16px 6px;
}
.folders-section {
  display: flex;
  flex-direction: column;
  min-height: 0;
  border-top: 1px solid transparent;
}
.folders-section + .folders-section { border-top-color: var(--border); }
.folders-section.collapsed { flex: 0 0 auto; }
.folders-section.expanded { flex: 1 1 0; min-height: 0; overflow: hidden; }
.folders-section-header {
  display: flex; align-items: center; gap: 6px;
  padding: 10px 10px 6px 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink-quiet);
  cursor: pointer;
  user-select: none;
}
.folders-section-header:hover { color: var(--ink-soft); }
.folders-section-header .chev {
  display: inline-flex;
  transition: transform 120ms ease;
}
.folders-section.collapsed .folders-section-header .chev { transform: rotate(-90deg); }
.folders-section-header .label { flex: 1; }
.folders-section-header .section-actions {
  display: inline-flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 120ms ease;
}
.folders-section-header:hover .section-actions,
.folders-section-header:focus-within .section-actions { opacity: 1; }
.folders-section-header .section-action {
  width: 20px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 4px;
  color: var(--ink-quiet);
}
.folders-section-header .section-action:hover {
  background: var(--surface-hover);
  color: var(--ink);
}
.folders-section-body {
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
  display: flex;
  flex-direction: column;
}
.folders-section.collapsed .folders-section-body { display: none; }

.folder-list { list-style: none; margin: 0; padding: 0 8px 8px; }
.folder-item {
  display: grid;
  grid-template-columns: 18px 1fr auto auto;
  gap: 10px;
  align-items: center;
  padding: 7px 10px;
  border-radius: 5px;
  color: var(--ink-soft);
  font-size: 13px;
  cursor: pointer;
  line-height: 1.3;
  position: relative;
}
.folder-item:hover { background: var(--surface-hover); color: var(--ink); }
.folder-item.active {
  background: var(--accent-soft);
  color: var(--ink);
  font-weight: 600;
}
.folder-item.active .folder-count { color: var(--accent); }
.folder-item .icon { color: var(--ink-quiet); }
.folder-item.active .icon { color: var(--accent); }
.folder-count {
  font-size: 11px;
  color: var(--ink-quiet);
  font-variant-numeric: tabular-nums;
}
.folder-item.nested { padding-left: 28px; }
.folder-item.parent { font-weight: 500; }

.folder-row-actions {
  display: inline-flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 120ms ease;
  margin-left: -4px;
}
.folder-item:hover .folder-row-actions,
.folder-item:focus-within .folder-row-actions { opacity: 1; }
.folder-item.has-fav .folder-star { opacity: 1; color: var(--accent); }
.folder-row-action {
  width: 20px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 4px;
  color: var(--ink-quiet);
  background: transparent;
}
.folder-row-action:hover {
  background: var(--sidebar-bg);
  color: var(--ink);
}
.folder-item:hover .folder-row-action { background: transparent; }
.folder-item:hover .folder-row-action:hover { background: var(--surface); }
.folder-item .folder-count { transition: opacity 100ms ease; }
.folder-item:hover .folder-count { opacity: 0; }
.folder-item:hover .folder-row-actions + .folder-count,
.folder-item .folder-row-actions:not(:empty) ~ .folder-count { }

.folder-rename-input {
  grid-column: 2 / 5;
  min-width: 0;
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 3px 6px;
  font: inherit;
  color: var(--ink);
  outline: none;
}

.folder-add-row {
  display: grid;
  grid-template-columns: 18px 1fr;
  gap: 10px;
  align-items: center;
  padding: 7px 10px;
  margin: 0 8px 8px;
  border-radius: 5px;
  color: var(--ink-quiet);
  font-size: 12px;
  cursor: pointer;
}
.folder-add-row:hover { background: var(--surface-hover); color: var(--ink); }
.folder-add-input {
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 4px;
  padding: 3px 6px;
  font: inherit;
  color: var(--ink);
  min-width: 0;
  outline: none;
}

.address-search-wrap {
  padding: 6px 12px 8px;
  position: relative;
  flex: 0 0 auto;
}
.address-search {
  width: 100%;
  height: 28px;
  padding: 0 26px 0 26px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--surface);
  font: inherit;
  font-size: 12px;
  color: var(--ink);
  outline: none;
}
.address-search:focus { border-color: var(--accent); }
.address-search::placeholder { color: var(--ink-quiet); }
.address-search-icon {
  position: absolute;
  left: 20px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-quiet);
  pointer-events: none;
}
.address-search-clear {
  position: absolute;
  right: 18px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-quiet);
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 3px;
}
.address-search-clear:hover { color: var(--ink); background: var(--surface-hover); }

.accounts-list {
  list-style: none;
  margin: 0;
  padding: 0 8px 8px;
  flex: 1 1 auto;
  min-height: 0;
  overflow: auto;
}
.account-item {
  display: grid;
  grid-template-columns: 8px 1fr auto;
  gap: 10px;
  align-items: center;
  padding: 6px 10px;
  border-radius: 5px;
  font-size: 12px;
  color: var(--ink-soft);
  cursor: pointer;
  position: relative;
}
.account-item:hover { background: var(--surface-hover); color: var(--ink); }
.account-item.active {
  background: var(--accent-soft);
  color: var(--ink);
  font-weight: 600;
}
.account-swatch {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--swatch, var(--accent));
}
.account-label { color: var(--ink-quiet); font-size: 11px; margin-left: 6px; }
.account-row-actions {
  display: inline-flex;
  gap: 2px;
  opacity: 0;
  transition: opacity 120ms ease;
}
.account-item:hover .account-row-actions,
.account-item:focus-within .account-row-actions { opacity: 1; }
.account-row-action {
  width: 20px; height: 20px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 4px;
  color: var(--ink-quiet);
}
.account-row-action:hover { background: var(--surface); color: var(--danger, #c0392b); }
.account-item:hover .folder-count { opacity: 0; }
.account-item .folder-count { transition: opacity 100ms ease; }

.address-empty {
  padding: 16px 14px;
  font-size: 12px;
  color: var(--ink-quiet);
  text-align: center;
  font-style: italic;
}

/* =========================================================================
   List pane
   ========================================================================= */
.list-header {
  position: sticky; top: 0; z-index: 5;
  background: var(--list-bg);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 10px;
}
.list-title-row {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 10px;
}
.list-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.list-meta { font-size: 12px; color: var(--ink-quiet); font-variant-numeric: tabular-nums; }
.list-tabs {
  display: flex; gap: 2px;
  margin-top: 10px;
}
.list-tab {
  font-size: 12px;
  padding: 5px 10px;
  border-radius: 5px;
  color: var(--ink-quiet);
  font-weight: 500;
}
.list-tab:hover { color: var(--ink); background: var(--surface-hover); }
.list-tab.active {
  color: var(--ink);
  background: var(--surface-hover);
}
.list-tab .count {
  font-variant-numeric: tabular-nums;
  color: var(--ink-quiet);
  font-size: 11px;
  margin-left: 4px;
}
.list-tab.active .count { color: var(--accent); }

.list-sort {
  display: flex; align-items: center; gap: 6px;
  margin-top: 8px;
  font-size: 11px;
  color: var(--ink-quiet);
}
.list-sort select {
  background: transparent;
  border: 0;
  font: inherit;
  color: var(--ink-soft);
  font-weight: 500;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  padding-right: 14px;
  background-image: linear-gradient(45deg, transparent 50%, currentColor 50%),
                    linear-gradient(-45deg, transparent 50%, currentColor 50%);
  background-position: right 6px top 55%, right 2px top 55%;
  background-size: 4px 4px;
  background-repeat: no-repeat;
}

.rows { list-style: none; margin: 0; padding: 0; }
.row {
  position: relative;
  display: grid;
  grid-template-columns: 24px 1fr auto;
  gap: 10px;
  padding: var(--row-py) 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border-faint);
  transition: background 80ms;
}
.row:hover { background: var(--surface-hover); }
.row.selected {
  background: var(--accent-soft);
}
.row.unread .row-subject { font-weight: 600; color: var(--ink); }
.row.unread .row-from { font-weight: 600; color: var(--ink); }
.row .unread-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  margin-top: 7px;
  opacity: 0;
}
.row.unread .unread-dot { opacity: 1; }

/* ---- Row leading (dot + optional checkbox) ---- */
.row-leading {
  display: grid;
  place-items: center;
  width: 20px;
  padding-top: 4px;
}
.row-leading .unread-dot { margin-top: 0; grid-area: 1 / 1; }
.row-leading .row-checkbox { grid-area: 1 / 1; opacity: 0; transform: scale(0.85); transition: opacity 100ms, transform 100ms; }
.pane-list.select-mode .row-leading .unread-dot { opacity: 0; }
.pane-list.select-mode .row-leading .row-checkbox { opacity: 1; transform: scale(1); }
.row-leading.as-checkbox { cursor: pointer; }
.row.unread .row-leading .unread-dot { opacity: 1; }
.pane-list.select-mode .row.unread .row-leading .unread-dot { opacity: 0; }

.row.checked {
  background: color-mix(in oklch, var(--accent) 10%, var(--surface));
}
.row.checked:hover {
  background: color-mix(in oklch, var(--accent) 14%, var(--surface));
}

/* Generic list checkbox (header + row) */
.list-checkbox {
  width: 15px; height: 15px;
  border-radius: 3px;
  border: 1.5px solid var(--ink-quiet);
  background: var(--surface);
  display: inline-grid; place-items: center;
  flex-shrink: 0;
  cursor: pointer;
  transition: border-color 80ms, background 80ms;
}
.list-checkbox:hover { border-color: var(--ink-soft); }
.list-checkbox.checked {
  background: var(--accent);
  border-color: var(--accent);
  color: var(--accent-fg);
}
.list-checkbox.checked svg { stroke-width: 3; }
.list-checkbox.indeterminate {
  background: var(--accent);
  border-color: var(--accent);
}
.list-checkbox .dash {
  width: 7px; height: 2px; background: var(--accent-fg); border-radius: 1px;
}

/* Select toggle + select-all in list header */
.select-toggle {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink-soft);
  border: 1px solid transparent;
}
.select-toggle:hover { background: var(--surface-hover); color: var(--ink); }
.select-toggle.on {
  background: var(--accent);
  color: var(--accent-fg);
  border-color: var(--accent);
}
.select-toggle.on:hover { filter: brightness(1.05); }
.select-all {
  display: inline-flex; align-items: center; gap: 8px;
  cursor: pointer;
}
.select-all-label {
  font-size: 11px;
  color: var(--ink-soft);
  font-weight: 500;
}

/* ---- Bulk selection reader pane ---- */
.bulk-pane { background: var(--app-bg); }
.bulk-toolbar {
  background: color-mix(in oklch, var(--accent) 8%, var(--surface));
  border-bottom: 1px solid var(--border);
}
.bulk-count {
  display: inline-flex; align-items: baseline; gap: 6px;
  padding: 0 6px 0 4px;
  color: var(--ink);
}
.bulk-count-num {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.02em;
  color: var(--accent);
}
.bulk-count-label {
  font-size: 11px;
  color: var(--ink-soft);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.tool-btn.primary {
  background: var(--accent);
  color: var(--accent-fg);
}
.tool-btn.primary:hover { filter: brightness(1.05); }

.bulk-body {
  padding: 48px 56px;
  max-width: 680px;
  overflow: auto;
}
.bulk-hero {
  display: flex; align-items: baseline; gap: 14px;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
}
.bulk-hero-num {
  font-family: var(--font-display);
  font-size: 72px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--accent);
}
.bulk-hero-label {
  font-family: var(--font-display);
  font-size: 22px;
  color: var(--ink-soft);
  letter-spacing: -0.01em;
}
.bulk-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.bulk-stat {
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px 16px;
  background: var(--surface);
}
.bulk-stat-num {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 600;
  line-height: 1.1;
  color: var(--ink);
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.bulk-stat-label {
  font-size: 11px;
  color: var(--ink-quiet);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 500;
  margin-top: 2px;
}
.bulk-section { margin-bottom: 24px; }
.bulk-section-label {
  font-size: 10.5px;
  color: var(--ink-quiet);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  margin-bottom: 10px;
}
.bulk-chips {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.bulk-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 12px;
  color: var(--ink-soft);
}
.bulk-chip.muted { color: var(--ink-quiet); font-style: italic; }
.bulk-chip-dot {
  width: 6px; height: 6px; border-radius: 50%;
}
.bulk-chip-count {
  font-size: 10.5px;
  color: var(--ink-quiet);
  font-variant-numeric: tabular-nums;
  padding-left: 4px;
  border-left: 1px solid var(--border);
  margin-left: 2px;
}
.bulk-hint {
  margin-top: 32px;
  padding: 10px 14px;
  background: var(--chrome-bg);
  border: 1px dashed var(--border);
  border-radius: 6px;
  font-size: 11.5px;
  color: var(--ink-quiet);
  display: flex; align-items: center; gap: 8px;
}
.bulk-hint kbd {
  font-family: var(--font-mono);
  font-size: 10.5px;
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0 4px;
  background: var(--surface);
}

.row-main { min-width: 0; }
.row-head {
  display: flex; align-items: baseline; justify-content: space-between;
  gap: 12px;
}
.row-from {
  font-size: var(--list-from-size);
  color: var(--ink-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
  letter-spacing: -0.003em;
}
.row-date {
  font-size: 11px;
  color: var(--ink-quiet);
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.row-subject {
  font-size: var(--list-sub-size);
  color: var(--ink-soft);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
  letter-spacing: -0.005em;
  line-height: var(--row-line-h);
}
.row-preview {
  font-size: 12px;
  color: var(--ink-quiet);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 3px;
  line-height: 1.4;
}
[data-compact="compact"] .row-preview { display: none; }
[data-compact="compact"] .row { padding-top: 7px; padding-bottom: 7px; }
[data-compact="roomy"] .row { padding-top: 13px; padding-bottom: 13px; }
[data-compact="roomy"] .row-preview { white-space: normal; -webkit-line-clamp: 2; display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }

.row-indicators {
  display: flex; align-items: center; gap: 6px;
  margin-top: 3px;
  color: var(--ink-quiet);
}
.row-indicators .icon { opacity: 0.65; }
.row.flagged .icon-star { color: var(--accent); opacity: 1; }
.row.important::before {
  content: "";
  position: absolute;
  left: 0; top: 10px; bottom: 10px;
  width: 2px;
  background: var(--accent);
  border-radius: 2px;
}

/* =========================================================================
   Reader pane
   ========================================================================= */
.reader {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100%;
}
.reader-toolbar {
  display: flex; align-items: center; gap: 2px;
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--reader-bg);
  position: sticky; top: 0; z-index: 4;
}
.reader-toolbar .spacer { flex: 1; }
.tool-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 10px;
  border-radius: 5px;
  color: var(--ink-soft);
  font-size: 12px;
  font-weight: 500;
}
.tool-btn:hover { background: var(--surface-hover); color: var(--ink); }
.tool-btn .icon { color: var(--ink-quiet); }
.tool-btn:hover .icon { color: var(--ink); }
.tool-divider { width: 1px; height: 20px; background: var(--border); margin: 0 6px; }

.reader-body {
  padding: 26px 48px 80px;
  overflow: auto;
}
[data-compact="compact"] .reader-body { padding: 20px 32px 60px; }
[data-compact="roomy"] .reader-body { padding: 36px 64px 100px; max-width: 820px; margin: 0 auto; }

.msg-subject {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.25;
  color: var(--ink);
  margin: 0 0 16px;
  text-wrap: pretty;
}
.msg-header {
  display: grid;
  grid-template-columns: 44px 1fr auto;
  gap: 14px;
  align-items: flex-start;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border-faint);
}
.msg-avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: color-mix(in oklch, var(--accent) 18%, var(--surface));
  color: var(--accent);
  display: grid; place-items: center;
  font-family: var(--font-display);
  font-weight: 600; font-size: 16px;
  border: 1px solid var(--border);
}
.msg-meta { min-width: 0; }
.msg-from { font-size: 14px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
.msg-from .email { color: var(--ink-quiet); font-weight: 400; }
.msg-to { font-size: 12px; color: var(--ink-quiet); margin-top: 2px; }
.msg-date { font-size: 12px; color: var(--ink-quiet); font-variant-numeric: tabular-nums; white-space: nowrap; }

.msg-body {
  font-family: var(--font-reader);
  font-size: 15px;
  line-height: 1.65;
  color: var(--ink-soft);
  max-width: 68ch;
  margin-top: 22px;
  text-wrap: pretty;
}
.msg-body p { margin: 0 0 16px; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body .sig {
  white-space: pre-wrap;
  color: var(--ink-quiet);
  border-top: 1px solid var(--border-faint);
  padding-top: 16px;
  margin-top: 22px;
  font-size: 14px;
}
.msg-plain {
  font-family: var(--font-mono);
  font-size: 13px;
  line-height: 1.7;
  color: var(--ink-soft);
  white-space: pre-wrap;
  word-wrap: break-word;
  margin: 0;
  padding: 14px 0 0;
  max-width: 72ch;
}

.quick-reply {
  margin-top: 36px;
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  background: var(--surface);
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
  font-size: 13px;
  color: var(--ink-quiet);
  max-width: 68ch;
}
.quick-reply-actions { display: flex; gap: 6px; }
.qr-btn {
  height: 30px; padding: 0 12px;
  border-radius: 5px;
  font-size: 12px; font-weight: 500;
  border: 1px solid var(--border);
  color: var(--ink-soft);
}
.qr-btn.primary { background: var(--accent); color: var(--accent-fg); border-color: transparent; }
.qr-btn:hover { background: var(--surface-hover); }
.qr-btn.primary:hover { filter: brightness(1.05); background: var(--accent); }

/* ---- Rich/Plain segmented toggle (multipart/alternative) ---- */
.reader-format-toggle {
  display: inline-flex;
  align-items: center;
  padding: 2px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  font-size: 11px;
  font-weight: 500;
  height: 26px;
}
.reader-format-toggle button {
  height: 20px;
  padding: 0 10px;
  border-radius: 4px;
  color: var(--ink-quiet);
  background: transparent;
  border: 0;
  cursor: pointer;
  letter-spacing: 0.02em;
  font-family: var(--font-ui);
}
.reader-format-toggle button.active {
  background: var(--reader-bg);
  color: var(--ink);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}
.reader-format-toggle button:not(.active):hover { color: var(--ink); }

/* ---- Reader overflow menu ---- */
.reader-more-wrap { position: relative; }
.reader-more-menu {
  position: absolute;
  top: calc(100% + 4px);
  right: 0;
  min-width: 220px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 12px 40px -8px rgba(0,0,0,0.25), 0 2px 6px rgba(0,0,0,0.08);
  padding: 6px;
  z-index: 60;
  font-size: 12.5px;
}
.reader-more-menu button {
  display: flex; align-items: center; gap: 9px;
  width: 100%;
  padding: 7px 8px;
  border-radius: 5px;
  color: var(--ink);
  font-size: 12.5px;
  text-align: left;
  cursor: pointer;
  border: 0;
  background: transparent;
  font-family: inherit;
}
.reader-more-menu button:hover { background: var(--surface-hover); }
.reader-more-menu button.danger { color: oklch(0.5 0.18 25); }
.reader-more-menu button.danger:hover { background: color-mix(in oklch, oklch(0.6 0.2 25) 12%, var(--surface)); }
.reader-more-menu button.checked > svg:first-child { color: var(--accent); }
.reader-more-menu button.checked > span:not(.hint) { font-weight: 600; }
.reader-more-menu .check-slot {
  display: inline-block;
  width: 13px;
  height: 13px;
  flex-shrink: 0;
}
.reader-more-group-label {
  padding: 6px 10px 4px;
  color: var(--ink-quiet);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: var(--font-ui);
}
.reader-more-menu button > svg { color: var(--ink-quiet); flex-shrink: 0; }
.reader-more-menu button.danger > svg { color: oklch(0.55 0.18 25); }
.reader-more-menu .sep { height: 1px; background: var(--border-faint); margin: 4px 2px; }
.reader-more-menu .hint {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-quiet);
  margin-left: auto;
}

/* ---- Attachments strip ---- */
.attachments {
  margin: 32px 0 0;
  padding: 16px 0 0;
  border-top: 1px solid var(--border-faint);
  max-width: 68ch;
}
.attachments-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
}
.attachments-title {
  font-family: var(--font-ui);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-quiet);
}
.attachments-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-quiet);
}
.attachments-list {
  display: grid;
  grid-template-columns: 1fr auto auto;
  row-gap: 1px;
  background: var(--border-faint);
  border: 1px solid var(--border-faint);
  border-radius: 5px;
  overflow: hidden;
}
.att-row {
  display: contents;
}
.att-row > * {
  background: var(--reader-bg);
  padding: 9px 12px;
  font-family: var(--font-ui);
  font-size: 12.5px;
  color: var(--ink-soft);
  display: flex;
  align-items: center;
  gap: 8px;
}
.att-row:hover > * {
  background: var(--surface);
  cursor: pointer;
}
.att-name {
  min-width: 0;
}
.att-name .att-icon {
  width: 24px; height: 30px;
  border-radius: 3px;
  background: var(--surface);
  border: 1px solid var(--border);
  display: inline-grid;
  place-items: center;
  font-family: var(--font-mono);
  font-size: 8.5px;
  font-weight: 700;
  color: var(--ink-quiet);
  letter-spacing: 0.02em;
  flex-shrink: 0;
}
.att-name .att-filename {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  flex: 1;
}
.att-size {
  font-family: var(--font-mono);
  font-size: 11.5px;
  color: var(--ink-quiet);
  font-variant-numeric: tabular-nums;
  justify-content: flex-end;
  min-width: 72px;
}
.att-download {
  justify-content: center;
  min-width: 60px;
  color: var(--ink-quiet);
}
.att-row:hover .att-download { color: var(--accent); }

/* ---- Source view modal ---- */
.source-scrim {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px;
}
.source-window {
  width: 100%;
  max-width: 820px;
  max-height: 86vh;
  background: var(--reader-bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 30px 80px -20px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.source-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px 12px 18px;
  border-bottom: 1px solid var(--border-faint);
  background: var(--surface);
}
.source-header-title {
  font-family: var(--font-display);
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  display: flex;
  align-items: center;
  gap: 10px;
}
.source-header-title .tag {
  font-family: var(--font-mono);
  font-size: 10.5px;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--border-faint);
  color: var(--ink-quiet);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.source-header-tools {
  display: flex;
  gap: 6px;
  align-items: center;
}
.source-tool {
  height: 26px;
  padding: 0 10px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--reader-bg);
  font-size: 11.5px;
  color: var(--ink-soft);
  font-family: var(--font-ui);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.source-tool:hover { background: var(--surface-hover); color: var(--ink); }
.source-close {
  width: 28px; height: 28px;
  border-radius: 4px;
  color: var(--ink-quiet);
  display: inline-grid; place-items: center;
  cursor: pointer; border: 0; background: transparent;
}
.source-close:hover { background: var(--surface-hover); color: var(--ink); }
.source-body {
  flex: 1;
  overflow: auto;
  padding: 18px 22px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.6;
  color: var(--ink-soft);
  white-space: pre-wrap;
  word-break: break-word;
  tab-size: 2;
}
.source-body .hdr-name { color: var(--accent); font-weight: 600; }
.source-body .hdr-sep { color: var(--ink-quiet); opacity: 0.6; margin: 8px 0; border-top: 1px dashed var(--border-faint); }
.source-body .boundary { color: var(--ink-quiet); }
.source-body .mime-type { color: oklch(0.55 0.15 200); }

/* =========================================================================
   DIRECTION A — STATELY  (editorial, warm, serif subjects)
   ========================================================================= */
[data-direction="stately"] {
  --font-ui: "Inter", system-ui, sans-serif;
  --font-display: "Source Serif 4", "Fraunces", Georgia, serif;
  --font-reader: "Source Serif 4", Georgia, serif;
  --font-mono: "IBM Plex Mono", monospace;
}
[data-direction="stately"][data-theme="light"] {
  --app-bg: oklch(0.98 0.005 85);
  --chrome-bg: oklch(0.985 0.006 85);
  --sidebar-bg: oklch(0.975 0.006 85);
  --list-bg: oklch(0.99 0.004 85);
  --reader-bg: oklch(0.995 0.003 85);
  --pane-bg: oklch(0.99 0.004 85);
  --surface: oklch(0.985 0.005 85);
  --surface-hover: oklch(0.955 0.008 85);
  --border: oklch(0.9 0.007 85);
  --border-faint: oklch(0.94 0.005 85);
  --ink: oklch(0.22 0.015 60);
  --ink-soft: oklch(0.36 0.012 60);
  --ink-quiet: oklch(0.55 0.01 60);
  --accent-fg: oklch(0.99 0.003 60);
  --accent-ink: var(--ink);
}
[data-direction="stately"][data-theme="dark"] {
  --app-bg: oklch(0.17 0.008 60);
  --chrome-bg: oklch(0.19 0.008 60);
  --sidebar-bg: oklch(0.165 0.008 60);
  --list-bg: oklch(0.185 0.008 60);
  --reader-bg: oklch(0.2 0.007 60);
  --pane-bg: oklch(0.19 0.008 60);
  --surface: oklch(0.22 0.008 60);
  --surface-hover: oklch(0.26 0.009 60);
  --border: oklch(0.3 0.01 60);
  --border-faint: oklch(0.25 0.009 60);
  --ink: oklch(0.94 0.005 80);
  --ink-soft: oklch(0.8 0.006 80);
  --ink-quiet: oklch(0.6 0.008 60);
  --accent-fg: oklch(0.15 0.008 60);
  --accent-ink: var(--ink);
}

/* =========================================================================
   DIRECTION B — WORKBENCH  (power tool, cool neutrals, dense-friendly)
   ========================================================================= */
[data-direction="workbench"] {
  --font-ui: "Inter", "Geist", system-ui, sans-serif;
  --font-display: "Inter", "Geist", system-ui, sans-serif;
  --font-reader: "Inter", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "IBM Plex Mono", monospace;
}
[data-direction="workbench"] .msg-subject { letter-spacing: -0.025em; font-weight: 700; }
[data-direction="workbench"][data-theme="light"] {
  --app-bg: oklch(0.985 0.003 250);
  --chrome-bg: oklch(1 0 0);
  --sidebar-bg: oklch(0.985 0.003 250);
  --list-bg: oklch(1 0 0);
  --reader-bg: oklch(1 0 0);
  --pane-bg: oklch(1 0 0);
  --surface: oklch(0.99 0.003 250);
  --surface-hover: oklch(0.965 0.005 250);
  --border: oklch(0.91 0.006 250);
  --border-faint: oklch(0.95 0.005 250);
  --ink: oklch(0.18 0.015 250);
  --ink-soft: oklch(0.32 0.012 250);
  --ink-quiet: oklch(0.55 0.01 250);
  --accent-fg: oklch(0.99 0 0);
  --accent-ink: oklch(0.2 0.015 250);
}
[data-direction="workbench"][data-theme="dark"] {
  --app-bg: oklch(0.16 0.01 250);
  --chrome-bg: oklch(0.19 0.01 250);
  --sidebar-bg: oklch(0.17 0.01 250);
  --list-bg: oklch(0.195 0.009 250);
  --reader-bg: oklch(0.21 0.008 250);
  --pane-bg: oklch(0.195 0.009 250);
  --surface: oklch(0.23 0.01 250);
  --surface-hover: oklch(0.27 0.011 250);
  --border: oklch(0.3 0.012 250);
  --border-faint: oklch(0.24 0.01 250);
  --ink: oklch(0.96 0.003 250);
  --ink-soft: oklch(0.82 0.005 250);
  --ink-quiet: oklch(0.6 0.008 250);
  --accent-fg: oklch(0.15 0.01 250);
  --accent-ink: var(--ink);
}

/* =========================================================================
   DIRECTION C — QUIET MONO  (restrained take on the current oxblood DNA)
   ========================================================================= */
[data-direction="quietmono"] {
  --font-ui: "Inter", system-ui, sans-serif;
  --font-display: "Inter", system-ui, sans-serif;
  --font-reader: "Inter", system-ui, sans-serif;
  --font-mono: "JetBrains Mono", "IBM Plex Mono", monospace;
}
[data-direction="quietmono"] .row-from { font-family: var(--font-mono); font-size: 12px; letter-spacing: -0.01em; }
[data-direction="quietmono"] .row-date { font-family: var(--font-mono); }
[data-direction="quietmono"] .folder-count { font-family: var(--font-mono); }
[data-direction="quietmono"] .msg-from .email { font-family: var(--font-mono); font-size: 12px; }
[data-direction="quietmono"] .msg-date { font-family: var(--font-mono); }
[data-direction="quietmono"] .list-meta { font-family: var(--font-mono); }
[data-direction="quietmono"] .msg-subject { font-weight: 600; letter-spacing: -0.02em; }
[data-direction="quietmono"][data-theme="light"] {
  --app-bg: oklch(0.975 0.002 40);
  --chrome-bg: oklch(0.99 0.002 40);
  --sidebar-bg: oklch(0.975 0.003 40);
  --list-bg: oklch(0.995 0.002 40);
  --reader-bg: oklch(1 0 0);
  --pane-bg: oklch(0.995 0.002 40);
  --surface: oklch(0.985 0.003 40);
  --surface-hover: oklch(0.955 0.005 40);
  --border: oklch(0.9 0.005 40);
  --border-faint: oklch(0.945 0.004 40);
  --ink: oklch(0.2 0.01 40);
  --ink-soft: oklch(0.35 0.008 40);
  --ink-quiet: oklch(0.55 0.006 40);
  --accent-fg: oklch(0.99 0.002 40);
  --accent-ink: var(--ink);
}
[data-direction="quietmono"][data-theme="dark"] {
  --app-bg: oklch(0.16 0.005 30);
  --chrome-bg: oklch(0.18 0.005 30);
  --sidebar-bg: oklch(0.17 0.005 30);
  --list-bg: oklch(0.19 0.005 30);
  --reader-bg: oklch(0.205 0.005 30);
  --pane-bg: oklch(0.19 0.005 30);
  --surface: oklch(0.22 0.007 30);
  --surface-hover: oklch(0.26 0.008 30);
  --border: oklch(0.3 0.008 30);
  --border-faint: oklch(0.24 0.007 30);
  --ink: oklch(0.95 0.003 60);
  --ink-soft: oklch(0.82 0.005 60);
  --ink-quiet: oklch(0.6 0.006 40);
  --accent-fg: oklch(0.15 0.005 30);
  --accent-ink: var(--ink);
}

/* =========================================================================
   Accent palette (tweakable)
   ========================================================================= */
[data-accent="ink"]     { --accent: oklch(0.25 0.03 250); --accent-soft: color-mix(in oklch, oklch(0.25 0.03 250) 10%, transparent); }
[data-accent="oxblood"] { --accent: oklch(0.42 0.12 25);  --accent-soft: color-mix(in oklch, oklch(0.42 0.12 25) 10%, transparent); }
[data-accent="forest"]  { --accent: oklch(0.45 0.09 150); --accent-soft: color-mix(in oklch, oklch(0.45 0.09 150) 10%, transparent); }
[data-accent="azure"]   { --accent: oklch(0.52 0.12 250); --accent-soft: color-mix(in oklch, oklch(0.52 0.12 250) 10%, transparent); }
[data-accent="amber"]   { --accent: oklch(0.55 0.13 70);  --accent-soft: color-mix(in oklch, oklch(0.55 0.13 70) 10%, transparent); }
[data-accent="plum"]    { --accent: oklch(0.45 0.12 330); --accent-soft: color-mix(in oklch, oklch(0.45 0.12 330) 10%, transparent); }

[data-theme="dark"][data-accent="ink"]     { --accent: oklch(0.78 0.04 250); --accent-soft: color-mix(in oklch, oklch(0.78 0.04 250) 15%, transparent); }
[data-theme="dark"][data-accent="oxblood"] { --accent: oklch(0.72 0.13 25);  --accent-soft: color-mix(in oklch, oklch(0.72 0.13 25) 15%, transparent); }
[data-theme="dark"][data-accent="forest"]  { --accent: oklch(0.75 0.11 150); --accent-soft: color-mix(in oklch, oklch(0.75 0.11 150) 15%, transparent); }
[data-theme="dark"][data-accent="azure"]   { --accent: oklch(0.78 0.12 250); --accent-soft: color-mix(in oklch, oklch(0.78 0.12 250) 15%, transparent); }
[data-theme="dark"][data-accent="amber"]   { --accent: oklch(0.82 0.13 70);  --accent-soft: color-mix(in oklch, oklch(0.82 0.13 70) 15%, transparent); }
[data-theme="dark"][data-accent="plum"]    { --accent: oklch(0.78 0.12 330); --accent-soft: color-mix(in oklch, oklch(0.78 0.12 330) 15%, transparent); }

/* Swatches per account */
.account-item[data-swatch="--accent-1"] { --swatch: oklch(0.52 0.12 250); }
.account-item[data-swatch="--accent-2"] { --swatch: oklch(0.55 0.13 70); }
.account-item[data-swatch="--accent-3"] { --swatch: oklch(0.45 0.09 150); }
.account-item[data-swatch="--accent-4"] { --swatch: oklch(0.45 0.12 330); }

/* =========================================================================
   Tweaks panel
   ========================================================================= */
.tweaks {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 288px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 10px 30px -10px rgba(0,0,0,0.25);
  padding: 12px;
  z-index: 1000;
  font-family: var(--font-ui);
  font-size: 12px;
  color: var(--ink-soft);
}
.tweaks.hidden { display: none; }
.tweaks-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.tweaks-title { font-size: 12px; font-weight: 600; color: var(--ink); letter-spacing: -0.005em; }
.tweaks-close { color: var(--ink-quiet); padding: 2px; border-radius: 4px; }
.tweaks-close:hover { background: var(--surface-hover); color: var(--ink); }

.tweak-group { margin-bottom: 12px; }
.tweak-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-quiet);
  margin-bottom: 6px;
  display: block;
}
.segment {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: 1fr;
  background: var(--chrome-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 2px;
  gap: 1px;
}
.segment button {
  font-size: 11px;
  font-weight: 500;
  padding: 5px 4px;
  border-radius: 4px;
  color: var(--ink-soft);
}
.segment button.active { background: var(--accent); color: var(--accent-fg); }
.segment button:not(.active):hover { background: var(--surface-hover); }

.accent-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 6px;
}
.accent-swatch {
  aspect-ratio: 1;
  border-radius: 5px;
  border: 1px solid var(--border);
  position: relative;
}
.accent-swatch.active { outline: 2px solid var(--ink); outline-offset: 2px; }
.accent-swatch[data-c="ink"]     { background: oklch(0.25 0.03 250); }
.accent-swatch[data-c="oxblood"] { background: oklch(0.42 0.12 25); }
.accent-swatch[data-c="forest"]  { background: oklch(0.45 0.09 150); }
.accent-swatch[data-c="azure"]   { background: oklch(0.52 0.12 250); }
.accent-swatch[data-c="amber"]   { background: oklch(0.55 0.13 70); }
.accent-swatch[data-c="plum"]    { background: oklch(0.45 0.12 330); }

.toggle-pill {
  position: fixed;
  right: 16px; bottom: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink-soft);
  box-shadow: 0 4px 12px -4px rgba(0,0,0,0.15);
  z-index: 999;
  display: inline-flex; align-items: center; gap: 6px;
}
.toggle-pill:hover { background: var(--surface-hover); color: var(--ink); }

/* =========================================================================
   Annotation banner — explains the setup, non-intrusive
   ========================================================================= */
.note {
  position: fixed;
  left: 16px; bottom: 16px;
  max-width: 340px;
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--ink-quiet);
  line-height: 1.5;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  z-index: 999;
}
.note strong { color: var(--ink); font-weight: 600; }
.note.hidden { display: none; }

/* =========================================================================
   COMPOSE — modal window
   ========================================================================= */
.compose-scrim {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.35);
  z-index: 200;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0 24px 24px;
}
.compose-window {
  width: 100%;
  max-width: 680px;
  background: var(--reader-bg);
  border: 1px solid var(--border);
  border-radius: 10px 10px 0 0;
  box-shadow: 0 -18px 60px -20px rgba(0,0,0,0.35), 0 -2px 8px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  max-height: 78vh;
  overflow: hidden;
  animation: composeRise 180ms ease-out;
}
@keyframes composeRise {
  from { transform: translateY(24px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.compose-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-faint);
  font-family: var(--font-display);
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  background: var(--surface);
}
.compose-title button {
  width: 26px; height: 26px;
  border-radius: 4px;
  display: inline-grid; place-items: center;
  color: var(--ink-quiet);
  border: 0; background: transparent; cursor: pointer;
}
.compose-title button:hover { background: var(--surface-hover); color: var(--ink); }

.compose-headers {
  display: flex;
  flex-direction: column;
  border-bottom: 1px solid var(--border-faint);
}
.compose-row {
  display: grid;
  grid-template-columns: 68px 1fr;
  align-items: center;
  gap: 8px;
  padding: 4px 16px;
  min-height: 36px;
  border-bottom: 1px solid var(--border-faint);
}
.compose-row:last-child { border-bottom: 0; }
.compose-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  color: var(--ink-quiet);
}
.compose-input {
  width: 100%;
  height: 30px;
  border: 0;
  background: transparent;
  font: inherit;
  font-size: 13.5px;
  color: var(--ink);
  outline: none;
  padding: 0;
}
.compose-input.mono { font-family: var(--font-mono); font-size: 13px; }
.compose-input::placeholder { color: var(--ink-quiet); }

.compose-body {
  flex: 1;
  min-height: 240px;
  padding: 18px 18px 14px;
  overflow: auto;
  font-family: var(--font-reader);
  font-size: 15px;
  color: var(--ink);
  line-height: 1.6;
}
.compose-body-placeholder {
  margin: 0;
  color: var(--ink-quiet);
  font-style: italic;
}

.compose-footer {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-top: 1px solid var(--border-faint);
  background: var(--surface);
}

/* ----- From field (dropdown) ----- */
.from-field {
  position: relative;
  width: 100%;
}
.from-trigger {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 30px;
  padding: 0 8px 0 10px;
  border-radius: 5px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink);
  cursor: pointer;
  border: 1px solid transparent;
  background: transparent;
}
.from-trigger:hover { background: var(--surface-hover); }
.from-trigger.open {
  background: var(--surface);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
  padding: 0 8px;
}
.from-trigger .icon { color: var(--ink-quiet); margin-left: auto; }
.from-swatch {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 0 1px var(--border);
}
.from-address {
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.from-search {
  flex: 1;
  border: 0;
  background: transparent;
  font: inherit;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--ink);
  outline: none;
  min-width: 0;
}
.from-search::placeholder { color: var(--ink-quiet); }

.from-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  z-index: 10;
  max-height: 420px;
  overflow: auto;
  background: var(--reader-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  box-shadow: 0 14px 40px -10px rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.08);
  padding: 6px;
}
.from-section { margin-bottom: 6px; }
.from-section:last-child { margin-bottom: 0; }
.from-section-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 8px 8px 4px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-quiet);
}
.from-section-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--ink-quiet);
  font-weight: 500;
}
.from-option {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 7px 8px;
  border-radius: 4px;
  border: 0;
  background: transparent;
  color: var(--ink);
  cursor: pointer;
  text-align: left;
}
.from-option:hover { background: var(--surface-hover); }
.from-option-swatch {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--ink-quiet);
  flex-shrink: 0;
  box-shadow: 0 0 0 1px var(--border);
}
.from-option-main {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-width: 0;
}
.from-option-addr {
  font-family: var(--font-mono);
  font-size: 12.5px;
  color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.from-option-note {
  font-size: 11px;
  color: var(--ink-quiet);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.from-option-star {
  width: 22px; height: 22px;
  border-radius: 3px;
  display: inline-grid; place-items: center;
  color: var(--ink-quiet);
  opacity: 0;
  transition: opacity 80ms;
  cursor: pointer;
}
.from-option:hover .from-option-star { opacity: 0.8; }
.from-option-star.on { opacity: 1; color: var(--accent); }
.from-option-star:hover { background: var(--surface); color: var(--ink); }
.from-option mark {
  background: var(--accent-soft);
  color: inherit;
  border-radius: 2px;
  padding: 0 1px;
}
.from-hint {
  padding: 8px 10px;
  font-size: 11px;
  color: var(--ink-quiet);
  font-style: italic;
}
.from-empty {
  padding: 14px 10px;
  font-size: 12px;
  color: var(--ink-quiet);
  text-align: center;
}
.from-create-cta {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  padding: 10px 10px;
  margin-top: 6px;
  border-top: 1px solid var(--border-faint);
  background: transparent;
  border-left: 0; border-right: 0; border-bottom: 0;
  color: var(--ink);
  cursor: pointer;
  text-align: left;
}
.from-create-cta:hover { background: var(--accent-soft); }
.from-create-cta .plus {
  width: 22px; height: 22px;
  border-radius: 4px;
  background: var(--accent);
  color: var(--accent-fg);
  font-weight: 700;
  display: inline-grid; place-items: center;
  font-size: 14px;
  flex-shrink: 0;
}
.from-create-cta .create-label {
  display: flex;
  flex-direction: column;
  gap: 1px;
  flex: 1;
}
.from-create-cta .create-label strong {
  font-size: 12.5px;
  font-weight: 600;
}
.from-create-cta .create-hint {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--ink-quiet);
}
.from-create-cta .icon { color: var(--ink-quiet); }

/* ----- Create address form (inside from-menu) ----- */
.create-form {
  padding: 10px 10px 12px;
}
.create-form h4 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink-quiet);
  margin: 0 0 10px;
}
.create-form .cf-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px;
  margin-bottom: 8px;
  align-items: center;
}
.create-form input, .create-form select {
  width: 100%;
  height: 32px;
  padding: 0 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: var(--surface);
  color: var(--ink);
  font: inherit;
  font-family: var(--font-mono);
  font-size: 12px;
  outline: none;
}
.create-form input:focus, .create-form select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-soft);
}
.create-form input.invalid { border-color: oklch(0.55 0.18 25); }
.create-form .cf-preview {
  padding: 8px 10px;
  margin: 8px 0 10px;
  background: var(--accent-soft);
  border: 1px solid var(--border-faint);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--ink);
  word-break: break-all;
}
.create-form .cf-preview.muted { color: var(--ink-quiet); background: transparent; font-style: italic; }
.create-form .cf-footer {
  display: flex;
  gap: 6px;
  justify-content: flex-end;
}

</style>
</head>

<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" data-presets="react">

// ==================== data.jsx ====================

const RECEIVE_ONLY = (() => {

  plainText: `CABALMAIL DISPATCH · Issue 47
April 17, 2026

THE QUIET RETURN OF THE SUBDOMAIN ADDRESS
Why the best way to protect your inbox in 2026 might be the oldest trick
in the book.


For most of the last decade, the standard advice for managing a noisy
inbox has been some variation of "use plus-addressing and better filters."
It was never very good advice, and it's getting worse.

The problem is that +tag conventions are trivially stripped by any sender
who doesn't want to honor them, and the list of senders who don't want to
honor them grows every year. A properly-scoped subdomain address, by
contrast, is indistinguishable from a separate account — because to the
sending server, it is one.

  "Every address you give out is a tiny wager. Subdomains turn
  that wager into a real bet — one you can actually close."

THREE PATTERNS WORTH STEALING

Over the last few months we've watched our heaviest users converge on a
small set of patterns. None of them are novel, exactly, but seeing them
combined is instructive.

  1. Per-relationship subdomains. One per vendor, airline, landlord.
     Retire the subdomain; retire the relationship.

  2. Time-boxed addresses. Dated subdomains for one-shot receipts —
     taxes-2025.

  3. Public-facing separation. A single public. subdomain for business
     cards, bylines, and GitHub.

The thread across all three is a willingness to treat addresses as
disposable infrastructure rather than a personal identifier — a willingness
that ten years of Gmail training has made unusual.

-- From the archives --
If you missed it last week: "Why we stopped offering aliases," on the case
against plus-addressing as a privacy primitive.
  https://cabalmail.com/dispatch/46

Until next week,
The Cabalmail team
