# XcodeGen project spec for the Cabalmail Apple client.
#
# Run `xcodegen generate` in this directory to produce Cabalmail.xcodeproj.
# The generated project is not committed; CI regenerates it before every build.
#
# Phase 1 decision: native macOS target (not Mac Catalyst). See apple/README.md.

name: Cabalmail

# Shared build settings live in Base.xcconfig, which optionally includes
# Local.xcconfig (gitignored) for per-developer overrides such as
# DEVELOPMENT_TEAM. CI passes DEVELOPMENT_TEAM on the xcodebuild command
# line instead and does not need Local.xcconfig to exist.
configFiles:
  Debug: Base.xcconfig
  Release: Base.xcconfig

options:
  bundleIdPrefix: com.cabalmail
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"
    visionOS: "2.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  CabalmailKit:
    path: CabalmailKit

settings:
  base:
    SWIFT_VERSION: "5.10"
    # DEVELOPMENT_TEAM is intentionally unset here. Set it via:
    #   - Xcode UI (Signing & Capabilities) for local development, or
    #   - `xcodebuild ... DEVELOPMENT_TEAM=$APPLE_TEAM_ID` on CI (from secrets).
    # Unsigned build-only verification passes `CODE_SIGNING_ALLOWED=NO`.
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  Cabalmail:
    type: application
    supportedDestinations: [iOS, iPadOS, visionOS]
    sources:
      - path: Cabalmail
    dependencies:
      - package: CabalmailKit
    info:
      path: Cabalmail/Info.plist
      properties:
        CFBundleDisplayName: Cabalmail
        # Required by App Store validation for apps built against
        # iOS 11+ SDKs that ship icons in an asset catalog.
        CFBundleIconName: AppIcon
        # App uses only standard HTTPS/TLS; exempt from export compliance
        # questions on every TestFlight upload.
        ITSAppUsesNonExemptEncryption: false
        # iPadOS opens compose as a real scene rather than a sheet; that
        # only works when the app advertises multi-scene support. The
        # `UIApplicationSupportsMultipleScenes` key MUST be nested inside
        # `UIApplicationSceneManifest` â€” iOS silently ignores it at the
        # top level, which makes every `openWindow(...)` call a no-op
        # and the New Message / Reply buttons appear dead. iPhone
        # ignores the flag (it can't multitask scenes anyway) and the
        # compose-launch helper falls back to the sheet path there.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        # Register Cabalmail as a candidate handler for `mailto:` links.
        # iOS surfaces this in Settings -> Apps -> Mail -> Default Mail
        # App on iOS 14+; users must opt in there for `mailto:` clicks
        # in Safari / other apps to route here. Role Editor matches what
        # mail clients use â€” we both compose and send.
        CFBundleURLTypes:
          - CFBundleURLName: com.cabalmail.mailto
            CFBundleURLSchemes: [mailto]
            CFBundleTypeRole: Editor
        # Cabalmail reads the system address book locally to suggest
        # recipient names while composing and to show contact photos
        # next to incoming mail. Contact data is never sent to a
        # server; the only addresses that leave the device are the
        # ones the user explicitly types into To/Cc/Bcc.
        NSContactsUsageDescription: >-
          Cabalmail uses your contacts on this device to suggest
          recipients while you compose and to show your saved photo
          and name next to mail you receive. Your contacts stay on
          this device.
        # Route the plist's version fields through build settings so CI's
        # `CURRENT_PROJECT_VERSION=<timestamp>` actually reaches the shipped
        # Info.plist. Without this, XcodeGen hardcodes "1" / "1.0" and
        # every archive uploads as CFBundleVersion=1.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: AccentColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cabalmail.Cabalmail
        TARGETED_DEVICE_FAMILY: "1,2,7"   # iPhone, iPad, visionOS
        MARKETING_VERSION: "0.6.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        # Manual-signing settings live ON THE APP TARGET ONLY, not in the
        # xcodebuild command line. CabalmailKit ships resources, which
        # makes Xcode auto-generate a `CabalmailKit_CabalmailKit` resource
        # bundle target during the SPM integration step. A top-level
        # `PROVISIONING_PROFILE_SPECIFIER=...` on the xcodebuild command
        # line propagates to that resource bundle and the archive fails
        # ("resource bundles do not support provisioning profiles"). Per-
        # target settings here are only seen by Cabalmail, not by the
        # synthetic SPM resource bundle.
        #
        # Local dev still works: Debug uses Automatic signing inherited
        # from the project-level `CODE_SIGN_STYLE: Automatic`. Release is
        # the archive path and expects `IOS_APP_STORE_PROFILE_UUID` to be
        # injected by CI as a user-defined setting (apple.yml passes it
        # via `xcodebuild ... IOS_APP_STORE_PROFILE_UUID=$UUID`).
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "$(IOS_APP_STORE_PROFILE_UUID)"

  CabalmailMac:
    type: application
    platform: macOS
    sources:
      - path: CabalmailMac
      # Phase 4 share: the SwiftUI views, view models, and app state are
      # platform-agnostic (with `#if os(macOS)` toggles where they diverge)
      # so both app targets compile them from the iOS target's source tree.
      # Per Phase 1 the binaries stay separate; only the Swift sources are
      # shared. Revisit at Phase 7 if macOS needs substantially different
      # view code.
      - path: Cabalmail/ContentView.swift
      - path: Cabalmail/AppState.swift
      - path: Cabalmail/AppStateCompose.swift
      - path: Cabalmail/AppStateCounts.swift
      - path: Cabalmail/AppStateSignals.swift
      - path: Cabalmail/Views
      - path: Cabalmail/ViewModels
    dependencies:
      - package: CabalmailKit
    info:
      path: CabalmailMac/Info.plist
      properties:
        # App Store Connect requires a unique app name per record, so the
        # macOS app is registered there as "Cabalmail Mac". CFBundleName
        # drives the macOS app menu (the bold entry next to the Apple
        # menu), so we override it back to "Cabalmail" â€” the TestFlight
        # listing keeps the unique name while the running app looks like
        # a normal "Cabalmail" alongside its iOS sibling.
        CFBundleName: Cabalmail
        CFBundleDisplayName: Cabalmail
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: ""
        # Register Cabalmail as a candidate handler for `mailto:` links.
        # macOS surfaces this in System Settings -> Desktop & Dock ->
        # Default web browser / Default mail reader; users must opt in
        # there for `mailto:` clicks across the system to route here.
        # Role Editor matches what mail clients use â€” we both compose
        # and send.
        CFBundleURLTypes:
          - CFBundleURLName: com.cabalmail.mailto
            CFBundleURLSchemes: [mailto]
            CFBundleTypeRole: Editor
        # Mirror of the iOS string. macOS additionally requires the
        # `com.apple.security.personal-information.addressbook`
        # entitlement (see CabalmailMac.entitlements) because the app
        # runs sandboxed; the usage description alone is not enough.
        NSContactsUsageDescription: >-
          Cabalmail uses your contacts on this device to suggest
          recipients while you compose and to show your saved photo
          and name next to mail you receive. Your contacts stay on
          this device.
        # See the Cabalmail target's equivalent comment â€” XcodeGen defaults
        # these to "1" / "1.0" unless explicitly plumbed through to the
        # build settings.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cabalmail.CabalmailMac
        # On-disk .app filename. Defaults to the target name
        # ("CabalmailMac"); overriding to "Cabalmail" ships the bundle as
        # Cabalmail.app. The iOS and macOS apps never coexist on the same
        # device (different platforms), so the filename collision risk is
        # theoretical.
        PRODUCT_NAME: Cabalmail
        MARKETING_VERSION: "0.6.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: CabalmailMac/CabalmailMac.entitlements
      configs:
        # See the Cabalmail target's matching block for why these settings
        # live here instead of on the xcodebuild command line. CI injects
        # MAC_APP_STORE_PROFILE_UUID as a user-defined setting.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "$(MAC_APP_STORE_PROFILE_UUID)"

schemes:
  Cabalmail:
    build:
      targets:
        Cabalmail: all
    run:
      config: Debug
    archive:
      config: Release
  CabalmailMac:
    build:
      targets:
        CabalmailMac: all
    run:
      config: Debug
    archive:
      config: Release
